<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Maryland L&amp;H Practice Exam</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f2f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;padding-bottom:72px}
.wrap{max-width:680px;margin:0 auto;padding:16px}
.header h1{font-size:19px;font-weight:700}
.header p{font-size:13px;color:#666;margin-top:3px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.stat{background:#fff;border-radius:10px;padding:10px 6px;text-align:center}
.stat-num{font-size:20px;font-weight:700}
.stat-lbl{font-size:10px;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.progress-bar-wrap{background:#e0e0e0;border-radius:99px;height:5px;margin-bottom:16px}
.progress-bar{background:#1B6F50;height:5px;border-radius:99px;transition:width .3s}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:100}
.nav-tab{flex:1;padding:10px 8px 14px;text-align:center;font-size:12px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;border-top:2px solid transparent}
.nav-tab.active{color:#1B6F50;border-top-color:#1B6F50}
.section-label{font-size:10px;font-weight:700;color:#888;margin-bottom:7px;letter-spacing:.08em;text-transform:uppercase}
.mode-row{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.mode-btn{padding:10px 8px;font-size:13px;border:1.5px solid #ddd;border-radius:9px;background:#fff;color:#444;cursor:pointer;text-align:center;font-weight:500}
.mode-btn.active{background:#e8f0fe;border-color:#1B6F50;color:#1B6F50;font-weight:700}
.topic-section{margin-bottom:14px}
.topic-group{margin-bottom:10px}
.topic-group-label{font-size:10px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.topic-grid{display:flex;flex-wrap:wrap;gap:6px}
.topic-btn{background:#fff;border:1.5px solid #ddd;border-radius:8px;padding:8px 10px;font-size:12px;color:#333;cursor:pointer;text-align:left;line-height:1.4}
.topic-btn.active{border-color:#1B6F50;color:#1B6F50;background:#e8f0fe;font-weight:700}
.ch-badge{font-size:10px;color:#999;display:block;margin-bottom:1px}
.controls-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.q-count-sel{flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:9px;font-size:14px;background:#fff;color:#333}
.gen-btn{flex:2;padding:12px 16px;background:#1B6F50;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer}
.gen-btn:active{opacity:.85}
.qcard{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.qnum{font-size:10px;color:#999;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.qtext{font-size:15px;color:#1a1a1a;line-height:1.65;margin-bottom:14px;font-weight:500}
.options{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid #e0e0e0;border-radius:9px;cursor:pointer;font-size:14px;color:#1a1a1a;line-height:1.5;background:#fff;text-align:left;width:100%}
.opt.correct{background:#e8f5e0;border-color:#3B6D11;color:#1d4209}
.opt.wrong{background:#fce8e8;border-color:#A32D2D;color:#501313}
.opt.reveal-correct{background:#e8f5e0;border-color:#3B6D11;color:#1d4209}
.opt-letter{font-weight:700;min-width:18px;flex-shrink:0}
.explanation{margin-top:12px;padding:12px 14px;background:#e8f0fe;border-left:3px solid #1B6F50;border-radius:0 8px 8px 0;font-size:13px;color:#1B3F7A;line-height:1.65}
.expl-label{font-weight:700;margin-bottom:4px;font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.weak-info{margin-bottom:12px;padding:10px 12px;background:#fff3e0;border-radius:9px;font-size:13px;color:#854F0B}
.weak-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:#FAC775;color:#633806;margin:2px 3px 2px 0}
.no-q{text-align:center;padding:24px;color:#888;font-size:14px;background:#fff;border-radius:12px;margin-bottom:12px}
.set-label{font-size:10px;font-weight:700;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
/* Review */
.review-stats-bar{display:flex;gap:10px;margin-bottom:14px}
.r-stat{flex:1;background:#fff;border-radius:10px;padding:10px;text-align:center}
.r-stat-num{font-size:18px;font-weight:700}
.r-stat-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em}
.review-filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.review-filter{flex:1;min-width:140px;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:#fff}
.review-actions{display:flex;gap:8px;margin-bottom:14px}
.export-btn{flex:1;padding:12px;background:#fff;border:1.5px solid #1B6F50;color:#1B6F50;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.clear-btn{padding:12px 16px;background:#fff;border:1.5px solid #c0392b;color:#c0392b;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.review-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border-left:4px solid #ddd}
.review-card.rc-c{border-left-color:#3B6D11}
.review-card.rc-w{border-left-color:#A32D2D}
.review-topic{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.review-qtext{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.6;margin-bottom:10px}
.review-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.review-opt{font-size:13px;padding:8px 10px;border-radius:7px;border:1.5px solid #e0e0e0;display:flex;gap:8px;line-height:1.5}
.review-opt.ro-c{background:#e8f5e0;border-color:#3B6D11;color:#1d4209;font-weight:600}
.review-opt.ro-w{background:#fce8e8;border-color:#A32D2D;color:#501313}
.review-expl{font-size:12px;color:#444;line-height:1.65;padding:10px 12px;background:#f4f6fb;border-radius:8px}
.review-empty{text-align:center;padding:40px 20px;color:#888;font-size:14px;background:#fff;border-radius:12px}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px">
    <div class="header">
      <h1>Maryland L&amp;H Practice Exam</h1>
      <p>23 topics &middot; 345 questions &middot; full explanations</p>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Done</div></div>
    <div class="stat"><div class="stat-num" id="stat-correct">0</div><div class="stat-lbl">Correct</div></div>
    <div class="stat"><div class="stat-num" id="stat-pct">&#8212;</div><div class="stat-lbl">Score</div></div>
    <div class="stat"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">Streak</div></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <div id="tab-practice">
    <div class="section-label">Mode</div>
    <div class="mode-row">
      <button class="mode-btn active" id="mode-random" onclick="setMode('random')">&#127922; Random mix</button>
      <button class="mode-btn" id="mode-topic" onclick="setMode('topic')">&#128218; By chapter</button>
      <button class="mode-btn" id="mode-weak" onclick="setMode('weak')">&#127919; Weak areas</button>
      <button class="mode-btn" id="mode-md" onclick="setMode('md')">&#9878;&#65039; MD laws only</button>
    </div>
    <div id="topic-section" class="topic-section" style="display:none"></div>
    <div id="weak-info" class="weak-info" style="display:none">
      Focusing on weak spots (&lt;70%): <span id="weak-tags"><em>keep going to find them</em></span>
    </div>
    <div class="controls-row">
      <select class="q-count-sel" id="q-count">
        <option value="5">5 questions</option>
        <option value="10">10 questions</option>
        <option value="15">15 questions</option>
        <option value="20">20 questions</option>
      </select>
      <button class="gen-btn" onclick="generateQuestions()">&#9654; Generate</button>
    </div>
    <div id="questions-container"></div>
  </div>

  <div id="tab-review" style="display:none">
    <div class="review-stats-bar">
      <div class="r-stat"><div class="r-stat-num" id="rev-total">0</div><div class="r-stat-lbl">Answered</div></div>
      <div class="r-stat"><div class="r-stat-num" id="rev-correct">0</div><div class="r-stat-lbl">Correct</div></div>
      <div class="r-stat"><div class="r-stat-num" id="rev-pct">&#8212;</div><div class="r-stat-lbl">Score</div></div>
    </div>
    <div class="review-filters">
      <select class="review-filter" id="rev-topic" onchange="renderReview()"><option value="">All topics</option></select>
      <select class="review-filter" id="rev-result" onchange="renderReview()" style="flex:0 0 130px">
        <option value="">All results</option>
        <option value="correct">&#10003; Correct only</option>
        <option value="wrong">&#10007; Incorrect only</option>
      </select>
    </div>
    <div class="review-actions">
      <button class="export-btn" onclick="exportPDF()">&#8659; Export PDF</button>
      <button class="clear-btn" onclick="clearAll()">&#10005; Clear All</button>
    </div>
    <div id="review-container"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-tab active" id="nav-practice" onclick="switchTab('practice')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;margin:0 auto 2px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    Practice
  </button>
  <button class="nav-tab" id="nav-review" onclick="switchTab('review')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:block;margin:0 auto 2px"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Review <span id="rev-badge" style="display:none;background:#c0392b;color:#fff;border-radius:99px;font-size:10px;padding:1px 5px;margin-left:3px;vertical-align:middle"></span>
  </button>
</div>

<script>
const BANK=[{"topic": "Insurance fundamentals, risk & contract law", "question": "Insurance is best defined as a mechanism that:", "options": {"A": "Eliminates all financial risk from the insured", "B": "Transfers financial risk from an individual to a group through pooling", "C": "Guarantees no loss will ever occur", "D": "Invests premiums to generate returns for policyholders"}, "correct": "B", "explanation": "Insurance works by pooling the financial risks of many individuals. Premiums from all members fund losses incurred by the few. Risk is not eliminated — it is transferred from the individual to the insurer (and spread across all policyholders)."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Which of the following is NOT a characteristic of an insurable risk?", "options": {"A": "The loss must be accidental and unintentional", "B": "The loss must be catastrophic and affect everyone simultaneously", "C": "There must be a large number of similar exposure units", "D": "The loss must be measurable and definite"}, "correct": "B", "explanation": "Insurable risks must be: accidental, definite, measurable, not catastrophic for the insurer, and involve a large homogeneous group. A risk that creates simultaneous catastrophic losses for all insureds (like nuclear war) is NOT insurable because it destroys the pooling mechanism."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "The concept of 'indemnity' in insurance means:", "options": {"A": "The insurer pays any amount the insured requests", "B": "The insured is restored to approximately the same financial position as before the loss", "C": "The insurer profits from every claim paid", "D": "The insured receives more than the actual loss as compensation"}, "correct": "B", "explanation": "The principle of indemnity prevents the insured from profiting from a loss. Insurance restores — it does not enrich. Life insurance is technically not a true indemnity contract (no limit on how much you can insure a life), but property and health insurance are indemnity-based."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "A life insurance policy is considered a 'unilateral contract' because:", "options": {"A": "Both parties make legally enforceable promises", "B": "Only the insurer makes a legally enforceable promise after the premium is paid", "C": "The policyholder can cancel at any time without penalty", "D": "The contract requires two signatures to be valid"}, "correct": "B", "explanation": "Unilateral means only one party (the insurer) makes an enforceable promise — to pay claims. The policyholder promises nothing enforceable; they can stop paying premiums and the policy simply lapses. This distinguishes insurance from bilateral contracts where both parties have binding obligations."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Insurance contracts are considered 'contracts of adhesion' because:", "options": {"A": "Both parties negotiate terms equally", "B": "The insurer drafts the contract and the applicant accepts or rejects it as-is", "C": "The policyholder writes the terms and the insurer agrees", "D": "A government agency must approve every term"}, "correct": "B", "explanation": "Contracts of adhesion are drafted by one party (the insurer) and offered on a take-it-or-leave-it basis. Because the insured had no role in drafting, courts interpret ambiguous language in the insured's favor. This is an important principle when claims disputes arise."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "The 'aleatory' nature of an insurance contract means:", "options": {"A": "Both parties exchange equal value", "B": "The values exchanged are unequal and depend on an uncertain future event", "C": "The contract can be altered by either party", "D": "The insurer is guaranteed a profit"}, "correct": "B", "explanation": "Aleatory contracts involve unequal exchanges contingent on uncertain events. An insured might pay $500 in premiums and receive $500,000 in benefits, or pay premiums for 40 years and collect nothing. This element of chance is fundamental to insurance — it distinguishes it from a savings account."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "'Utmost good faith' in insurance requires:", "options": {"A": "The insurer to disclose all investment strategies to the policyholder", "B": "Both parties to fully disclose all material facts relevant to the contract", "C": "The applicant to disclose only information the insurer specifically asks for", "D": "The producer to guarantee the best available rate"}, "correct": "B", "explanation": "Uberrimae fidei (utmost good faith) requires both parties — insurer and applicant — to disclose all material facts honestly. The insured must volunteer material information even if not asked. Failure to disclose a material fact (concealment) can void the policy. This standard is higher than in ordinary commercial contracts."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Which of the following represents a 'moral hazard' in insurance?", "options": {"A": "A smoker applying for life insurance", "B": "A homeowner who stops locking doors after purchasing burglary insurance", "C": "A 70-year-old applying for health insurance", "D": "A small business owner in a high-crime area"}, "correct": "B", "explanation": "Moral hazard is the increased risk of loss created by the existence of insurance coverage — when having insurance causes a change in behavior that makes losses more likely. Morale hazard is carelessness; moral hazard involves more deliberate risk-taking or fraud. Both increase insurer risk."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "The 'consideration' given by the applicant in a life insurance contract is:", "options": {"A": "The promise to maintain the property in good repair", "B": "The initial premium payment and the statements made in the application", "C": "A signed affidavit from a physician", "D": "The beneficiary designation"}, "correct": "B", "explanation": "In contract law, consideration is what each party gives. The insurer's consideration: the promise to pay benefits. The applicant's consideration: (1) payment of the initial premium and (2) statements in the application (which the insurer relies on to assess risk). Both elements together form the applicant's consideration."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Which type of risk can insurance companies effectively pool and insure?", "options": {"A": "Speculative risk — where there is a chance of gain or loss", "B": "Pure risk — where there is only a chance of loss, not gain", "C": "Systematic risk — affecting all investments simultaneously", "D": "Inherent risk — existing in all products by nature"}, "correct": "B", "explanation": "Pure risk (loss or no loss — no possibility of gain) is insurable. Examples: death, accident, fire, illness. Speculative risk (might gain or lose) is not insurable. Gambling is speculative risk. Insurance covers fire damage (pure risk) but not bad investments (speculative risk)."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "A material misrepresentation in an insurance application means:", "options": {"A": "Any false statement regardless of how minor", "B": "A false statement that, if known, would have caused the insurer to decline or modify the coverage", "C": "An honest mistake about a date or number", "D": "Omitting information the insurer didn't specifically ask about"}, "correct": "B", "explanation": "Materiality is the key test: would the information have affected the insurer's decision to issue coverage, set the premium, or determine terms? A misrepresentation about a serious pre-existing condition is material (would have affected underwriting). Getting an age wrong by 1 year is typically immaterial."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "The 'waiver' principle in insurance law means:", "options": {"A": "The insured waives their right to file a claim", "B": "The insurer voluntarily relinquishes a known contractual right", "C": "The producer waives commissions for preferred clients", "D": "The policyholder waives the right to change beneficiaries"}, "correct": "B", "explanation": "Waiver occurs when the insurer voluntarily gives up a right it's entitled to under the contract — typically by accepting a premium with knowledge of a policy violation or misrepresentation. Once waived, the insurer cannot later assert that right to deny a claim. Waiver protects insureds from unexpected claim denials."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "'Estoppel' in insurance prevents the insurer from:", "options": {"A": "Raising premiums after a claim is filed", "B": "Denying a fact it previously represented as true, when the insured relied on that representation to their detriment", "C": "Canceling a policy mid-term", "D": "Requiring an insured medical examination"}, "correct": "B", "explanation": "Estoppel is an equitable doctrine: if Insurer A tells Producer B that coverage is in force (even incorrectly), and the client relied on that statement, the insurer is estopped (barred) from later denying coverage existed. It prevents insurers from making representations and then taking contrary positions when claims arise."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Which element is NOT required for a valid insurance contract?", "options": {"A": "Offer and acceptance", "B": "Competent parties", "C": "A written document signed by both parties", "D": "Consideration and legal purpose"}, "correct": "C", "explanation": "Valid contract requirements: (1) offer and acceptance, (2) consideration, (3) competent parties, (4) legal purpose. A written document is NOT required by law for a valid contract (though it's strongly recommended and required for most insurance policies in practice). Oral contracts can be legally binding."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "The 'law of large numbers' benefits insurance companies by:", "options": {"A": "Allowing them to guarantee profits on every policy", "B": "Enabling more accurate prediction of losses when a large, homogeneous group is insured", "C": "Reducing the need to collect premiums", "D": "Eliminating the need for reserves"}, "correct": "B", "explanation": "The law of large numbers: as the pool of similar risks grows, actual losses more closely match predicted losses. A small pool of 10 insureds has highly variable actual loss rates; a pool of 1,000,000 produces highly predictable results. This statistical predictability is the mathematical foundation of insurance pricing."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "Subrogation in life insurance is:", "options": {"A": "The insurer's right to take over the insured's legal rights after paying a claim", "B": "Generally not applicable — life insurance is not an indemnity contract and subrogation rarely applies", "C": "The policyhowner's right to transfer the policy to another person", "D": "The beneficiary's right to sue the insurer for payment"}, "correct": "B", "explanation": "Subrogation (the insurer stepping into the insured's shoes to recover from a third party) applies primarily to property/casualty and health insurance — indemnity contracts. Life insurance generally does not use subrogation because there is no concept of 'over-recovery' from a life (you can't be over-compensated for a death). There are rare exceptions in group policies."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "A 'revocable beneficiary' designation means the policyowner:", "options": {"A": "Can never change the beneficiary", "B": "May change the beneficiary at any time without the beneficiary's consent", "C": "Must obtain a court order to change the beneficiary", "D": "Can only change the beneficiary at policy anniversary"}, "correct": "B", "explanation": "A revocable beneficiary has no vested interest in the policy during the insured's lifetime. The policyowner retains full control and can change the beneficiary at will. Most individual life insurance policies name beneficiaries revocably. Contrast with irrevocable beneficiaries, who must consent to any change."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "An 'irrevocable beneficiary' has which of the following rights?", "options": {"A": "No rights — the policyowner controls all policy decisions", "B": "The right to be notified of premium due dates only", "C": "Vested rights in the policy — the policyowner cannot change the beneficiary, take loans, or surrender without their consent", "D": "The right to redirect benefits to a different person"}, "correct": "C", "explanation": "An irrevocable beneficiary designation gives the named beneficiary a vested property interest in the policy. The policyowner cannot change the beneficiary, assign the policy, take a policy loan, or surrender the policy without the irrevocable beneficiary's written consent. This is often used in divorce settlements or business buy-sell agreements."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "'Assignment' of a life insurance policy means:", "options": {"A": "The insurer assigns the claim to a collection agency", "B": "The policyowner transfers ownership rights (absolute) or uses the policy as collateral (collateral assignment)", "C": "The beneficiary takes over premium payments", "D": "The producer transfers their license to another agent"}, "correct": "B", "explanation": "Two assignment types: (1) Absolute assignment — complete transfer of all ownership rights (common in viatical settlements or gifts). (2) Collateral assignment — temporary transfer of policy rights as loan collateral; the lender (assignee) has rights only up to the loan amount. Most policies require notice to the insurer."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The 'payor benefit' rider in juvenile life insurance provides:", "options": {"A": "An increased death benefit if the insured child dies before age 21", "B": "Continued coverage if the premium payor (parent/guardian) becomes disabled or dies before the child reaches a specified age", "C": "A maturity benefit paid directly to the child at age 18", "D": "Premium refunds if the child outlives the coverage period"}, "correct": "B", "explanation": "The payor benefit rider waives premiums on a juvenile policy if the premium payor (typically a parent) dies or becomes totally disabled before the insured child reaches a specified age (usually 21 or 25). Without this rider, a parent's death could cause the policy to lapse for non-payment when the child most needs coverage."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "'Concealment' in insurance occurs when an applicant:", "options": {"A": "Answers questions with technically accurate but misleading statements", "B": "Intentionally fails to disclose a material fact that the insurer would want to know", "C": "Misremembers a date or age when completing the application", "D": "Declines to answer optional questions on the application"}, "correct": "B", "explanation": "Concealment is the intentional non-disclosure of a material fact, even if the insurer never specifically asked about it. The duty of utmost good faith requires the applicant to volunteer material information. Concealment can void the policy if the undisclosed fact was material to underwriting, even during the contestable period."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "A 'collateral assignment' of a life insurance policy means:", "options": {"A": "The policy is permanently given to a new owner", "B": "The policy is pledged as security for a loan — the assignee's rights are limited to the loan balance", "C": "The beneficiary can collect benefits directly from the insurer", "D": "The producer receives a share of the death benefit as compensation"}, "correct": "B", "explanation": "In a collateral assignment (e.g., SBA loan requirement), the lender gets first claim on the death benefit up to the outstanding loan balance. The original policyowner keeps all other rights. Upon loan repayment, rights revert fully to the policyowner. The insurer must be notified in writing."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The 'insurable interest' requirement in life insurance exists to:", "options": {"A": "Ensure the insured is in good health", "B": "Prevent insurance from being used as a wagering contract by those who would benefit from the insured's death", "C": "Guarantee the policy will be contestable", "D": "Require the insured to be the policyowner"}, "correct": "B", "explanation": "Insurable interest prevents moral hazard: you can only insure a life in which you have a financial or emotional interest (risk of financial loss from that person's death). For life insurance, insurable interest must exist at policy inception. Examples: yourself, spouse, business partner, key employee. Random strangers have no insurable interest in each other."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "When a policyowner dies and the policy's estate is named beneficiary, death benefits:", "options": {"A": "Are paid to the state if no will exists", "B": "Pass through the insured's estate, potentially subject to probate and creditors", "C": "Are automatically transferred to the surviving spouse", "D": "Are forfeited to the insurer"}, "correct": "B", "explanation": "Naming the 'estate' as beneficiary means proceeds pass through the probate process — they become part of the estate and may be subject to creditors, estate taxes, and distribution delays. This is generally less favorable than naming a specific beneficiary (who receives benefits directly, outside of probate). This is one key advantage of life insurance planning."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "'Viatical settlement' refers to:", "options": {"A": "A lump-sum payment to a terminally ill policyholder who sells their policy to a third-party investor at a discount", "B": "A policy provision accelerating death benefits for nursing home care", "C": "A settlement between the insurer and a disputing beneficiary", "D": "A structured settlement paid over time instead of a lump sum"}, "correct": "A", "explanation": "A viatical settlement allows a terminally ill (or chronically ill) person to sell their life insurance policy to a viatical settlement provider for a lump sum less than the face amount but more than the cash surrender value. The buyer pays future premiums and collects the death benefit. Maryland regulates viatical settlement providers and brokers."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "A 'per stirpes' beneficiary designation distributes the death benefit:", "options": {"A": "Equally among all surviving beneficiaries", "B": "To the insured's children; if a child predeceases the insured, that child's share passes to their own children (the insured's grandchildren)", "C": "To the state if any named beneficiary is deceased", "D": "Only to surviving named beneficiaries — deceased beneficiaries' shares are forfeited"}, "correct": "B", "explanation": "Per stirpes (Latin for 'by branch') is a method of distribution where each branch of the family receives an equal share. If a named beneficiary predeceases the insured, their share passes to their descendants. Contrast with 'per capita' (surviving beneficiaries split equally — no share passes to deceased beneficiary's children)."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The 'spendthrift clause' in a life insurance policy protects the beneficiary's death benefit from:", "options": {"A": "Federal income taxes", "B": "The beneficiary's creditors, until the funds are actually distributed", "C": "State inheritance taxes", "D": "The policyowner changing the beneficiary designation"}, "correct": "B", "explanation": "A spendthrift clause protects death benefit proceeds held under a settlement option from the beneficiary's creditors. Until the insurer actually distributes funds to the beneficiary, creditors cannot attach or garnish them. Once distributed, the spendthrift protection ends. This is valuable when naming a beneficiary who has debt problems."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "'Representations' in an insurance application differ from 'warranties' in that representations:", "options": {"A": "Are always legally binding", "B": "Are statements believed to be true but not guaranteed to be exactly accurate", "C": "Require the insurer's signature to be valid", "D": "Are legally binding only after the policy is issued"}, "correct": "B", "explanation": "Representations are statements the applicant believes to be true — they need not be exact, but they must be made in good faith. If a representation turns out to be false in a material way, the insurer may void the policy. Warranties (rarely used in modern insurance) are absolute guarantees that must be strictly true — even an innocent misstatement voids coverage."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The doctrine of 'reasonable expectations' in insurance contract interpretation means:", "options": {"A": "The insurer must meet the policyholder's most optimistic expectations", "B": "Courts may interpret policy coverage based on what a reasonable person would expect the policy to cover", "C": "The policyholder must read every word of the policy", "D": "The insurer sets all expectations in writing before policy delivery"}, "correct": "B", "explanation": "The reasonable expectations doctrine is used by courts to protect insureds: if a reasonable person would expect coverage based on the policy's representations and marketing, the court may find coverage even if the fine print seems to exclude it. This doctrine is particularly applied when policy language is ambiguous or when an insurer's marketing created reasonable coverage expectations."}, {"topic": "Types of life insurance policies", "question": "Which type of life insurance provides a guaranteed death benefit as long as premiums are paid, with no cash value accumulation?", "options": {"A": "Whole life insurance", "B": "Universal life insurance", "C": "Term life insurance", "D": "Variable life insurance"}, "correct": "C", "explanation": "Term life insurance provides pure death protection for a specified period (term). If the insured dies during the term, the face amount is paid. If the insured outlives the term, no benefit is paid and no cash value has accumulated. Term is the least expensive form of life insurance for a given face amount."}, {"topic": "Types of life insurance policies", "question": "'Level term' life insurance provides:", "options": {"A": "A death benefit that increases each year", "B": "A fixed death benefit and fixed premium for the entire term period", "C": "A decreasing death benefit with increasing premiums", "D": "A death benefit that changes with the insured's income"}, "correct": "B", "explanation": "Level term has both a constant (level) face amount and level (fixed) premiums throughout the policy term. This is the most common form of term insurance. The insured knows exactly what they're paying and what will be paid upon death throughout the term period."}, {"topic": "Types of life insurance policies", "question": "'Decreasing term' life insurance is most commonly used to:", "options": {"A": "Provide coverage that grows with the insured's wealth", "B": "Cover a mortgage or other loan where the outstanding balance decreases over time", "C": "Fund a business buy-sell agreement", "D": "Replace an executive's salary upon death"}, "correct": "B", "explanation": "Decreasing term has a declining death benefit (matching a decreasing debt balance) while premiums remain level. Mortgage protection insurance is a common decreasing term application — the policy benefit decreases as the mortgage balance is paid down. The coverage mirrors the insured's liability."}, {"topic": "Types of life insurance policies", "question": "Whole life insurance's cash value component is:", "options": {"A": "An optional savings account managed separately from the policy", "B": "An integral part of the policy that grows tax-deferred and can be accessed via loans or surrender", "C": "Paid out separately from the death benefit upon the insured's death", "D": "Available only after the policy has been in force for 20 years"}, "correct": "B", "explanation": "Whole life policies build cash value as premiums are paid, growing at a guaranteed rate tax-deferred. This cash value belongs to the policyowner and can be: (1) borrowed against via policy loans (without triggering tax), (2) used as collateral, or (3) received upon surrender. At death, the insurer typically pays the face amount (not face + cash value — the cash value is absorbed into the death benefit)."}, {"topic": "Types of life insurance policies", "question": "A 'limited pay whole life' policy (e.g., 20-pay life) differs from ordinary whole life in that:", "options": {"A": "The death benefit is paid over 20 installments", "B": "Premiums are paid only for a specified number of years, but coverage remains in force for life", "C": "The policy expires after 20 years", "D": "Coverage terminates when premiums stop"}, "correct": "B", "explanation": "Limited pay whole life provides permanent lifetime coverage but compresses the premium payment period. A 20-pay life policy is paid up after 20 annual premiums — no more premiums are due, but the death benefit continues for life. Higher annual premiums than ordinary whole life, but the policy is fully paid-up sooner."}, {"topic": "Types of life insurance policies", "question": "Universal life insurance provides 'flexible premium' and 'adjustable death benefit' because:", "options": {"A": "It has no cash value to constrain flexibility", "B": "Premiums and death benefits are set by the government", "C": "The policyowner can vary premium amounts and adjust the face amount within limits, as long as the cash value remains sufficient to cover monthly insurance charges", "D": "The insurer adjusts terms annually based on claims experience"}, "correct": "C", "explanation": "UL's flexibility: the policyowner can pay more (to build cash value) or less (even skip payments) as long as there's enough cash value to cover the monthly cost of insurance (COI) and expenses. The face amount can be increased (requires evidence of insurability) or decreased. This flexibility distinguishes UL from whole life's rigid premium structure."}, {"topic": "Types of life insurance policies", "question": "The 'interest-sensitive' aspect of universal life means that the cash value grows based on:", "options": {"A": "Stock market performance", "B": "Current interest rates credited by the insurer, with a guaranteed minimum", "C": "The insured's age and health rating", "D": "Fixed rates established at policy issue"}, "correct": "B", "explanation": "UL cash value earns interest at the insurer's current credited rate (tied to prevailing investment returns), with a minimum guaranteed rate (typically 2-4%). When interest rates are high, UL performs well; when rates fall, the credited rate may drop to the guaranteed minimum. This makes UL sensitive to the interest rate environment."}, {"topic": "Types of life insurance policies", "question": "Variable life insurance differs from whole life primarily in that variable life:", "options": {"A": "Has flexible premiums", "B": "Offers a guaranteed minimum death benefit but cash value fluctuates based on separate account (investment) performance", "C": "Has no cash value component", "D": "Cannot be surrendered for cash"}, "correct": "B", "explanation": "Variable life insurance invests the cash value in separate accounts (similar to mutual funds — stocks, bonds, or money market). The cash value and potentially the death benefit fluctuate with investment performance. A minimum guaranteed death benefit protects the insured. Variable products require the producer to hold both a life insurance license AND a FINRA securities registration (Series 6 or 63)."}, {"topic": "Types of life insurance policies", "question": "A 'survivorship life' (second-to-die) policy pays the death benefit:", "options": {"A": "When the first insured spouse dies", "B": "When the second (last surviving) insured dies", "C": "Upon the disability of either insured", "D": "When either insured reaches age 65"}, "correct": "B", "explanation": "Survivorship life insures two lives (typically spouses) under one policy and pays the death benefit only when the second insured dies. It's commonly used for estate planning: funding estate taxes that come due at the surviving spouse's death when the marital deduction no longer applies. Premiums are lower than separate policies since the insurer doesn't pay until both die."}, {"topic": "Types of life insurance policies", "question": "A 'modified premium whole life' policy offers:", "options": {"A": "Increasing death benefits over time", "B": "Lower initial premiums for the first few years that increase to a higher level for the remainder of the policy", "C": "Premiums that decrease as cash value grows", "D": "No cash value accumulation during the premium-paying period"}, "correct": "B", "explanation": "Modified whole life helps buyers who want permanent coverage but can't afford full whole life premiums initially. Premiums are reduced for years 1-3 (or 1-5), then step up to a higher level (but still level) for life. Total premium paid over the policy's life is higher than ordinary whole life. Cash value accumulates more slowly in early years."}, {"topic": "Types of life insurance policies", "question": "Which life insurance policy is designed to be 'paid up' (mature) when the insured reaches age 65 or 100?", "options": {"A": "Term to 65", "B": "Endowment policy", "C": "Ordinary whole life (life paid-up at 100)", "D": "Return of premium term"}, "correct": "C", "explanation": "Ordinary whole life is designed so that if the insured lives to age 100 (the traditional 'maturity age'), the cash value equals the face amount and the policy 'endows' — the insurer pays the face amount to the living policyholder. Modern policies often use age 121 as the maturity date to reflect increased life expectancy. If the insured dies before maturity, the face amount is paid."}, {"topic": "Types of life insurance policies", "question": "An 'endowment policy' matures when:", "options": {"A": "The policyowner stops paying premiums", "B": "The cash value equals the face amount at a specified age or after a specified number of years", "C": "The insured reaches Social Security retirement age", "D": "The policy has been in force for 20 years regardless of cash value"}, "correct": "B", "explanation": "An endowment policy pays the face amount to the policyowner if alive at the end of the endowment period (e.g., endow at 65 means the insured receives the face amount at age 65), or to the beneficiary if the insured dies during the period. Endowments build cash value very rapidly. The Tax Equity and Fiscal Responsibility Act (TEFRA) and DEFRA (1984) restricted tax treatment of endowments."}, {"topic": "Types of life insurance policies", "question": "Variable universal life (VUL) combines which features?", "options": {"A": "Whole life guarantees with term insurance flexibility", "B": "Universal life's flexible premiums with variable life's investment-linked cash value", "C": "Term insurance with a savings account", "D": "Group coverage with individual underwriting"}, "correct": "B", "explanation": "VUL combines UL's flexible premium structure with variable life's separate account investment options. Policyowners control premium amounts (within limits) and can allocate cash value among investment sub-accounts. Both the death benefit and cash value fluctuate with investment performance. VUL requires both a life license and FINRA securities registration."}, {"topic": "Types of life insurance policies", "question": "The 'free look' period for a life insurance policy in Maryland allows the policyowner to:", "options": {"A": "Examine the policy and return it for a full premium refund within 10 days of delivery", "B": "Change coverage amounts during the first 30 days", "C": "Add beneficiaries without evidence of insurability", "D": "Increase the face amount by 25% in the first year"}, "correct": "A", "explanation": "Maryland requires a minimum 10-day free look period for individual life insurance policies. During this period, the policyowner may review the policy and return it to the insurer or agent for any reason, receiving a full refund of premiums paid. The free look period begins when the policy is physically delivered."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'grace period' provision in a life insurance policy ensures:", "options": {"A": "A 10-day free-look right after delivery", "B": "Coverage continues for 31 days after a missed premium due date, giving time to pay", "C": "Automatic premium payment from cash value", "D": "The policy cannot lapse in the first 2 years"}, "correct": "B", "explanation": "The standard grace period for life insurance is 31 days. If the insured dies during the grace period (before the overdue premium is paid), the insurer pays the death benefit minus the overdue premium. After the grace period, the policy lapses (unless nonforfeiture options apply)."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "Which nonforfeiture option converts the policy to a fully paid-up whole life policy with a smaller face amount?", "options": {"A": "Extended term insurance", "B": "Reduced paid-up insurance", "C": "Cash surrender", "D": "Automatic premium loan"}, "correct": "B", "explanation": "Reduced paid-up insurance uses the cash value to purchase a paid-up whole life policy with a smaller face amount than the original. No more premiums are required. The policy remains in force for life with the reduced face amount, and continues to accumulate cash value. Preferred by those who want to keep permanent coverage but can't afford premiums."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "Which nonforfeiture option uses the cash value to purchase term insurance equal to the original face amount?", "options": {"A": "Reduced paid-up insurance", "B": "Automatic premium loan", "C": "Extended term insurance", "D": "Paid-up additions"}, "correct": "C", "explanation": "Extended term uses the cash value as a single premium to purchase term insurance in an amount equal to the original policy face amount. The term period depends on how much cash value is available. Preferred by those who want to maintain the full face amount for a period rather than a reduced amount for life."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'automatic premium loan' (APL) provision:", "options": {"A": "Automatically increases the face amount", "B": "Prevents policy lapse by automatically borrowing from the cash value to pay a missed premium", "C": "Reduces the death benefit by the loan amount permanently", "D": "Requires the insured to be disabled to activate"}, "correct": "B", "explanation": "APL prevents unintentional policy lapse by using the policy's cash value (via an automatic loan) to pay overdue premiums. The loan accrues interest. If not repaid, APL eventually exhausts the cash value and the policy lapses. The policyowner must specifically elect APL in advance."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "A 'waiver of premium' rider pays the policy's premiums if the insured:", "options": {"A": "Loses their job involuntarily", "B": "Becomes totally disabled for a specified period (usually 6 months)", "C": "Is hospitalized for more than 30 days", "D": "Reaches age 65"}, "correct": "B", "explanation": "Waiver of premium rider: if the insured becomes totally disabled and remains so for the elimination period (typically 6 months), the insurer waives all future premiums while the insured remains disabled. The policy remains fully in force — cash value continues to grow, coverage is maintained. This prevents disability from causing coverage loss."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'accidental death benefit' rider (double indemnity) pays:", "options": {"A": "An additional premium if the insured engages in hazardous activities", "B": "An additional death benefit (usually equal to the face amount) if death results from a covered accident", "C": "A living benefit for accidental injuries", "D": "Both the death benefit and a dismemberment benefit for all accidents"}, "correct": "B", "explanation": "The ADB rider (often called double indemnity) pays an additional benefit — usually equal to the policy face amount — if the insured's death results from a covered accidental cause within a specified period (often 90 days) of the accident. The total payout doubles (hence 'double indemnity'). Excluded: suicide, illness-related deaths, hazardous activities."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "A 'guaranteed insurability rider' (GIR) allows the insured to:", "options": {"A": "Keep the policy regardless of health changes", "B": "Purchase additional insurance at specified future dates without evidence of insurability", "C": "Convert term insurance to whole life at any time", "D": "Borrow against future premiums"}, "correct": "B", "explanation": "The GIR allows the insured to purchase additional life insurance at specified option dates (e.g., every 3 years, or at marriage/birth of child) without a medical exam. Only financial evidence is required. Valuable for young, healthy insureds who anticipate growing insurance needs — it locks in future insurability."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'incontestability clause' prevents the insurer from voiding a life insurance policy after:", "options": {"A": "6 months", "B": "1 year", "C": "2 years", "D": "5 years"}, "correct": "C", "explanation": "The incontestability clause (required by law in all states) prohibits the insurer from contesting policy validity based on misrepresentations in the application after the policy has been in force for 2 years. The insured's coverage becomes incontestable. Exception: fraudulent misrepresentations (intentional deception) may be contestable even after 2 years in some jurisdictions."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'suicide clause' in a life insurance policy typically provides that if the insured commits suicide within the first 2 years:", "options": {"A": "The policy is void and no benefits are paid", "B": "The insurer refunds premiums paid but does not pay the face amount", "C": "Only the cash value is paid", "D": "The full death benefit is still paid to protect beneficiaries"}, "correct": "B", "explanation": "The suicide clause (typically 1-2 year exclusion period) returns premiums paid if the insured commits suicide during the exclusion period. After the exclusion period, suicide is covered like any other cause of death. This prevents individuals from purchasing insurance immediately before a planned suicide."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'misstatement of age or sex' provision in a life insurance policy adjusts the:", "options": {"A": "Policy premium retroactively with interest", "B": "Death benefit to the amount the premium paid would have purchased at the correct age/sex", "C": "Policy effective date to the correct birthday", "D": "Policy owner to the estate if age was understated"}, "correct": "B", "explanation": "If the insured's age or sex was misstated in the application, the policy is not voided. Instead, the death benefit is adjusted to what the premium actually paid would have purchased at the correct age and sex. If age was understated (insured is older), the benefit decreases. If overstated, the benefit increases or excess premiums are refunded."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "A 'term conversion' option (right to convert) allows the owner of a term policy to:", "options": {"A": "Extend the term without new underwriting for an additional 10 years", "B": "Convert the term policy to a permanent (whole life or universal life) policy without evidence of insurability", "C": "Convert the policy to a disability income policy", "D": "Switch insurance companies while maintaining the same face amount"}, "correct": "B", "explanation": "The conversion privilege lets the term policyholder exchange their term policy for a permanent policy (typically using attained-age or original-age rates) without a medical exam. This is extremely valuable if the insured's health has deteriorated since the term policy was issued. Most term policies have a conversion deadline (e.g., before age 65 or within the first 10 years)."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The 'reinstatement' provision allows a lapsed life insurance policy to be restored if the policyowner:", "options": {"A": "Pays the next due premium only, within 60 days of lapse", "B": "Pays all overdue premiums with interest, provides evidence of insurability, and applies within the reinstatement period (typically 3-5 years)", "C": "Files a written request with the state insurance commissioner", "D": "Completes a new application and pays a reinstatement fee"}, "correct": "B", "explanation": "Reinstatement restores a lapsed policy to its original terms. Requirements: (1) apply within the reinstatement period (typically 3-5 years), (2) pay all overdue premiums with interest, (3) provide satisfactory evidence of insurability (medical exam or statement of good health), and (4) repay or reinstate any outstanding policy loans. The original policy dates are preserved (important for the contestability period)."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "Which provision protects the policyowner's right to cash in the policy for its cash surrender value?", "options": {"A": "The grace period provision", "B": "The nonforfeiture provision", "C": "The settlement options provision", "D": "The assignment provision"}, "correct": "B", "explanation": "Nonforfeiture provisions guarantee that a policyowner who has paid premiums does not 'forfeit' everything when they stop paying. The options (cash surrender, reduced paid-up, extended term) ensure the policyowner receives fair value for the equity built up in the policy. These provisions are required by law in all states."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Life insurance premiums are primarily based on which three factors?", "options": {"A": "Age, income, and credit score", "B": "Mortality (probability of death), interest (investment earnings), and loading (expenses)", "C": "Health, occupation, and geographic location", "D": "Age, policy type, and insurer profitability"}, "correct": "B", "explanation": "The three actuarial factors in premium calculation: (1) Mortality — the probability of death at each age (using mortality tables); (2) Interest — expected investment return on premium reserves; (3) Loading — expense factor covering operating costs, commissions, and profit margin. Net premium = mortality ÷ interest; gross premium = net premium + loading."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "The 'net single premium' for a life insurance policy represents:", "options": {"A": "The gross premium minus commissions", "B": "The present value of the future death benefit — what must be collected today, in one payment, to fund the benefit", "C": "The minimum premium required to keep the policy in force", "D": "The premium after surrender charges are deducted"}, "correct": "B", "explanation": "The net single premium (NSP) is the mathematically pure amount that, if invested today at the assumed interest rate, would grow to cover all future death benefits for a group of similar insureds. It reflects the time value of money — a benefit payable 30 years from now requires much less money today than the face amount."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Why do life insurance premiums increase significantly after the contestable period ends?", "options": {"A": "Insurance companies charge more for proven policyholders", "B": "Premiums do not increase after the contestable period in most policies", "C": "Administrative costs increase as policies age", "D": "Premiums may increase with age in term policies because mortality risk increases"}, "correct": "D", "explanation": "For annually renewable term insurance, premiums increase each year because the probability of death increases with age. Level term policies lock in a fixed premium for the term period — they don't change until renewal. Whole life premiums remain level for life because the insurer charges a level premium that is higher than necessary in early years (overfunding the reserve) to compensate for later years."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "The 'lump sum' method of distributing life insurance death benefits:", "options": {"A": "Pays the benefit over 20 equal installments", "B": "Pays the entire death benefit in one payment — the most common method and the default if no settlement option is elected", "C": "Requires the insurer's approval before payment", "D": "Triggers an immediate estate tax assessment"}, "correct": "B", "explanation": "Lump sum is the default death benefit distribution. The insurer pays the entire face amount (plus any dividend accumulations or additional benefits) in one payment. Beneficiaries may elect a settlement option instead, but if none is chosen, lump sum is automatic. Life insurance death benefits are generally income-tax-free to the beneficiary."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Under the 'interest only' settlement option:", "options": {"A": "The insurer pays only accumulated interest and retains the principal indefinitely", "B": "The insurer holds the death benefit principal and pays only the interest earned to the beneficiary; principal may be withdrawn later", "C": "Payments are made for a fixed period equal to the policy's term", "D": "The benefit is reduced to only the interest earned during the grace period"}, "correct": "B", "explanation": "Interest-only: the insurer keeps the principal (death benefit) and pays regular interest to the beneficiary. The principal remains intact and can typically be withdrawn by the beneficiary at any time or passed to a contingent beneficiary. Useful when a surviving spouse doesn't immediately need the principal."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "The 'fixed period' settlement option pays:", "options": {"A": "A fixed amount each month until the proceeds run out", "B": "Equal installments over a specified number of years, regardless of the beneficiary's survival", "C": "Payments only as long as the beneficiary is alive", "D": "One payment per year for the life of the beneficiary"}, "correct": "B", "explanation": "Fixed period: the death benefit plus interest is paid out in equal installments over a specified period (e.g., 10 years). Payments continue to the estate even if the beneficiary dies during the period. Contrast with life income options, where payments cease at the beneficiary's death."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "The 'life income' settlement option provides:", "options": {"A": "Payments for a fixed number of years regardless of survival", "B": "Guaranteed income for the rest of the beneficiary's life — the insurer bears the longevity risk", "C": "A lump sum at the beneficiary's 65th birthday", "D": "Payments that stop when the principal is exhausted"}, "correct": "B", "explanation": "Life income (life annuity) option guarantees the beneficiary an income for life. The insurer calculates payments based on the death benefit amount and the beneficiary's life expectancy (like an annuity). The beneficiary cannot outlive the payments. Common variants: life only (no guarantee period), life with period certain (payments guaranteed for minimum years), and joint and survivor (for two lives)."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "A 'primary beneficiary' designation means:", "options": {"A": "The insurer's primary contact for administrative matters", "B": "The first person designated to receive death benefits if living at the insured's death", "C": "The person who pays the premiums", "D": "The person with the highest insurable interest"}, "correct": "B", "explanation": "Primary beneficiary: first in line to collect the death benefit. Contingent (secondary) beneficiary: receives benefits only if all primary beneficiaries predecease the insured. If no beneficiaries survive the insured and no contingent beneficiary is named, proceeds are paid to the insured's estate."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Life insurance death benefits paid directly to a named beneficiary are:", "options": {"A": "Subject to the beneficiary's federal income tax", "B": "Generally income-tax-free to the beneficiary as a death benefit", "C": "Taxable if the policy had cash value", "D": "Taxable if the policy was issued within 3 years of the insured's death"}, "correct": "B", "explanation": "IRC § 101(a) excludes life insurance death benefits from federal income tax when paid by reason of death. This is one of life insurance's most significant tax advantages. Exceptions: (1) if benefits are paid in installments and include interest, the interest portion is taxable; (2) transfers for value rule (policy sold to a third party — proceeds may be taxable above basis)."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "The 'facility of payment' clause in group life insurance allows the insurer to:", "options": {"A": "Pay premiums on behalf of group members", "B": "Pay a small death benefit to a relative or person covering funeral expenses when no beneficiary has been named", "C": "Transfer the policy to any group member", "D": "Pay benefits directly to medical providers"}, "correct": "B", "explanation": "The facility of payment provision addresses the practical problem of small death benefits with no named beneficiary. It allows the insurer to pay up to a specified amount (often $1,000-$2,000) to a relative, friend, or person who paid funeral expenses, without the need for probate proceedings. This facilitates payment without administrative delays."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Premium rates are lower for 'preferred' insureds compared to 'standard' insureds because:", "options": {"A": "Preferred insureds pay more frequently", "B": "Preferred insureds present statistically better-than-average mortality risk due to health, lifestyle, and family history", "C": "Standard insureds must pay a surcharge", "D": "Preferred rates apply only to group policies"}, "correct": "B", "explanation": "Life insurance risk classification: preferred plus (best rates) → preferred → standard → substandard (rated). Preferred status typically requires: no tobacco use, excellent health metrics (blood pressure, cholesterol, BMI), clean driving record, and favorable family history. Better risk = lower expected mortality = lower premium."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "If a life insurance policy has accumulated dividends and the insured dies, the death benefit paid is:", "options": {"A": "Only the face amount — dividends are returned to the insurer", "B": "The face amount plus any accumulated dividends (or minus any outstanding policy loans)", "C": "The face amount only if dividends were used to reduce premiums", "D": "The greater of the face amount or the cash value"}, "correct": "B", "explanation": "The death benefit typically includes: the base face amount + any paid-up additions purchased with dividends + accumulated dividend deposits, minus any outstanding policy loans. So retained dividends (in whatever form) generally add to the death benefit. Dividends used to reduce premiums reduce the cash value but don't affect the face amount."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "A 'spendthrift' provision on a settlement option protects the beneficiary by:", "options": {"A": "Limiting the beneficiary to spending only the interest earned", "B": "Preventing the beneficiary's creditors from accessing retained proceeds before distribution", "C": "Requiring the beneficiary to invest in annuities", "D": "Limiting total lifetime withdrawals to the original death benefit amount"}, "correct": "B", "explanation": "The spendthrift provision protects death benefit proceeds retained by the insurer (under a settlement option) from the beneficiary's creditors. While the insurer holds the funds, creditors cannot garnish or attach them. Once distributed to the beneficiary, normal creditor rules apply. This is valuable estate planning protection."}, {"topic": "Life insurance underwriting & policy issue", "question": "The purpose of life insurance underwriting is to:", "options": {"A": "Generate maximum premium revenue for the insurer", "B": "Assess and classify applicants according to their mortality risk to ensure fair pricing and prevent adverse selection", "C": "Guarantee every applicant is offered coverage", "D": "Maximize the number of policies issued"}, "correct": "B", "explanation": "Underwriting evaluates the risk each applicant presents and classifies them appropriately (preferred, standard, substandard, or declined). Without underwriting, healthy people would be overcharged and sick people undercharged — leading to adverse selection where only high-risk people buy insurance, making it unaffordable."}, {"topic": "Life insurance underwriting & policy issue", "question": "Adverse selection in insurance occurs when:", "options": {"A": "Insurers select the best-paying clients", "B": "People with higher-than-average risk are more likely to seek insurance than healthy people", "C": "Agents select which applicants to present to underwriters", "D": "Only wealthy people can afford life insurance"}, "correct": "B", "explanation": "Adverse selection (anti-selection) is the tendency of higher-risk individuals to seek insurance more aggressively than lower-risk individuals. Without underwriting controls, an insurer that charged everyone the same rate would attract disproportionately high-risk applicants, causing actual claims to exceed predictions and premiums to spiral upward."}, {"topic": "Life insurance underwriting & policy issue", "question": "An 'attending physician statement' (APS) is ordered by the underwriter to:", "options": {"A": "Certify the producer is licensed", "B": "Obtain detailed medical information directly from the applicant's doctor about their health history", "C": "Confirm the insured's employment", "D": "Document the insured's travel history"}, "correct": "B", "explanation": "When an application discloses a health condition, the underwriter may request an APS from the applicant's doctor for more detailed clinical information: diagnosis, treatment dates, prognosis, medications, test results. APS requests are common for conditions like heart disease, cancer, diabetes, or recent surgeries."}, {"topic": "Life insurance underwriting & policy issue", "question": "The 'MIB' (Medical Information Bureau / MIB Group) provides life insurance underwriters with:", "options": {"A": "Standardized premium rate tables", "B": "Coded records of medical conditions reported by applicants to other MIB member insurers", "C": "The applicant's credit score and financial history", "D": "Prescription drug databases updated in real time"}, "correct": "B", "explanation": "MIB is a cooperative data exchange. When a member insurer underwrites an application, they report coded medical conditions to MIB. Subsequent insurers can query MIB to check for inconsistencies between the current application and prior applications. Applicants must be notified of MIB use and have the right to access and correct their records."}, {"topic": "Life insurance underwriting & policy issue", "question": "A 'paramedical exam' in life insurance underwriting typically includes:", "options": {"A": "A full psychiatric evaluation", "B": "Blood pressure, height/weight measurements, blood and urine samples, and health history questions", "C": "A stress test and echocardiogram", "D": "A review of the applicant's investment portfolio"}, "correct": "B", "explanation": "Paramedical exams are conducted by trained examiners (not necessarily physicians) at the applicant's home or office. They collect: vital signs, height/weight (BMI), blood and urine samples (for cholesterol, glucose, HIV, nicotine, etc.), and health history. Full physician exams are required for very large face amounts."}, {"topic": "Life insurance underwriting & policy issue", "question": "When an insurance application is approved 'as applied for,' it means:", "options": {"A": "The policy is issued at substandard rates", "B": "Coverage is issued with the face amount, premium, and terms exactly as requested in the application", "C": "The insurer has approved only part of the coverage requested", "D": "The policy requires a medical exam before taking effect"}, "correct": "B", "explanation": "'As applied for' is the best outcome for the applicant: the policy is issued exactly as requested, at standard (or preferred) rates, for the full face amount. No modifications, exclusions, or premium loads are applied. This reflects that the underwriter found the risk to be acceptable at standard or better rates."}, {"topic": "Life insurance underwriting & policy issue", "question": "A 'rated' or 'substandard' life insurance policy means:", "options": {"A": "The policy was approved for a reduced face amount", "B": "The policy was issued with higher-than-standard premiums to reflect higher-than-average mortality risk", "C": "The policy cannot be converted to a permanent form", "D": "The insurer has declined to cover certain body parts"}, "correct": "B", "explanation": "Rated policies add a mortality charge to the standard premium — expressed as table ratings (Table B through J) or flat extras (a dollar amount per $1,000 of face amount). A Table D rating applies 4 additional tables of mortality, increasing the premium. The higher premium reflects the insurer's higher expected claims from this individual."}, {"topic": "Life insurance underwriting & policy issue", "question": "Which of the following is a 'build' factor in life insurance underwriting?", "options": {"A": "The applicant's tobacco use history", "B": "The applicant's height-to-weight ratio (BMI) indicating overweight or underweight status", "C": "The applicant's driving record", "D": "The applicant's geographic location"}, "correct": "B", "explanation": "'Build' refers to the relationship between height and weight. Overweight (high BMI) increases mortality risk through cardiovascular disease, diabetes, and other conditions. Underweight can indicate illness. Insurance companies maintain build charts showing which height-weight combinations qualify for standard, preferred, or substandard rates."}, {"topic": "Life insurance underwriting & policy issue", "question": "If an insured dies during the period between application and policy delivery (before the first premium is paid), coverage generally:", "options": {"A": "Exists because the application created an insurable interest", "B": "Does not exist unless the applicant paid the initial premium and received a conditional receipt", "C": "Is provided automatically for 30 days from the application date", "D": "Is determined by the producer's field underwriting decision"}, "correct": "B", "explanation": "Without a conditional receipt (which provides interim coverage upon payment of the initial premium and subject to insurability), no coverage exists between application and policy delivery. A conditional receipt creates temporary coverage from the date of application, subject to the condition that the applicant would have been approved had they been examined on that date."}, {"topic": "Life insurance underwriting & policy issue", "question": "The 'free look' period for a life insurance policy in Maryland is at least:", "options": {"A": "5 days", "B": "10 days", "C": "20 days", "D": "30 days"}, "correct": "B", "explanation": "Maryland requires a minimum 10-day free-look (right to examine) period for individual life insurance policies delivered within the state. During this period, the policyowner may return the policy for any reason and receive a full refund of all premiums paid."}, {"topic": "Life insurance underwriting & policy issue", "question": "An insurance producer who signs an applicant's name to an application without authorization is committing:", "options": {"A": "A technical violation that can be corrected by the applicant's signature later", "B": "Forgery — a serious crime that may result in criminal prosecution and license revocation", "C": "An error only if the information is incorrect", "D": "An acceptable field underwriting practice"}, "correct": "B", "explanation": "Forging a signature on an insurance application is a criminal act (forgery) and a serious insurance fraud violation. It can result in: criminal prosecution, fines, imprisonment, and permanent license revocation. Producers must obtain the applicant's actual signature on the application."}, {"topic": "Life insurance underwriting & policy issue", "question": "'Backdating' a life insurance policy is permitted when it:", "options": {"A": "Covers a period before the application was submitted", "B": "Saves age — allows the policy to be dated back to a date when the insured was younger (usually within 6 months), resulting in lower premiums", "C": "Extends coverage retroactively to cover a pre-existing condition", "D": "Makes the policy incontestable immediately"}, "correct": "B", "explanation": "Backdating to save age is permitted in most states (including Maryland) within limits, typically no more than 6 months. If the insured's birthday just passed and turning to the next age would increase premiums, backdating the policy to before the birthday achieves lower rates. The applicant pays back premiums for the backdated period but benefits from lower long-term premiums."}, {"topic": "Life insurance underwriting & policy issue", "question": "Which factor below is typically NOT a standard life insurance underwriting consideration?", "options": {"A": "Family medical history (hereditary conditions)", "B": "Tobacco use", "C": "Recreational drug or alcohol history", "D": "Religious affiliation"}, "correct": "D", "explanation": "Religion is not a permissible underwriting factor — it is a protected characteristic. Standard underwriting considers: age, sex (in most markets), health history, family history, tobacco use, occupation, avocation (hobbies), driving record, substance use history, and financial justification for the face amount."}, {"topic": "Group life insurance", "question": "Which of the following is a key characteristic of group life insurance?", "options": {"A": "Each group member is individually underwritten", "B": "The group is underwritten as a whole — individual members generally require no evidence of insurability during open enrollment", "C": "Each member owns their individual certificate", "D": "Group policies are always issued for a minimum of 50 lives"}, "correct": "B", "explanation": "Group life insurance uses group underwriting: the employer/plan sponsor is the policyholder; individual employees receive certificates of participation. The group's characteristics (size, turnover, industry) determine rates. Individual medical underwriting is generally not required during open enrollment."}, {"topic": "Group life insurance", "question": "Under a group life insurance plan, the 'master policy' is held by:", "options": {"A": "Each individual employee", "B": "The employer or group sponsor", "C": "The state insurance commissioner", "D": "Each beneficiary named in the plan"}, "correct": "B", "explanation": "In group insurance, the employer (or association or trust) is the policyholder and holds the single master policy. Each employee receives a certificate of insurance summarizing their coverage. The master policy contains all terms, conditions, and rates."}, {"topic": "Group life insurance", "question": "The minimum group size requirement for group life insurance in Maryland is:", "options": {"A": "2 eligible lives", "B": "5 eligible lives", "C": "10 eligible lives", "D": "25 eligible lives"}, "correct": "A", "explanation": "Maryland, like most states following the NAIC model, allows group life insurance policies with as few as 2 eligible members. This enables very small businesses (even 2-person firms) to provide group life benefits. Larger groups generally receive better rates and looser underwriting."}, {"topic": "Group life insurance", "question": "'Evidence of insurability' is required in group life insurance when an employee:", "options": {"A": "First joins the employer during open enrollment", "B": "Applies for coverage outside of the initial open enrollment period (late entrant)", "C": "Is over age 65", "D": "Changes their beneficiary designation"}, "correct": "B", "explanation": "Late entrants — employees who didn't enroll when first eligible and now want to join outside of open enrollment — must provide evidence of insurability (health statement or medical exam). This prevents adverse selection where sick employees delay enrollment until they need the benefit."}, {"topic": "Group life insurance", "question": "Group term life insurance is typically provided in amounts based on:", "options": {"A": "Each employee's credit rating", "B": "A schedule related to salary, position, or a flat amount for all employees", "C": "The employee's years of service only", "D": "The number of dependents each employee has"}, "correct": "B", "explanation": "Group life amounts are set by a formula to prevent adverse selection and comply with nondiscrimination rules: (1) flat amount for all employees, (2) multiple of annual salary (1x, 2x, 3x salary), (3) position-based schedule (managers get more than hourly workers). Individual election is generally not permitted."}, {"topic": "Group life insurance", "question": "Employer-provided group term life insurance premiums for coverage over $50,000 are:", "options": {"A": "Fully tax-deductible by the employee", "B": "Included in the employee's gross income as imputed income (phantom income) based on IRS Table I rates", "C": "Tax-free to the employee regardless of amount", "D": "Subject to a 10% excise tax"}, "correct": "B", "explanation": "IRS rules (IRC § 79): up to $50,000 of employer-paid group term life coverage is a tax-free employee benefit. The cost of coverage above $50,000 (calculated using IRS Table I rates, not actual premium) is imputed as taxable income to the employee. Employees report this 'phantom income' on their W-2."}, {"topic": "Group life insurance", "question": "'Conversion privilege' in group life insurance allows a terminated employee to:", "options": {"A": "Transfer their coverage to a new employer's plan immediately", "B": "Convert their group term coverage to an individual permanent policy without evi
