rer's ability to verify claims. The insurer may require an independent medical examination (IME) during a pending disability or health claim, and may require an autopsy when death benefits are claimed, unless prohibited by state law."}, {"topic": "Health insurance policy provisions", "question": "Which provision requires a health insurer to pay claims within a certain number of days after receiving satisfactory proof of loss?", "options": {"A": "Proof of loss provision", "B": "Time of payment of claims provision", "C": "Legal actions provision", "D": "Notice of claim provision"}, "correct": "B", "explanation": "The 'time of payment of claims' provision requires the insurer to pay claims immediately (or within a specified period) upon receipt of satisfactory proof of loss. This protects insureds from unnecessary delays. Maryland regulations require prompt payment of claims."}, {"topic": "Health insurance policy provisions", "question": "The 'misstatement of age' provision in a health insurance policy states that if the insured's age is misstated:", "options": {"A": "The policy is void from inception", "B": "Benefits are adjusted to the amount that the premium paid would have purchased at the correct age", "C": "The insured must pay the difference in premiums for all past years", "D": "The insurer may cancel the policy without refund"}, "correct": "B", "explanation": "The misstatement of age provision prevents policy voidance for age errors. Instead, benefits are adjusted proportionally — if the insured is older than stated, benefits are reduced; if younger, benefits may be increased. This is the same concept as in life insurance."}, {"topic": "Health insurance policy provisions", "question": "A health insurance policy's 'legal actions' provision typically requires the insured to wait at least how long after filing proof of loss before suing the insurer?", "options": {"A": "30 days", "B": "60 days", "C": "90 days", "D": "6 months"}, "correct": "B", "explanation": "The legal actions provision requires the insured to wait at least 60 days after submitting proof of loss before bringing a legal action against the insurer. This gives the insurer time to process the claim. Most states (including Maryland) also set a maximum period (typically 3-6 years) for filing suit."}, {"topic": "Health insurance underwriting & renewability", "question": "Which renewability provision provides the insured the greatest protection against policy cancellation?", "options": {"A": "Optionally renewable", "B": "Guaranteed renewable", "C": "Non-cancelable", "D": "Conditionally renewable"}, "correct": "C", "explanation": "A non-cancelable policy cannot be canceled AND premiums cannot be increased by the insurer, as long as premiums are paid. Guaranteed renewable means the policy cannot be canceled but premiums can be increased on a class basis. Non-cancelable is the strongest protection."}, {"topic": "Health insurance underwriting & renewability", "question": "An 'optionally renewable' health policy gives the insurer the right to:", "options": {"A": "Cancel the policy at any time for any reason", "B": "Decline to renew the policy at each renewal date", "C": "Increase premiums on any individual insured at any time", "D": "Limit benefits for specific conditions after the first year"}, "correct": "B", "explanation": "An optionally renewable policy allows the insurer to decline renewal at each renewal date (anniversary or premium due date). The insurer cannot cancel mid-term but has full discretion to non-renew at renewal. This provides the least continuity protection to the insured."}, {"topic": "Health insurance underwriting & renewability", "question": "Under HIPAA, which applies in the individual health insurance market?", "options": {"A": "Guaranteed issue for all individuals regardless of health status", "B": "Guaranteed renewability for individuals who had prior group coverage", "C": "A prohibition on all pre-existing condition exclusions", "D": "Required coverage of all pre-existing conditions from day one"}, "correct": "B", "explanation": "HIPAA provided guaranteed renewability in the individual market for individuals who had prior group coverage (with creditable coverage credit). Full guaranteed issue in the individual market was established by the ACA, not HIPAA. HIPAA also limited (but did not eliminate) pre-existing condition exclusions in the group market."}, {"topic": "Health insurance underwriting & renewability", "question": "A 'pre-existing condition exclusion' in a health insurance policy means the insurer will not cover:", "options": {"A": "Any condition the insured develops after the policy is issued", "B": "A condition that was diagnosed or treated within a specified period before the coverage effective date", "C": "Conditions that the insured did not disclose on the application", "D": "Any condition that the insured had at birth"}, "correct": "B", "explanation": "A pre-existing condition exclusion limits coverage for conditions that existed before the policy took effect. The look-back period and exclusion period are defined in the policy. The ACA eliminated pre-existing condition exclusions for most health plans effective 2014."}, {"topic": "Health insurance underwriting & renewability", "question": "Under the ACA, which entity is prohibited from using health status, medical history, or pre-existing conditions to determine eligibility or premiums?", "options": {"A": "Short-term health insurance plans", "B": "Grandfathered individual plans", "C": "ACA-compliant individual and group market plans", "D": "Medicare supplement (Medigap) plans"}, "correct": "C", "explanation": "ACA-compliant plans in the individual and small group markets cannot use health status factors (medical history, pre-existing conditions, claims experience, gender, or occupation) to determine eligibility or premium rates. Only age (within 3:1 ratio), tobacco use, geography, and family size are permitted rating factors."}, {"topic": "Health insurance underwriting & renewability", "question": "An individual health underwriter is reviewing an application. Which rating factor is currently prohibited under the ACA for individual market plans?", "options": {"A": "Age", "B": "Geographic location", "C": "Gender", "D": "Tobacco use"}, "correct": "C", "explanation": "The ACA prohibits gender rating in individual and small group market plans. Before the ACA, women were frequently charged higher premiums than men for the same coverage. Only four rating factors are now permitted: age, tobacco use, geographic location, and plan category."}, {"topic": "Health insurance underwriting & renewability", "question": "A 'guaranteed issue' requirement means a health insurer must:", "options": {"A": "Guarantee premium rates for the full policy term", "B": "Accept all applicants regardless of health status", "C": "Issue a minimum benefit amount to all policyholders", "D": "Issue refunds if premiums exceed claims in any year"}, "correct": "B", "explanation": "Guaranteed issue requires insurers to accept all applicants for coverage without regard to health status, pre-existing conditions, or claims history. The ACA established guaranteed issue for individual and group markets. HIPAA established it for small employer groups meeting certain criteria."}, {"topic": "Health insurance underwriting & renewability", "question": "The 'actively-at-work' provision in a group health plan means:", "options": {"A": "All employees must work full-time to receive benefits", "B": "An employee must be at work on the date the group plan becomes effective or the date they become eligible to be covered under the plan", "C": "Claims are only covered if the condition arose while the employee was at work", "D": "Coverage terminates immediately when an employee stops working"}, "correct": "B", "explanation": "The actively-at-work requirement means employees must be actively working on their enrollment date for coverage to take effect. An employee who is absent due to illness on their scheduled enrollment date may not be covered until they return to work."}, {"topic": "Maryland Insurance Article & required numbers", "question": "Which state agency regulates the insurance industry in Maryland?", "options": {"A": "Maryland Department of Financial Regulation", "B": "Maryland Insurance Administration (MIA)", "C": "Maryland Office of Financial Regulation", "D": "Maryland Department of Commerce"}, "correct": "B", "explanation": "The Maryland Insurance Administration (MIA) is the state agency responsible for regulating the insurance industry in Maryland. The Insurance Commissioner heads the MIA and is appointed by the Governor. The MIA licenses producers, approves policy forms and rates, and enforces Maryland insurance law."}, {"topic": "Maryland Insurance Article & required numbers", "question": "The primary Maryland statute governing insurance is:", "options": {"A": "Maryland Code, Business Regulation Article", "B": "Maryland Code, Insurance Article", "C": "Maryland Code, Commercial Law Article", "D": "Maryland Code, Financial Institutions Article"}, "correct": "B", "explanation": "Maryland's insurance industry is governed primarily by the Insurance Article of the Annotated Code of Maryland. This comprehensive statute covers licensing, policy requirements, claims, rates, market conduct, and consumer protection."}, {"topic": "Maryland Insurance Article & required numbers", "question": "In Maryland, the Insurance Commissioner has the authority to do all of the following EXCEPT:", "options": {"A": "Conduct market conduct examinations of insurers", "B": "Impose fines for insurance law violations", "C": "Prosecute insurance fraud as a criminal matter in court", "D": "Revoke or suspend an insurance producer's license"}, "correct": "C", "explanation": "Criminal prosecution of insurance fraud is handled by law enforcement and state attorneys, not the Insurance Commissioner. The Commissioner's authority is administrative: licensing, examinations, fines, cease-and-desist orders, and license actions. Criminal matters are referred to appropriate authorities."}, {"topic": "Maryland Insurance Article & required numbers", "question": "Maryland requires continuing education for licensed insurance producers. The CE requirement is:", "options": {"A": "16 hours every 2 years", "B": "20 hours every 2 years", "C": "24 hours every 2 years", "D": "30 hours every 2 years"}, "correct": "C", "explanation": "Maryland requires licensed insurance producers to complete 24 hours of continuing education every 2 years. Of those 24 hours, 3 hours must cover ethics. CE requirements apply to each line of insurance for which the producer holds a license."}, {"topic": "Maryland Insurance Article & required numbers", "question": "Maryland uses which testing provider for the state insurance licensing examination?", "options": {"A": "Prometric", "B": "Pearson VUE", "C": "PSI Services", "D": "Prometrics"}, "correct": "C", "explanation": "Maryland administers its insurance licensing examinations through PSI Services. Candidates must schedule and pass the appropriate state examination through PSI before submitting a license application to the MIA. Exam scores are valid for 1 year."}, {"topic": "Maryland Insurance Article & required numbers", "question": "In Maryland, a new insurance producer license applicant must complete a pre-licensing education requirement before taking the state exam. For Life & Health, this requirement is:", "options": {"A": "20 hours", "B": "40 hours", "C": "52 hours", "D": "60 hours"}, "correct": "B", "explanation": "Maryland requires 40 hours of pre-licensing education for the Life & Health insurance producer license. This education must be from an MIA-approved provider and covers the knowledge areas tested on the state licensing exam."}, {"topic": "Maryland Insurance Article & required numbers", "question": "How long is an initial Maryland insurance producer license valid?", "options": {"A": "1 year", "B": "2 years", "C": "Until age 65", "D": "Indefinitely unless revoked"}, "correct": "B", "explanation": "Maryland insurance producer licenses are issued on a 2-year cycle and must be renewed every 2 years. The renewal requires completion of CE requirements and payment of the renewal fee."}, {"topic": "Maryland Insurance Article & required numbers", "question": "Under Maryland law, a producer who moves to a new address must notify the MIA within:", "options": {"A": "10 days", "B": "30 days", "C": "60 days", "D": "90 days"}, "correct": "B", "explanation": "Maryland producers are required to notify the MIA of an address change within 30 days of the change. Failure to maintain current contact information with the MIA can result in administrative action."}, {"topic": "Maryland Insurance Article & required numbers", "question": "Maryland's prompt payment law requires health insurers to pay clean claims from healthcare providers within:", "options": {"A": "15 days", "B": "30 days", "C": "45 days", "D": "60 days"}, "correct": "C", "explanation": "Maryland's prompt payment requirements generally require insurers to pay or deny clean claims from in-network providers within 30 days of electronic submission or 45 days of paper submission. Untimely payment may result in interest penalties."}, {"topic": "Maryland Insurance Article & required numbers", "question": "An insurance producer in Maryland who acts as an agent of the insurer (not the insured) owes a fiduciary duty to:", "options": {"A": "The insured policyholder only", "B": "The insurer they represent", "C": "Both the insured and the insurer equally", "D": "The MIA as the regulatory authority"}, "correct": "B", "explanation": "An insurance agent acts as a representative of the insurer, with authority to bind coverage and collect premiums on the insurer's behalf. An insurance broker, by contrast, represents the insured in shopping for coverage. Both must act honestly and in accordance with their duties."}, {"topic": "Maryland Insurance Article & required numbers", "question": "Under Maryland law, which of the following would constitute an unfair claims settlement practice?", "options": {"A": "Requesting a medical examination of the claimant", "B": "Denying a claim without explaining the basis for denial in writing", "C": "Investigating a claim before making a payment decision", "D": "Requesting additional documentation to verify a claim"}, "correct": "B", "explanation": "Maryland's unfair claims settlement practices (Insurance Article § 27-303) include denying claims without providing a written explanation of the basis for denial. Insurers must communicate their position clearly and in good faith."}, {"topic": "Producer licensing & reporting rules", "question": "A Maryland insurance producer license is required for anyone who:", "options": {"A": "Only discusses insurance options without accepting applications", "B": "Solicits, negotiates, or sells insurance contracts for compensation", "C": "Works in an insurance company's IT department", "D": "Refers a friend to an insurance agent and receives a finder's fee"}, "correct": "B", "explanation": "Under Maryland law, a person must be licensed as an insurance producer to solicit insurance, negotiate insurance contracts, or sell insurance for compensation. Unlicensed activity is a serious violation subject to civil penalties and potential criminal charges."}, {"topic": "Producer licensing & reporting rules", "question": "Which of the following is a requirement to obtain an original Maryland insurance producer license?", "options": {"A": "Maryland residency is required for all license types", "B": "Completion of pre-licensing education, passing the state exam, background check, and payment of fees", "C": "Sponsorship by a Maryland-licensed insurer", "D": "Minimum of 2 years of insurance industry experience"}, "correct": "B", "explanation": "To obtain an original Maryland producer license, an applicant must: complete approved pre-licensing education, pass the state examination, submit a license application with fees, and pass a background check (including criminal history review). Maryland residency is not required for non-resident producers."}, {"topic": "Producer licensing & reporting rules", "question": "A licensed producer in another state who wants to sell insurance in Maryland may apply for:", "options": {"A": "A temporary surplus lines license", "B": "A non-resident insurance producer license", "C": "A reciprocal guarantee license", "D": "An associate producer permit"}, "correct": "B", "explanation": "Maryland participates in the non-resident licensing reciprocity system. A producer licensed in their home state who meets Maryland's licensing standards may obtain a Maryland non-resident producer license without retaking the pre-licensing course or exam (if their home state offers reciprocity)."}, {"topic": "Producer licensing & reporting rules", "question": "A Maryland insurance producer's license may be revoked or suspended for all of the following EXCEPT:", "options": {"A": "Providing false information on a license application", "B": "Misappropriating client premiums", "C": "Failing to meet the CE requirement by the renewal deadline", "D": "Issuing policies priced below market rate"}, "correct": "D", "explanation": "Issuing policies at below-market prices (if the price complies with filed rates) is not a license violation. However, misappropriating premiums, falsifying applications, and failing to meet CE requirements are all grounds for license revocation or suspension under Maryland law."}, {"topic": "Producer licensing & reporting rules", "question": "Under Maryland law, an insurance producer who collects premiums from a client must:", "options": {"A": "Deposit the premiums in the producer's personal account for convenience", "B": "Forward or account for premiums according to agreement with the insurer and maintain them in a fiduciary capacity", "C": "Return all premiums to the client within 10 business days", "D": "Report the premium amounts to the MIA monthly"}, "correct": "B", "explanation": "Insurance producers hold premium funds in a fiduciary capacity on behalf of the insurer. Commingling client premiums with personal funds or misappropriating premiums is a serious violation (often called 'twisting' or 'theft') that can result in criminal charges and license revocation."}, {"topic": "Producer licensing & reporting rules", "question": "Maryland's insurance producer licensing laws define 'twisting' as:", "options": {"A": "Inducing a policyholder to lapse, forfeit, or surrender an existing policy by misrepresentation", "B": "Selling two policies to one client at the same time", "C": "Accepting both an agent commission and a broker fee on the same policy", "D": "Recommending an unsuitable policy to a senior citizen"}, "correct": "A", "explanation": "Twisting involves using misrepresentation or incomplete/misleading comparisons to induce a policyholder to replace an existing policy to the detriment of the insured. It is an unfair trade practice prohibited under Maryland Insurance Article § 27-214."}, {"topic": "Producer licensing & reporting rules", "question": "'Rebating' in Maryland insurance law refers to:", "options": {"A": "Returning a policy for a premium refund during the free-look period", "B": "Offering an inducement to purchase insurance that is not specified in the policy (such as sharing commissions with the insured)", "C": "Reducing premiums for group policies with favorable claims experience", "D": "Increasing coverage limits mid-term without a premium adjustment"}, "correct": "B", "explanation": "Rebating means offering or giving any valuable consideration not specified in the insurance contract as an inducement to purchase insurance. This includes sharing commissions with the insured, giving gifts, or offering other kickbacks. It is prohibited in Maryland as an unfair trade practice."}, {"topic": "Producer licensing & reporting rules", "question": "A Maryland producer who wants to sell variable life insurance and variable annuities must hold, in addition to the life insurance producer license:", "options": {"A": "A securities registration with FINRA (Series 6 or Series 7)", "B": "A Maryland variable products endorsement only", "C": "A Chartered Life Underwriter (CLU) designation", "D": "An additional premium finance license"}, "correct": "A", "explanation": "Variable products (variable life, variable annuities) are considered securities because of their investment component. In addition to a state insurance producer license, producers must be registered with FINRA (Financial Industry Regulatory Authority) — typically with a Series 6 or Series 7 license — to sell variable products."}, {"topic": "Unfair trade practices & consumer protection", "question": "Under Maryland's unfair trade practices law, 'misrepresentation' includes:", "options": {"A": "Explaining the difference between two competing policies accurately", "B": "Making false or misleading statements about the benefits, terms, or value of a policy", "C": "Recommending an alternative insurer to a prospective client", "D": "Declining to write coverage for a high-risk applicant"}, "correct": "B", "explanation": "Misrepresentation involves making false, misleading, or deceptive statements about insurance policies — including benefits, conditions, terms, premiums, dividends, or the financial condition of an insurer. It is an unfair trade practice prohibited by Maryland Insurance Article § 27-201."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Defamation' as an unfair trade practice in insurance means:", "options": {"A": "Discriminating against an insured based on race or gender", "B": "Making false statements that are injurious to the reputation of an insurer or producer", "C": "Falsely advertising the benefits of a policy", "D": "Failing to disclose a material fact in an application"}, "correct": "B", "explanation": "Defamation as an unfair trade practice specifically refers to making false statements (oral or written) that injure the reputation of an insurer, producer, or the insurance business in general. This is distinct from misrepresentation (which concerns policy terms) and discrimination."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Boycott, coercion, and intimidation' as unfair trade practices occur when:", "options": {"A": "An insurer declines to renew a policy after a claim", "B": "An insurer or producer uses force, threats, or intimidation to unreasonably restrain trade in insurance", "C": "An insurer raises rates uniformly for an entire class of insureds", "D": "A producer switches a client to a competitor's policy"}, "correct": "B", "explanation": "These unfair trade practices involve using illegal anti-competitive means to control the insurance market: boycotting certain insurers or producers, using coercion (threats or pressure), or intimidating competitors, agents, or clients. These are prohibited under both state law and federal antitrust law."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Unfair discrimination' in insurance involves:", "options": {"A": "Charging higher premiums based on actuarially justified risk differences", "B": "Making unjustified distinctions between insureds of the same class and risk, such as charging different rates or offering different coverage based on race, sex, or religion", "C": "Declining to insure high-risk individuals", "D": "Offering group discounts that are not available to individual policyholders"}, "correct": "B", "explanation": "Unfair discrimination prohibits making distinctions in premiums, policy terms, or conditions between insureds with the same actuarial risk profile based on impermissible factors (race, color, religion, national origin, sex, marital status, or disability). Actuarially justified risk differences are permissible."}, {"topic": "Unfair trade practices & consumer protection", "question": "Which of the following is NOT considered an unfair trade practice under Maryland law?", "options": {"A": "False advertising of policy benefits", "B": "Charging premiums that reflect actuarially sound risk differences", "C": "Misrepresenting policy terms to a prospective buyer", "D": "Inducing policyholders to drop existing coverage through misrepresentation"}, "correct": "B", "explanation": "Charging actuarially sound, rate-filed premiums that reflect legitimate risk differences is legal and required for the financial soundness of the insurance system. All other options — false advertising, misrepresentation, and twisting — are explicitly prohibited unfair trade practices."}, {"topic": "Unfair trade practices & consumer protection", "question": "Under Maryland law, 'churning' in insurance refers to:", "options": {"A": "A producer replacing one policy with another on the same insurer to generate a new commission", "B": "Investing policyholder premium funds in high-yield securities", "C": "Offering a client multiple competing quotes from different insurers", "D": "Switching a group policy to an individual policy"}, "correct": "A", "explanation": "Churning (also called internal replacement or internal twisting) occurs when a producer replaces an existing policy with a new policy from the same insurer primarily to generate a new commission, to the detriment of the client. Like twisting, churning is an unfair trade practice prohibited under Maryland law."}, {"topic": "Unfair trade practices & consumer protection", "question": "Maryland's unfair claims settlement practices regulations require insurers to acknowledge claims within:", "options": {"A": "3 business days", "B": "10 business days", "C": "30 calendar days", "D": "45 calendar days"}, "correct": "B", "explanation": "Maryland's insurance regulations require insurers to acknowledge receipt of a claim notification within 10 business days. Insurers must als ent", "C": "The MIA revokes an insurer's certificate of authority", "D": "A policyholder fails to pay premiums on time"}, "correct": "B", "explanation": "The Maryland Life and Health Insurance Guaranty Corporation (MLHIGC) protects policyholders of member insurers that become insolvent. It ensures continuation of coverage and payment of claims within statutory limits when an insurer fails."}, {"topic": "Replacement regulations & Guaranty Association", "question": "What is the maximum benefit the Maryland Life and Health Insurance Guaranty Corporation provides for individual life insurance death benefits?", "options": {"A": "$100,000", "B": "$250,000", "C": "$300,000", "D": "$500,000"}, "correct": "C", "explanation": "The Maryland Life and Health Insurance Guaranty Corporation provides coverage for individual life insurance death benefits up to $300,000 per insured life. Different limits apply to other types of insurance: $100,000 for cash surrender values, $500,000 for group life, and specific limits for health insurance and annuity claims."}, {"topic": "Replacement regulations & Guaranty Association", "question": "Which of the following is NOT covered by the Maryland Life and Health Insurance Guaranty Corporation?", "options": {"A": "Individual life insurance policies", "B": "Individual health insurance policies", "C": "Variable annuity contracts where the risk is borne by the policyholder", "D": "Group health insurance"}, "correct": "C", "explanation": "Variable annuities where the investment risk is borne by the policyholder (separate account products) are generally not covered by the guaranty fund because the underlying securities are held in a separate account protected in insolvency. Fixed guaranty corporation coverage applies to fixed and guaranteed products."}, {"topic": "Replacement regulations & Guaranty Association", "question": "Maryland's replacement regulations are designed primarily to:", "options": {"A": "Prevent producers from earning commissions on const POOLS={},PIDX={},QDB={};
function initPools(){ALL_TOPICS.forEach(t=>{POOLS[t]=shuffle(BANK.filter(q=>q.topic===t));PIDX[t]=0;});}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function qid(q){return q.question.substring(0,48);}
function pickFrom(topic){
  if(!POOLS[topic]||!POOLS[topic].length)return null;
  if(!state.seenIds[topic])state.seenIds[topic]=new Set();
  const seen=state.seenIds[topic],pool=POOLS[topic];
  for(let i=0;i<pool.length;i++){const idx=(PIDX[topic]+i)%pool.length;const id=qid(pool[idx]);if(!seen.has(id)){PIDX[topic]=(idx+1)%pool.length;seen.add(id);if(seen.size>=pool.length)seen.clear();return pool[idx];}}
  seen.clear();const q=pool[PIDX[topic]%pool.length];PIDX[topic]=(PIDX[topic]+1)%pool.length;seen.add(qid(q));return q;
}

function switchTab(tab){
  document.getElementById('tab-practice').style.display=tab==='practice'?'block':'none';
  document.getElementById('tab-review').style.display=tab==='review'?'block':'none';

function updateStats(){
  document.getElementById('stat-total').textContent=state.total;
  document.getElementById('stat-correct').textContent=state.correct;
  document.getElementById('stat-pct').textContent=state.total>0?Math.round(state.correct/state.total*100)+'%':'—';
  document.getElementById('stat-streak').textContent=state.streak;
  const pb=document.getElementById('progress-bar');if(pb)pb.style.width=(state.total>0?Math.min(Math.round(state.correct/state.total*100),100):0)+'%';
  const weak=getWeak(),el=document.getElementById('weak-tags');if(el)el.innerHTML=weak.length?weak.map(t=>`<span class="weak-tag">${t}</span>`).join(''):'<em>No weak spots yet!</em>';
  const badge=document.getElementById('rev-badge');if(badge){const n=state.reviewHistory.length;badge.style.display=n>0?'inline':'none';badge.textContent=n>99?'99+':n;}
}
function getWeak(){return ALL_TOPICS.filter(t=>{const s=state.topicScores[t];return s&&s.total>=2&&s.correct/s.total<0.7;});}
function setMode(m){state.mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));document.getElementById('mode-'+m).classList.add('active');document.getElementById('topic-section').style.display=m==='topic'?'block':'none';document.getElementById('weak-info').style.display=m==='weak'?'block':'none';updateStats();}
function buildTopics(){document.getElementById('topic-section').innerHTML='<div class="section-label" style="margin-bottom:10px">Select a chapter</div>'+TOPIC_GROUPS.map(g=>`<div class="topic-group"><div class="topic-group-label">${g.group}</div><div class="topic-grid">${g.topics.map(t=>`<button class="topic-btn${state.selectedTopic===t.label?' active':''}" data-label="${t.label.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="selTopic(this.dataset.label,this)"><span class="ch-badge">${t.ch}</span>${t.label}</button>`).join('')}</div></div>`).join('');}
function selTopic(l,b){state.selectedTopic=l;document.querySelectorAll('.topic-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');}
function getTopics(){if(state.mode==='topic')return[state.selectedTopic||ALL_TOPICS[0]];if(state.mode==='md')return MD_TOPICS;if(state.mode==='weak'){const w=getWeak();return w.length?w:ALL_TOPICS;}return ALL_TOPICS;}

function generateQuestions(){
  const pool=getTopics(),count=parseInt(document.getElementById('q-count').value)||5,qs=[];
  for(let i=0;i<count;i++){const t=pool[Math.floor(Math.random()*pool.length)];const q=pickFrom(t);if(q)qs.push(q);}
  if(!qs.length){document.getElementById('questions-container').insertAdjacentHTML('afterbegin','<div class="no-q">No questions available.</div>');return;}
  renderQs(qs,state.mode==='topic'?state.selectedTopic:null);save();
}
function renderQs(qs,label){
  var con=document.getElementById('questions-container');
  var wrap=document.createElement('div');
  wrap.style.marginBottom='1.5rem';
  if(label){var lbl=document.createElement('div');lbl.className='set-label';lbl.textContent=label;wrap.appendChild(lbl);}
  var uid=Date.now();
  qs.forEach(function(q,i){
    var k=uid+'-'+i;
    QDB[k]=q;
    var card=document.createElement('div');
    card.className='qcard';
    var qnum=document.createElement('div');
    qnum.className='qnum';
    qnum.textContent='Q'+(state.total+i+1)+' · '+q.topic;
    card.appendChild(qnum);
    var qtext=document.createElement('div');
    qtext.className='qtext';
    qtext.textContent=q.question;
    card.appendChild(qtext);
    var optDiv=document.createElement('div');
    optDiv.className='options';
    optDiv.id='o-'+k;
    (function(qRef,kRef){
      ['A','B','C','D'].forEach(function(letter){
        var btn=document.createElement('button');
        btn.type='button';
        btn.className='opt';
        btn.dataset.l=letter;
        var s1=document.createElement('span');
        s1.className='opt-letter';
        s1.textContent=letter;
        var s2=document.createElement('span');
        s2.textContent=qRef.options[letter]||'';
        btn.appendChild(s1);
        btn.appendChild(s2);
        (function(b,lt){
          b.addEventListener('click',function(){ans(b,lt,qRef.correct,kRef);});
        })(btn,letter);
        optDiv.appendChild(btn);
      });
    })(q,k);
    card.appendChild(optDiv);
    var exDiv=document.createElement('div');
    exDiv.className='explanation';
    exDiv.id='ex-'+k;
    exDiv.style.display='none';
    var exLbl=document.createElement('div');
    exLbl.className='expl-label';
    exLbl.textContent='Why this is the answer';
    var exText=document.createElement('div');
    exText.id='ext-'+k;
    exDiv.appendChild(exLbl);
    exDiv.appendChild(exText);
    card.appendChild(exDiv);
    wrap.appendChild(card);
  });
  con.insertBefore(wrap,con.firstChild);
  window.scrollTo({top:0,behavior:'smooth'});
}
function ans(btn,chosen,correct,k){const q=QDB[k];if(!q)return;
  const opts=document.getElementById('o-'+k);if(!opts||opts.dataset.done)return;opts.dataset.done='1';
  const ok=chosen===correct;state.total++;if(ok){state.correct++;state.streak++;}else{state.streak=0;}
  if(!state.topicScores[q.topic])state.topicScores[q.topic]={total:0,correct:0};
  state.topicScores[q.topic].total++;if(ok)state.topicScores[q.topic].correct++;
  state.reviewHistory.push({id:Date.now()+Math.random(),topic:q.topic,question:q.question,options:q.options,correct:q.correct,explanation:q.explanation,userAnswer:chosen,isCorrect:ok,ts:Date.now()});
  opts.querySelectorAll('.opt').forEach(o=>{const l=o.dataset.l;if(l===correct)o.classList.add(ok&&l===chosen?'correct':'reveal-correct');else if(l===chosen&&!ok)o.classList.add('wrong');o.style.cursor='default';o.disabled=true;});
  const ex=document.getElementById('ex-'+k),ext=document.getElementById('ext-'+k);if(ex&&ext){ext.textContent=q.explanation;ex.style.display='block';}
  updateStats();save();
}

function buildRevFilters(){const sel=document.getElementById('rev-topic'),cur=sel.value;sel.innerHTML='<option value="">All topics</option>';[...new Set(state.reviewHistory.map(r=>r.topic))].forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===cur)o.selected=true;sel.appendChild(o);});}
function renderReview(){
  buildRevFilters();
  const tf=document.getElementById('rev-topic').value,rf=document.getElementById('rev-result').value;
  let items=[...state.reviewHistory].reverse();
  if(tf)items=items.filter(r=>r.topic===tf);if(rf==='correct')items=items.filter(r=>r.isCorrect);if(rf==='wrong')items=items.filter(r=>!r.isCorrect);
  const n=items.length,nc=items.filter(r=>r.isCorrect).length;
  document.getElementById('rev-total').textContent=n;document.getElementById('rev-correct').textContent=nc;document.getElementById('rev-pct').textContent=n>0?Math.round(nc/n*100)+'%':'—';
  const con=document.getElementById('review-container');
  if(!items.length){con.innerHTML='<div class="review-empty">No answered questions yet.<br>Complete practice questions to build your review list.</div>';return;}
  con.innerHTML=items.map(r=>`<div class="review-card ${r.isCorrect?'rc-c':'rc-w'}"><div class="review-topic">${r.topic} &middot; ${r.isCorrect?'&#10003; Correct':'&#10007; Incorrect'}</div><div class="review-qtext">${r.question}</div><div class="review-opts">${['A','B','C','D'].map(l=>`<div class="review-opt ${l===r.correct?'ro-c':(l===r.userAnswer&&!r.isCorrect?'ro-w':'')}"><span style="font-weight:700;min-width:16px;flex-shrink:0">${l}</span><span>${r.options[l]}</span></div>`).join('')}</div><div class="review-expl"><strong>Explanation:</strong> ${r.explanation}</div></div>`).join('');
}
function clearAll(){if(!confirm('Clear all progress and review history? This cannot be undone.'))return;state={mode:'random',selectedTopic:null,total:0,correct:0,streak:0,topicScores:{},reviewHistory:[],seenIds:{}};initPools();save();updateStats();document.getElementById('questions-container').innerHTML='';renderReview();}

function exportPDF(){
  const tf=document.getElementById('rev-topic').value,rf=document.getElementById('rev-result').value;
