  {topic:"Producer licensing & reporting rules",question:"Maryland insurance producers must complete how many hours of continuing education every 2-year cycle?",options:{A:"12 hours including 1 hour of ethics",B:"20 hours including 2 hours of ethics",C:"24 hours including 3 hours of ethics",D:"30 hours including 5 hours of ethics"},correct:"C",explanation:"Maryland requires producers to complete 24 hours of continuing education every 2-year license cycle, including at least 3 hours of ethics. CE must be completed at least 15 days before the license expiration date. Failure to complete CE results in an inactive license. CE courses must be approved by the Maryland Insurance Administration (MIA)."},
  {topic:"Producer licensing & reporting rules",question:"A Maryland producer must report a felony conviction or administrative action taken by another state to the MIA within:",options:{A:"10 days",B:"15 days",C:"30 days",D:"60 days"},correct:"C",explanation:"Maryland requires producers to report felony convictions, criminal prosecutions, administrative actions in another state, and address changes to the Maryland Insurance Administration (MIA) within 30 days of the event. Failure to report can result in license suspension or revocation. These reporting rules let the MIA monitor producer fitness and protect Maryland consumers."},
  {topic:"Producer licensing & reporting rules",question:"If a Maryland producer's license lapses, how long does the producer have to reinstate it, and what is the resident reinstatement fee?",options:{A:"6 months; $50",B:"1 year; $100",C:"2 years; $150",D:"3 years; $200"},correct:"B",explanation:"A Maryland producer whose license has lapsed has 1 year from the expiration date to reinstate it, paying a $100 resident reinstatement fee. After 1 year, the producer must reapply and may need to retake the licensing exam. Maintaining CE compliance and timely renewal payments avoids this hassle and expense."},
  {topic:"Producer licensing & reporting rules",question:"Before a Maryland producer can sell an annuity for the first time, what training is required?",options:{A:"A 2-hour ethics course",B:"A 4-hour annuity suitability training",C:"An 8-hour annuity course every year",D:"A 16-hour combined LTC and annuity course"},correct:"B",explanation:"Maryland requires producers to complete a 4-hour annuity suitability training course before selling annuities. This is a one-time requirement, not recurring. The training covers product features, fiduciary duty, replacement rules, and Maryland consumer protections. (LTC, by contrast, requires 8-hour initial training plus 4 hours every 24 months — a recurring obligation.)"},
  {topic:"Producer licensing & reporting rules",question:"Which action would constitute acting as an insurance agent WITHOUT a Maryland license?",options:{A:"Explaining policy terms to an existing client",B:"Quoting premium ranges from memory to a prospect",C:"Actively soliciting, negotiating, or binding insurance coverage for compensation",D:"Referring a friend to a licensed agent without compensation"},correct:"C",explanation:"Soliciting, negotiating, or binding insurance for compensation requires a valid producer license under Maryland law. Acting as a producer without a license is a violation of the Maryland Insurance Article and can result in fines and prosecution. Explaining policy terms to existing clients or making uncompensated referrals are generally not considered unlicensed activity, though compensated referrals tied to sales may trigger licensing rules."},
  {topic:"Producer licensing & reporting rules",question:"Long-term care insurance training requirements for Maryland producers include:",options:{A:"A 4-hour one-time course before selling LTC",B:"An 8-hour initial course plus 4 hours every 24 months",C:"A 12-hour course every year",D:"No additional training beyond standard CE"},correct:"B",explanation:"Maryland requires producers to complete an 8-hour initial LTC training course before selling LTC policies, plus 4 hours of LTC-specific training every 24 months ongoing. This is in addition to standard CE requirements. The training covers LTC product features, suitability, alternatives, and the Maryland LTC Partnership Program. Annuity suitability training (4 hours, one-time) is separate."},

  // ── MD: Unfair trade practices & consumer protection ──
  {topic:"Unfair trade practices & consumer protection",question:"'Twisting' in insurance is defined as:",options:{A:"Charging different premiums for the same risk based on race or religion",B:"Inducing a policyowner to replace a policy through misrepresentation",C:"Failing to pay a valid claim within a reasonable time",D:"Selling insurance without disclosing commissions"},correct:"B",explanation:"Twisting is the unfair trade practice of using misrepresentation or misleading comparisons to induce a policyowner to lapse, surrender, or replace an existing policy — for the producer's benefit (commission) rather than the client's. It is illegal under the Maryland Insurance Article. Churning is similar but involves replacing a client's policy with another policy from the same insurer."},
  {topic:"Unfair trade practices & consumer protection",question:"Rebating in insurance occurs when a producer:",options:{A:"Returns part of the premium or anything of value to the insured as an inducement to purchase",B:"Charges the insured above the filed premium rate",C:"Fails to disclose policy exclusions at sale",D:"Allows a policy to lapse intentionally to sell a new one"},correct:"A",explanation:"Rebating is the illegal practice of giving or offering an insured anything of value (money, gifts, special favors) as an inducement to purchase — where the return is not provided for in the policy. Rebating is prohibited under the Maryland Insurance Article. It is considered unfair discrimination against buyers who don't receive the rebate."},
  {topic:"Unfair trade practices & consumer protection",question:"Using the name of the Maryland Life and Health Insurance Guaranty Corporation as a sales inducement in advertising is:",options:{A:"Permitted if the advertisement is accurate",B:"Illegal under Maryland law",C:"Required in all life insurance advertising",D:"Permitted only for policies under $300,000"},correct:"B",explanation:"Maryland explicitly prohibits using the existence or coverage of the Maryland Life and Health Insurance Guaranty Corporation as an inducement to purchase insurance. The Guaranty Corporation protects policyholders if a licensed insurer becomes insolvent — but using it as a selling point would misrepresent the protection and encourage consumers to select insurers based on guaranty coverage rather than financial strength."},
  {topic:"Unfair trade practices & consumer protection",question:"Which of the following is an example of unfair discrimination in insurance?",options:{A:"Charging higher premiums to a 60-year-old than a 30-year-old for life insurance",B:"Offering different rates to two applicants with identical risk profiles based on race",C:"Refusing to insure a skydiving instructor for aviation-related death",D:"Declining to write a policy in a high-crime geographic area"},correct:"B",explanation:"Unfair discrimination means treating equally-situated risks differently based on protected characteristics (race, religion, national origin, sex in some contexts). Charging different rates based on age, health status, or occupation is NOT unfair discrimination — these are legitimate actuarial risk factors. Charging different rates to applicants with identical risk profiles based on race is illegal unfair discrimination."},
  {topic:"Unfair trade practices & consumer protection",question:"Defamation as an unfair trade practice occurs when a producer:",options:{A:"Makes false or maliciously critical statements about a competitor or competing insurer's financial condition",B:"Speaks negatively about a former client",C:"Refuses to provide a policy quote to a customer",D:"Disagrees publicly with the Maryland Insurance Commissioner"},correct:"A",explanation:"Defamation is the unfair trade practice of making or circulating false, maliciously critical, or derogatory statements about an insurer's or producer's financial condition or business practices. It is illegal under the Maryland Insurance Article. Honest comparisons backed by accurate facts are permitted — but false or malicious statements designed to harm a competitor are prohibited."},
  {topic:"Unfair trade practices & consumer protection",question:"Coercion in the insurance context is the unfair trade practice of:",options:{A:"Requiring an applicant to undergo a medical exam",B:"Using physical or economic force to require the purchase of insurance from a particular insurer",C:"Demanding payment of the first premium at application",D:"Requiring all employees to participate in a non-contributory group plan"},correct:"B",explanation:"Coercion in insurance refers to using physical force, threats, or economic pressure to require a person to buy insurance from a specific insurer — for example, a lender requiring borrowers to purchase property insurance only from a specific affiliated company. It is an illegal unfair trade practice under the Maryland Insurance Article. Lenders may require insurance generally, but cannot require it from a specific company."},

  // ── MD: Replacement regulations & Guaranty Corp ──
  {topic:"Replacement regulations & Maryland Guaranty Corp",question:"Under Maryland's replacement regulations, a producer who recommends replacing an existing life insurance policy must:",options:{A:"Obtain written approval from the MIA before proceeding",B:"Provide the applicant with a notice of replacement and policy comparison documents",C:"Waive the first year's commission on the new policy",D:"Allow the insured 6 months to reconsider"},correct:"B",explanation:"Maryland's replacement regulations require producers to provide the applicant with a Notice Regarding Replacement and a comparison of the existing and proposed policies so the consumer can make an informed decision. Both applicant and producer must sign the notice. The replacing insurer must notify the existing insurer of the replacement. Replacement records must be retained for at least 5 years."},
  {topic:"Replacement regulations & Maryland Guaranty Corp",question:"The Maryland Life and Health Insurance Guaranty Corporation protects life insurance death benefits up to:",options:{A:"$100,000",B:"$250,000",C:"$300,000",D:"$500,000"},correct:"C",explanation:"The Maryland Life and Health Insurance Guaranty Corporation protects up to $300,000 in life insurance death benefits per insured life if a member insurer becomes insolvent. Cash surrender value protection is capped at $100,000. Annuity benefits are protected up to $250,000. Health insurance benefits are protected up to $500,000 for major medical, $300,000 for disability/LTC, and $100,000 for other health coverages."},
  {topic:"Replacement regulations & Maryland Guaranty Corp",question:"The Maryland Guaranty Corporation protects annuity benefits up to:",options:{A:"$100,000",B:"$250,000",C:"$300,000",D:"$500,000"},correct:"B",explanation:"The Maryland Life and Health Insurance Guaranty Corporation protects annuity benefits up to $250,000 per contract owner. Other limits: $300,000 for life insurance death benefits, $100,000 for cash surrender value, $500,000 for major medical coverage, $300,000 for disability income and LTC, and $100,000 for other health coverages. Not all insurers (e.g., HMOs, fraternal benefit societies) are covered."},
  {topic:"Replacement regulations & Maryland Guaranty Corp",question:"Maryland Guaranty Corporation protection for major medical health insurance is up to:",options:{A:"$100,000",B:"$300,000",C:"$500,000",D:"$1,000,000"},correct:"C",explanation:"The Maryland Life and Health Insurance Guaranty Corporation protects major medical (hospital, surgical) health insurance benefits up to $500,000 per insured. Disability income and LTC coverage are protected up to $300,000. Other health coverages are protected up to $100,000. Life insurance death benefits are protected up to $300,000, cash surrender values up to $100,000, and annuities up to $250,000."},
  {topic:"Replacement regulations & Maryland Guaranty Corp",question:"Maryland producers must retain underwriting records (such as applications) for at least:",options:{A:"1 year",B:"3 years",C:"5 years",D:"7 years"},correct:"B",explanation:"Underwriting records — including applications, medical questionnaires, and field underwriting notes — must be retained for at least 3 years in Maryland. Replacement transaction records must be kept for 5 years. Policy illustrations must be retained for 3 years after the policy ends. All records must be made available to the MIA upon request."}
];

  POOLS[t] = shuffle(BANK.filter(q => q.topic === t));
});
const POOL_IDX = {};
ALL_TOPICS.forEach(t => { POOL_IDX[t] = 0; });

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickFrom(topic) {
  if (!POOLS[topic] || POOLS[topic].length === 0) return null;
  const idx = POOL_IDX[topic] % POOLS[topic].length;
  POOL_IDX[topic]++;
  if (POOL_IDX[topic] >= POOLS[topic].length) {
    POOLS[topic] = shuffle(POOLS[topic]);
    POOL_IDX[topic] = 0;
  }
  return POOLS[topic][idx];
}

let state = {
  mode:'random', selectedTopic:null,
  total:0, correct:0, streak:0, topicScores:{}
};

function saveState() { try { localStorage.setItem('md_exam_v3', JSON.stringify({total:state.total,correct:state.correct,streak:state.streak,topicScores:state.topicScores})); } catch(e) {} }
function loadState() { try { const s = localStorage.getItem('md_exam_v3'); if(s) { const p = JSON.parse(s); state.total=p.total||0; state.correct=p.correct||0; state.streak=p.streak||0; state.topicScores=p.topicScores||{}; } } catch(e) {} }

function resetStats() {
  state = {mode:state.mode,selectedTopic:state.selectedTopic,total:0,correct:0,streak:0,topicScores:{}};
  ALL_TOPICS.forEach(t => { POOLS[t] = shuffle(BANK.filter(q => q.topic === t)); POOL_IDX[t] = 0; });
  saveState(); updateStats();
  document.getElementById('questions-container').innerHTML = '';
}

function updateStats() {
  document.getElementById('stat-total').textContent = state.total;
  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-pct').textContent = state.total > 0 ? Math.round(state.correct/state.total*100)+'%' : '—';
  document.getElementById('stat-streak').textContent = state.streak;
  const pb = document.getElementById('progress-bar');
  if (pb) pb.style.width = (state.total > 0 ? Math.min(Math.round(state.correct/state.total*100), 100) : 0) + '%';
  const weak = getWeakTopics();
  const el = document.getElementById('weak-tags');
  if (el) el.innerHTML = weak.length ? weak.map(t=>`<span class="weak-tag">${t}</span>`).join('') : '<em>No weak spots yet!</em>';
}

function getWeakTopics() {
  return ALL_TOPICS.filter(t => { const s = state.topicScores[t]; return s && s.total >= 2 && s.correct/s.total < 0.7; });
}

function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + m).classList.add('active');
  document.getElementById('topic-section').style.display = m === 'topic' ? 'block' : 'none';
  document.getElementById('weak-info').style.display = m === 'weak' ? 'block' : 'none';
  updateStats();
}

function buildTopicSection() {
  const sec = document.getElementById('topic-section');
  sec.innerHTML = '<div class="section-label" style="margin-bottom:10px">Select a chapter</div>' +
    TOPIC_GROUPS.map(g => `<div class="topic-group">
      <div class="topic-group-label">${g.group}</div>
      <div class="topic-grid">${g.topics.map(t => `
        <button class="topic-btn${state.selectedTopic===t.label?' active':''}" onclick="selectTopic(${JSON.stringify(t.label)},this)">
          <span class="ch-badge">${t.ch}</span>${t.label}
        </button>`).join('')}
      </div></div>`).join('');
}

function selectTopic(label, btn) {
  state.selectedTopic = label;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getTopicsForMode() {
  if (state.mode === 'topic') return [state.selectedTopic || ALL_TOPICS[Math.floor(Math.random()*ALL_TOPICS.length)]];
  if (state.mode === 'md') return MD_TOPICS;
  if (state.mode === 'weak') { const w = getWeakTopics(); return w.length ? w : ALL_TOPICS; }
  return ALL_TOPICS;
}

function generateQuestions() {
  const topicPool = getTopicsForMode();
  const questions = [];
  const usedTopics = [];

  for (let i = 0; i < 5; i++) {
    const topic = topicPool[Math.floor(Math.random() * topicPool.length)];
    const q = pickFrom(topic);
    if (q) { questions.push(q); usedTopics.push(topic); }
  }

  if (questions.length === 0) {
    document.getElementById('questions-container').insertAdjacentHTML('afterbegin',
      '<div class="no-q">No questions available for this selection. Try a different mode.</div>');
    return;
  }

  renderQuestions(questions, state.mode === 'topic' ? state.selectedTopic : null);
}

function renderQuestions(questions, topicLabel) {
  const container = document.getElementById('questions-container');
  const wrapper = document.createElement('div');
  wrapper.style.marginBottom = '1.5rem';

  if (topicLabel) {
    const lbl = document.createElement('div');
    lbl.className = 'set-label';
    lbl.textContent = topicLabel;
    wrapper.appendChild(lbl);
  }

  const uid = Date.now();
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'qcard';
    const qKey = `${uid}-${qi}`;
    const topicSafe = q.topic.replace(/'/g,"\\'");
    const explSafe = q.explanation.replace(/`/g,'\\`').replace(/\n/g,' ');

    card.innerHTML = `
      <div class="qnum">Q${state.total + qi + 1} &middot; ${q.topic}</div>
      <div class="qtext">${q.question}</div>
      <div class="options" id="opts-${qKey}">
        ${['A','B','C','D'].map(l => `
          <button class="opt" data-letter="${l}"
            onclick="answer(this,'${l}','${q.correct}','${qKey}','${topicSafe}',\`${explSafe}\`)">
            <span class="opt-letter">${l}</span><span>${q.options[l]}</span>
          </button>`).join('')}
      </div>
      <div class="explanation" id="expl-${qKey}" style="display:none">
        <div class="expl-label">Why this is the answer</div>
        <div id="expl-text-${qKey}"></div>
      </div>`;
    wrapper.appendChild(card);
  });

  container.insertBefore(wrapper, container.firstChild);
  window.scrollTo({top: 0, behavior:'smooth'});
}

function answer(btn, chosen, correct, key, topic, explanation) {
  const opts = document.getElementById('opts-' + key);
  if (!opts || opts.dataset.answered) return;
  opts.dataset.answered = '1';
  const isCorrect = chosen === correct;

  state.total++;
  if (isCorrect) { state.correct++; state.streak++; } else { state.streak = 0; }
  if (!state.topicScores[topic]) state.topicScores[topic] = {total:0,correct:0};
  state.topicScores[topic].total++;
  if (isCorrect) state.topicScores[topic].correct++;

  opts.querySelectorAll('.opt').forEach(o => {
    const l = o.dataset.letter;
    if (l === correct) o.classList.add(isCorrect && l === chosen ? 'correct' : 'reveal-correct');
    else if (l === chosen && !isCorrect) o.classList.add('wrong');
    o.style.cursor = 'default';
    o.disabled = true;
  });

  const expl = document.getElementById('expl-' + key);
  const explText = document.getElementById('expl-text-' + key);
  if (expl && explText) { explText.textContent = explanation; expl.style.display = 'block'; }

  updateStats(); saveState();
}

loadState();
buildTopicSection();
updateStats();
setMode('random');
</script>
</body>
</html>
