<script>
const BANK = [
  // ── Ch. 1–2: Insurance fundamentals, risk & contract law ──
  {topic:"Insurance fundamentals, risk & contract law",question:"Which of the following BEST describes the law of large numbers as it applies to insurance?",options:{A:"The larger the group, the more accurately losses can be predicted",B:"Insurance companies must write a minimum number of policies to operate legally",C:"Insurers must hold large cash reserves to pay all claims immediately",D:"The more policies sold, the higher the premium for each insured"},correct:"A",explanation:"The law of large numbers states that as the number of similar exposure units increases, the more closely actual losses will match expected losses. This is the statistical foundation that allows insurers to predict future losses and set fair premiums. It has nothing to do with legal minimums, reserves, or premium levels directly."},
  {topic:"Insurance fundamentals, risk & contract law",question:"Pure risk differs from speculative risk because pure risk:",options:{A:"Involves a chance of gain, loss, or no change",B:"Only involves the possibility of loss or no loss — no chance of gain",C:"Can always be hedged through financial markets",D:"Applies only to property and casualty insurance"},correct:"B",explanation:"Pure risk involves only two outcomes: loss or no loss. There is never a chance of gain. Only pure risks are insurable. Speculative risk (gambling, investing) involves three outcomes — gain, loss, or no change — and is generally not insurable because of the moral hazard involved."},
  {topic:"Insurance fundamentals, risk & contract law",question:"A contract of adhesion means:",options:{A:"Both parties negotiate the terms equally",B:"The insured must adhere to all premium payment schedules",C:"The contract is written by one party and accepted or rejected as a whole by the other",D:"The insurer adheres only to state-mandated policy language"},correct:"C",explanation:"A contract of adhesion is drafted entirely by one party (the insurer) and offered to the other (the insured) on a take-it-or-leave-it basis. The insured cannot negotiate the terms. Because of this imbalance, any ambiguities are interpreted in favor of the insured — the doctrine of reasonable expectations."},
  {topic:"Insurance fundamentals, risk & contract law",question:"Which element is NOT required for a valid insurance contract?",options:{A:"Offer and acceptance",B:"Consideration",C:"Legal purpose",D:"Written form"},correct:"D",explanation:"A valid contract requires offer and acceptance, consideration, competent parties, and legal purpose. Insurance contracts do NOT have to be in writing to be legally valid — oral binders are enforceable. Most policies are issued in writing for practical and regulatory reasons, but writing itself is not a legal requirement of contract formation."},
  {topic:"Insurance fundamentals, risk & contract law",question:"The principle of indemnity in insurance means:",options:{A:"The insured profits from a loss",B:"The insured is restored to the same financial position as before the loss",C:"The insurer pays the maximum policy limit for every claim",D:"The insured is compensated double for losses caused by negligence"},correct:"B",explanation:"Indemnity means the insured is made financially whole — restored to the same position they were in before the loss, no more and no less. The principle prevents profit from a loss. Life insurance is NOT a contract of indemnity because it pays a fixed face amount regardless of actual economic loss."},
  {topic:"Insurance fundamentals, risk & contract law",question:"An insurance contract is aleatory because:",options:{A:"The premium and potential payout are unequal in value",B:"The contract requires equal exchange of money",C:"Both parties must contribute equally",D:"The insured can profit from a loss"},correct:"A",explanation:"An aleatory contract is one in which the exchange of value is unequal. The insured pays a small premium, and the insurer may pay a large benefit if a covered loss occurs — or nothing at all if no loss occurs. This unequal exchange depends on a future uncertain event, making insurance contracts uniquely aleatory in nature."},

  // ── Ch. 3: Legal concepts ──
  {topic:"Legal concepts (subrogation, waiver, estoppel)",question:"Subrogation allows an insurer to:",options:{A:"Cancel a policy after a large claim",B:"Step into the shoes of the insured to recover from a responsible third party",C:"Refuse payment when the insured was partially at fault",D:"Subrogate the insured's rights to future premium discounts"},correct:"B",explanation:"Subrogation gives the insurer the legal right to pursue a third party responsible for a loss the insurer has already paid. For example, if another driver causes an accident and your insurer pays your claim, the insurer can then sue the at-fault driver. Importantly, subrogation does NOT apply to life insurance or individual health insurance in Maryland."},
  {topic:"Legal concepts (subrogation, waiver, estoppel)",question:"Estoppel in insurance law prevents an insurer from:",options:{A:"Raising premiums at renewal",B:"Denying a claim based on a condition it previously chose not to enforce",C:"Canceling a policy for non-payment of premium",D:"Excluding pre-existing conditions from coverage"},correct:"B",explanation:"Estoppel prevents a party from asserting a right or defense inconsistent with its prior conduct. If an insurer knowingly allows a policy violation (such as accepting late premiums) and the insured relies on that behavior, the insurer may be estopped from later denying a claim on that basis. Estoppel is the legal consequence of a waiver."},
  {topic:"Legal concepts (subrogation, waiver, estoppel)",question:"A waiver in insurance is best defined as:",options:{A:"The voluntary relinquishment of a known right",B:"A court order requiring an insurer to pay a claim",C:"The insured's right to cancel a policy",D:"An agreement between two insurers to share risk"},correct:"A",explanation:"A waiver is the intentional and voluntary giving up of a known legal right. If an insurer knows of a policy violation but chooses not to enforce it, the insurer has waived that right. Once waived, the right generally cannot be reclaimed — and the insurer may be estopped from later asserting it."},
  {topic:"Legal concepts (subrogation, waiver, estoppel)",question:"Which of the following is an example of utmost good faith (uberrimae fidei)?",options:{A:"An insurer paying claims promptly",B:"An applicant fully disclosing all material facts on the application",C:"An insurer offering the lowest available premium",D:"Both parties signing the policy at the same time"},correct:"B",explanation:"Utmost good faith requires both parties to an insurance contract to act in complete honesty and disclose all material information. The applicant must reveal facts that could affect the insurer's decision. Concealment of material facts can void the policy, and material misrepresentation can make it voidable — subject to incontestability after 2 years (except for fraud)."},
  {topic:"Legal concepts (subrogation, waiver, estoppel)",question:"Insurable interest in a life insurance policy must exist:",options:{A:"At the time of the insured's death",B:"At the time of policy application",C:"Continuously throughout the life of the policy",D:"Only if the policyowner is also the insured"},correct:"B",explanation:"In life insurance, insurable interest must exist at the time of application — not at the time of death. This differs from property insurance, where insurable interest must exist at the time of loss. Once a life policy is validly issued, it remains in force even if the relationship that created the insurable interest ends (e.g., divorce, end of business partnership)."},
  {topic:"Legal concepts (subrogation, waiver, estoppel)",question:"A material misrepresentation on a life insurance application:",options:{A:"Makes the policy automatically void from inception",B:"Can make the policy voidable by the insurer during the contestable period",C:"Has no effect once the policy is issued",D:"Is always considered fraud regardless of intent"},correct:"B",explanation:"A material misrepresentation — a false statement that, if known, would have caused the insurer to refuse the policy or charge a higher premium — makes the policy voidable by the insurer during the 2-year contestable period. After 2 years, the policy is incontestable except in cases of outright fraud, which has no time limit under Maryland law."},

  // ── Ch. 4: Types of life insurance ──
  {topic:"Types of life insurance policies",question:"Which type of life insurance provides coverage for a specific period and pays a death benefit only if the insured dies during that period?",options:{A:"Whole life",B:"Universal life",C:"Term life",D:"Variable life"},correct:"C",explanation:"Term life provides pure death protection for a specific period (e.g., 10, 20, 30 years). If the insured dies during the term, the beneficiary receives the death benefit. If the insured survives the term, the coverage expires with no cash value. Term is the most affordable type of life insurance because it builds no cash value."},
  {topic:"Types of life insurance policies",question:"Whole life insurance is characterized by all of the following EXCEPT:",options:{A:"Guaranteed level premiums",B:"Permanent protection to age 100 or death",C:"Accumulation of cash value",D:"Premiums that increase with age"},correct:"D",explanation:"Whole life features guaranteed level premiums that never increase. It provides permanent coverage (to age 100 or death), builds guaranteed cash value, and has a guaranteed death benefit. The level premium structure is one of whole life's defining advantages over term, which may have increasing premiums at renewal."},
  {topic:"Types of life insurance policies",question:"Universal life insurance differs from whole life primarily because it offers:",options:{A:"A guaranteed death benefit with no cash value",B:"Flexible premiums and adjustable death benefits",C:"Coverage for a set term only",D:"Premiums that are always tax-deductible"},correct:"B",explanation:"Universal life (UL) is characterized by its flexibility. The policyowner can adjust premium payments (within limits) and change the death benefit amount as needs change. The cash value earns interest at a declared rate. Unlike whole life, there are no rigid premium schedules — but insufficient premiums can cause the policy to lapse if cash value is depleted."},
  {topic:"Types of life insurance policies",question:"A Modified Endowment Contract (MEC) is created when:",options:{A:"A policy's death benefit exceeds $1,000,000",B:"A policy fails the 7-pay test by being funded too rapidly",C:"The insured reaches age 70½ and must take distributions",D:"A policy is converted from term to permanent"},correct:"B",explanation:"A MEC occurs when a life insurance policy is funded with more premium than allowed under the 7-pay test (IRS test). MECs lose favorable tax treatment: withdrawals and loans are taxed LIFO as ordinary income, and a 10% penalty applies to distributions before age 59½. The death benefit remains income-tax-free."},
  {topic:"Types of life insurance policies",question:"Variable life insurance differs from whole life in that the cash value:",options:{A:"Is guaranteed never to decrease",B:"Is invested in separate account sub-funds chosen by the policyowner",C:"Earns a fixed interest rate set by the insurer",D:"Cannot be borrowed against under any circumstances"},correct:"B",explanation:"With variable life, the policyowner directs cash value into separate account investment sub-funds (similar to mutual funds). Cash value and potentially the death benefit fluctuate based on investment performance. Because of the securities component, agents selling variable products must hold both a Maryland life insurance license AND a FINRA securities registration (Series 6 or 7)."},
  {topic:"Types of life insurance policies",question:"A limited-pay whole life policy:",options:{A:"Has lower premiums than ordinary whole life because it pays a smaller benefit",B:"Requires premium payments only for a specified period but provides coverage for life",C:"Provides coverage only until age 65",D:"Is the same as a term policy with a return-of-premium rider"},correct:"B",explanation:"Limited-pay whole life (such as 20-pay life or life paid-up at 65) condenses the premium payment period into a shorter timeframe while providing lifetime coverage. Because premiums are paid over fewer years, each premium is higher than ordinary whole life. After the pay period ends, no further premiums are due — but coverage continues for life."},
  {topic:"Types of life insurance policies",question:"Variable universal life (VUL) combines features of universal life and variable life by offering:",options:{A:"Guaranteed cash value with fixed premiums",B:"Flexible premiums plus separate-account investment options",C:"Term coverage with no investment component",D:"Annuity payments during the insured's lifetime"},correct:"B",explanation:"VUL combines the premium and death-benefit flexibility of universal life with the investment choice of variable life. The policyowner can adjust premiums and death benefits AND direct cash value into separate account sub-funds. VUL carries the most policyowner risk (and reward) of any permanent policy and requires both an insurance license and securities registration to sell."},

  // ── Ch. 5: Provisions, riders & nonforfeiture ──
  {topic:"Provisions, riders & nonforfeiture options",question:"What is the default nonforfeiture option in Maryland if the policyowner does not make a selection?",options:{A:"Cash surrender value",B:"Reduced paid-up insurance",C:"Extended term insurance",D:"Automatic premium loan"},correct:"C",explanation:"In Maryland, if a policyowner does not select a nonforfeiture option, the default is extended term insurance. This uses the policy's cash value to purchase term insurance for the full original face amount, for as long a period as the cash value will support. Nonforfeiture options ensure the policyowner receives value if premiums stop."},
  {topic:"Provisions, riders & nonforfeiture options",question:"The waiver of premium rider provides that:",options:{A:"The insurer waives the first year's premium as an incentive",B:"The policyowner can skip premiums during financial hardship",C:"Premiums are waived if the insured becomes totally disabled",D:"The beneficiary is not required to pay taxes on the death benefit"},correct:"C",explanation:"The waiver of premium rider keeps a policy in force without premium payments if the insured becomes totally disabled (typically unable to perform any gainful occupation). There is usually a 3–6 month elimination period before the waiver kicks in. The policy continues as if premiums were paid — cash value grows and the death benefit remains intact."},
  {topic:"Provisions, riders & nonforfeiture options",question:"A policy loan provision allows the policyowner to:",options:{A:"Borrow up to the full death benefit from the insurer",B:"Borrow against the policy's cash value without underwriting approval",C:"Take a tax-free loan from the government using the policy as collateral",D:"Receive an advance on the death benefit only in terminal illness cases"},correct:"B",explanation:"Policyowners can borrow against accumulated cash value without a credit check or approval. The loan bears interest. If the insured dies with an unpaid loan, the death benefit is reduced by the outstanding loan plus interest. Unlike a withdrawal, a policy loan does not immediately reduce cash value — but it does reduce the net death benefit."},
  {topic:"Provisions, riders & nonforfeiture options",question:"The accidental death benefit (ADB) rider pays an additional benefit if the insured dies:",options:{A:"Within one year of policy issue",B:"As a result of an accident, as defined in the policy",C:"Before age 65 for any reason",D:"Without a named beneficiary on file"},correct:"B",explanation:"The ADB rider (sometimes called double indemnity) pays an additional amount — typically equal to the face amount — if death results from a covered accident. The accident must be the direct cause of death, usually within a specified period (such as 90 days) of the accident. Deaths from illness, suicide, or excluded activities do not qualify."},
  {topic:"Provisions, riders & nonforfeiture options",question:"Maryland's incontestability clause requires that after how many years an insurer cannot contest a life policy for material misrepresentation?",options:{A:"1 year",B:"2 years",C:"3 years",D:"5 years"},correct:"B",explanation:"Maryland law requires life insurance policies to include an incontestability clause making the policy incontestable after 2 years from the date of issue (while the insured is alive). After 2 years, the insurer cannot deny a claim based on misrepresentation in the application — EXCEPT in cases of fraud, which has no time limit in Maryland."},
  {topic:"Provisions, riders & nonforfeiture options",question:"Under Maryland's standard suicide clause, if the insured dies by suicide within the first 2 policy years, the insurer will:",options:{A:"Pay the full death benefit",B:"Pay nothing and keep all premiums",C:"Return the premiums paid, with no death benefit",D:"Pay 50% of the face amount"},correct:"C",explanation:"Maryland's standard suicide clause excludes coverage for suicide within the first 2 years of the policy. If the insured dies by suicide during this period, the insurer returns only the premiums paid — no death benefit is paid. After 2 years, suicide is covered like any other cause of death. This matches Maryland's 2-year incontestability window."},

  // ── Ch. 6: Premiums, proceeds & beneficiaries ──
  {topic:"Premiums, proceeds & beneficiaries",question:"Which beneficiary designation gives the policyowner maximum flexibility to change the beneficiary at any time?",options:{A:"Irrevocable beneficiary",B:"Revocable beneficiary",C:"Primary beneficiary",D:"Contingent beneficiary"},correct:"B",explanation:"A revocable beneficiary designation can be changed by the policyowner at any time without the beneficiary's consent. This provides maximum flexibility. An irrevocable beneficiary cannot be changed without the beneficiary's written consent — the beneficiary has a vested interest. Irrevocable designations are often used in divorce settlements or business buy-sell arrangements."},
  {topic:"Premiums, proceeds & beneficiaries",question:"Under the spendthrift clause in a life insurance policy:",options:{A:"The beneficiary cannot spend more than $500 per month from proceeds",B:"Proceeds held under a settlement option are protected from the beneficiary's creditors",C:"The insured's creditors can access the death benefit before the beneficiary",D:"The policyowner forfeits cash value if premiums are not paid on time"},correct:"B",explanation:"A spendthrift clause protects life insurance proceeds from being seized by the beneficiary's creditors when held by the insurer under a settlement option (installments). The clause keeps proceeds from being assigned or used to pay the beneficiary's debts before they are received. It is designed to protect financially irresponsible beneficiaries."},
  {topic:"Premiums, proceeds & beneficiaries",question:"If an insured and primary beneficiary die in the same accident and the order of death cannot be determined, which rule applies?",options:{A:"The Uniform Simultaneous Death Act — the insured is presumed to have survived",B:"The death benefit is paid to the insurer",C:"The contingent beneficiary automatically receives double the benefit",D:"The estate of the primary beneficiary always receives the proceeds"},correct:"A",explanation:"The Uniform Simultaneous Death Act presumes the insured survived the beneficiary when the order of death cannot be determined. Proceeds pass as if the beneficiary predeceased — going to the contingent beneficiary (or the insured's estate if none). This avoids proceeds passing through the primary beneficiary's estate and being taxed twice."},
  {topic:"Premiums, proceeds & beneficiaries",question:"Per stirpes beneficiary designation means that if a named beneficiary predeceases the insured:",options:{A:"The deceased beneficiary's share is divided equally among the other primary beneficiaries",B:"The deceased beneficiary's share passes to their descendants by representation",C:"The death benefit is paid to the insured's estate",D:"The contingent beneficiary receives the entire benefit"},correct:"B",explanation:"Per stirpes (Latin for 'by branch') means the deceased beneficiary's share passes to that beneficiary's descendants. For example, if a parent names three children equally and one predeceases the parent, that child's share goes to that child's children (the insured's grandchildren). Per capita ('by head'), in contrast, redistributes the deceased beneficiary's share among the surviving named beneficiaries."},
  {topic:"Premiums, proceeds & beneficiaries",question:"Which settlement option pays the beneficiary a guaranteed income for a specific number of years, with any remaining payments going to a contingent beneficiary if the primary dies?",options:{A:"Interest only",B:"Fixed period (period certain)",C:"Life income only",D:"Lump sum"},correct:"B",explanation:"The fixed period (period certain) option pays the proceeds plus interest in installments over a specified period — for example, 10 or 20 years. If the beneficiary dies before the period ends, remaining payments continue to a contingent beneficiary. The fixed amount option pays a specified dollar amount until proceeds plus interest are exhausted. Life income options pay for life, not a fixed period."},

  // ── Ch. 6b: Life insurance taxation & policy loans ──
  {topic:"Life insurance taxation & policy loans",question:"Life insurance death benefits paid to a named beneficiary are:",options:{A:"Subject to federal income tax as ordinary income",B:"Generally received income-tax-free",C:"Taxed at capital gains rates",D:"Subject to Maryland state income tax only"},correct:"B",explanation:"Death benefits are generally received income-tax-free by the named beneficiary under IRC Section 101(a). This is one of the primary tax advantages of life insurance. However, interest earned on proceeds left with the insurer IS taxable. The death benefit may also be included in the insured's taxable estate for estate tax purposes if the insured owned the policy at death."},
  {topic:"Life insurance taxation & policy loans",question:"Cash value accumulation in a non-MEC permanent life insurance policy grows:",options:{A:"Tax-free, with tax-free withdrawals at any time",B:"Tax-deferred, with potential tax on withdrawals exceeding basis",C:"Subject to annual taxation as ordinary income",D:"Tax-free for the first 7 years only"},correct:"B",explanation:"Cash value grows tax-deferred — no current taxation while it accumulates inside the policy. Withdrawals up to the policy's basis (total premiums paid) are tax-free under FIFO treatment for non-MEC policies. Withdrawals above basis are taxable. Policy loans are generally not taxable as long as the policy remains in force. MEC policies use LIFO and lose this favorable treatment."},
  {topic:"Life insurance taxation & policy loans",question:"A 1035 exchange allows which of the following tax-free exchanges?",options:{A:"An annuity exchanged for a life insurance policy",B:"A life insurance policy exchanged for an annuity",C:"A traditional IRA converted to a Roth IRA",D:"Group life converted to individual coverage"},correct:"B",explanation:"IRC Section 1035 allows certain tax-free exchanges: life insurance to another life policy or to an annuity, and annuity to another annuity. However, an annuity CANNOT be exchanged for a life insurance policy tax-free under Section 1035 — that exchange is taxable. The rule: you can move 'broader' (life can become an annuity) but not 'narrower' (annuity cannot become life)."},
  {topic:"Life insurance taxation & policy loans",question:"Interest paid on a personal life insurance policy loan is:",options:{A:"Tax-deductible as investment interest",B:"Tax-deductible up to $2,500 per year",C:"Not tax-deductible",D:"Deductible only if the loan exceeds the cash value"},correct:"C",explanation:"Interest paid on a personal life insurance policy loan is generally NOT tax-deductible under current federal tax law. The Tax Reform Act of 1986 eliminated personal interest deductions. Business policy loans may have limited deductibility in narrow circumstances, but the default rule for individuals is no deduction."},
  {topic:"Life insurance taxation & policy loans",question:"To keep the death benefit out of the insured's taxable estate, life insurance is often owned by:",options:{A:"The insured personally",B:"An Irrevocable Life Insurance Trust (ILIT)",C:"A revocable living trust",D:"The primary beneficiary's IRA"},correct:"B",explanation:"An Irrevocable Life Insurance Trust (ILIT) owns the life insurance policy outside the insured's estate. Because the insured has no 'incidents of ownership' (cannot change beneficiaries, cancel, borrow against, or assign the policy), the death benefit is excluded from the insured's taxable estate at death. This provides estate liquidity without inflating the estate tax bill."},

  // ── Ch. 7: Underwriting & policy issue ──
  {topic:"Life insurance underwriting & policy issue",question:"Which of the following is a non-medical source of underwriting information?",options:{A:"Attending physician's statement",B:"Medical Information Bureau (MIB) report",C:"Blood and urine test results",D:"EKG results"},correct:"B",explanation:"The MIB is a non-medical underwriting source — it is a cooperative database of coded medical information shared among member insurers, used to detect fraud and omissions on applications. The attending physician's statement, blood/urine tests, and EKG are medical sources. MIB does not make underwriting decisions; it only provides information."},
  {topic:"Life insurance underwriting & policy issue",question:"A substandard risk applicant is most likely to be offered:",options:{A:"Coverage at standard rates with no conditions",B:"Declined coverage with a full premium refund",C:"Coverage at higher premiums or with an exclusion rider",D:"Group coverage only — individual coverage is unavailable"},correct:"C",explanation:"Substandard risks (higher-than-average mortality risk due to health, occupation, or lifestyle) are typically offered coverage with a rated-up premium, a flat extra premium, or an exclusion rider that excludes coverage for a specific hazardous condition. Complete denial is reserved for uninsurable risks. Substandard underwriting expands access to coverage while pricing for the added risk."},
  {topic:"Life insurance underwriting & policy issue",question:"The free-look period in Maryland for a standard life insurance policy is:",options:{A:"5 days",B:"10 days",C:"20 days",D:"30 days"},correct:"B",explanation:"Maryland requires a minimum 10-day free-look period for standard life insurance policies. During this time, the policyowner can return the policy for a full premium refund for any reason. Medicare Supplement policies and replacement transactions require a 30-day free-look period. The free-look protects buyers from being locked into unwanted coverage."},
  {topic:"Life insurance underwriting & policy issue",question:"Maryland's reinstatement provision allows a policyowner to reinstate a lapsed ordinary life insurance policy within how many years?",options:{A:"1 year",B:"2 years",C:"3 years",D:"5 years"},correct:"C",explanation:"Maryland allows reinstatement of a lapsed ordinary life policy within 3 years (industrial life is 2 years). To reinstate, the policyowner must (1) pay all overdue premiums with interest (capped at 6% in Maryland), (2) provide evidence of insurability, and (3) repay any outstanding policy loans. Reinstating preserves the original issue date for incontestability and suicide-clause purposes."},
  {topic:"Life insurance underwriting & policy issue",question:"When does life insurance coverage typically become effective?",options:{A:"When the application is submitted to the insurer",B:"When the insurer approves the application at headquarters",C:"When the first premium is paid and the policy is delivered while the insured is in good health",D:"On the date printed on the policy declarations page only"},correct:"C",explanation:"Life insurance coverage typically becomes effective when the first premium is paid AND the policy is delivered while the insured is in good health. If a conditional receipt was issued at application and premium was collected, coverage may begin earlier — at the application or exam date — if the applicant is found insurable per the receipt's terms."},

  // ── Ch. 8: Group life insurance ──
  {topic:"Group life insurance",question:"Under Section 79 of the IRS Code, how much employer-provided group term life insurance can an employee receive income-tax-free?",options:{A:"$25,000",B:"$50,000",C:"$75,000",D:"$100,000"},correct:"B",explanation:"Under IRC Section 79, the first $50,000 of employer-paid group term life insurance is received income-tax-free by the employee. Coverage above $50,000 creates imputed income — the employee must include the cost of the excess (calculated using IRS Table I rates) in their gross income. This applies only to group term life, not permanent or individual policies."},
  {topic:"Group life insurance",question:"Which of the following is a characteristic of group life insurance?",options:{A:"Each insured receives an individual policy",B:"Evidence of insurability is always required",C:"Coverage is provided under a master policy issued to the group sponsor",D:"Premiums are always paid entirely by the employee"},correct:"C",explanation:"Group life is issued under a single master policy to the group sponsor (employer, association, union, etc.). Individual members receive certificates of coverage, not separate policies. Members typically enroll without evidence of insurability during open enrollment. Premium contributions can be employer-paid, employee-paid, or shared."},
  {topic:"Group life insurance",question:"The conversion privilege in a group life plan allows a terminated employee to:",options:{A:"Continue group coverage at the group rate indefinitely",B:"Convert group coverage to individual permanent insurance without evidence of insurability",C:"Transfer the master policy to a new employer",D:"Convert unused sick leave into premium payments"},correct:"B",explanation:"The conversion privilege gives a departing employee the right to convert group coverage to an individual permanent policy within 31 days of leaving the group — without evidence of insurability. However, the new individual policy is priced at standard individual rates, not the lower group rate, so it can be significantly more expensive."},
  {topic:"Group life insurance",question:"The minimum participation requirement for a non-contributory group life plan is:",options:{A:"51%",B:"75%",C:"85%",D:"100%"},correct:"D",explanation:"A non-contributory plan is one where the employer pays 100% of the premium. Because the employer bears the entire cost, 100% participation of eligible employees is required — there is no adverse selection concern. Contributory plans (where employees share the premium cost) typically require 75% participation to prevent only high-risk employees from enrolling."},
  {topic:"Group life insurance",question:"The grace period for group life insurance premium payments is:",options:{A:"10 days",B:"15 days",C:"30 days",D:"31 days"},correct:"D",explanation:"The standard grace period for group life insurance is 31 days. During the grace period, coverage continues even though the premium is overdue. Ordinary individual life insurance in Maryland also has a 30-day grace period. Industrial life policies have a 4-week grace period. If a covered loss occurs during the grace period, the insurer pays the claim less any unpaid premium."},

  // ── Ch. 9: Annuities ──
  {topic:"Annuities",question:"The primary purpose of an annuity is to:",options:{A:"Provide a large lump sum at death",B:"Protect against the risk of outliving one's income (longevity risk)",C:"Generate tax-free retirement income",D:"Replace term life insurance at retirement"},correct:"B",explanation:"Annuities are designed to address longevity risk — the risk of outliving your money. During the accumulation phase, funds grow tax-deferred. During the annuitization phase, the insurer makes periodic payments to the annuitant for a set period or for life. Life insurance protects against dying too soon; annuities protect against living too long."},
  {topic:"Annuities",question:"Which annuity settlement option pays the highest periodic income but ceases at the annuitant's death with no survivor benefit?",options:{A:"Life with period certain",B:"Joint and survivor",C:"Straight life (life only)",D:"Fixed period certain"},correct:"C",explanation:"Straight life (life only) pays the highest periodic payment because there is no survivor benefit. Payments continue for the annuitant's lifetime and cease at death — even if only one payment was made. This option maximizes income but carries the risk that little is paid if the annuitant dies soon after annuitization. It suits those with no dependents who want maximum income."},
  {topic:"Annuities",question:"A 1035 exchange allows:",options:{A:"An annuity to be exchanged for a life insurance policy tax-free",B:"A life insurance policy to be exchanged for an annuity tax-free",C:"An IRA to be converted to a Roth IRA without taxes",D:"Group life coverage to be converted to individual coverage"},correct:"B",explanation:"Section 1035 allows: life→life, life→annuity, and annuity→annuity tax-free. However, an annuity CANNOT be exchanged for a life insurance policy tax-free under Section 1035 — that exchange is taxable. The rule: you can only go 'broader' (life can become annuity) but not 'narrower' (annuity cannot become life)."},
  {topic:"Annuities",question:"A variable annuity differs from a fixed annuity because the variable annuity:",options:{A:"Guarantees a minimum monthly payment",B:"Has no accumulation phase",C:"Invests in separate account sub-funds with payments tied to investment performance",D:"Is always funded with after-tax dollars"},correct:"C",explanation:"Variable annuities invest premium in separate account sub-funds (similar to mutual funds) chosen by the owner. Accumulation value and future payments vary with sub-fund performance — there is investment risk but also higher return potential. Because of the securities component, variable annuity sellers must hold both an insurance license and a FINRA securities registration."},
  {topic:"Annuities",question:"Before selling an annuity to a Maryland consumer for the first time, a producer must complete:",options:{A:"A 2-hour annuity suitability training course",B:"A 4-hour annuity suitability training course",C:"An 8-hour annuity suitability training course",D:"A 12-hour combined LTC and annuity course"},correct:"B",explanation:"Maryland requires producers to complete a 4-hour annuity suitability training course before selling an annuity product for the first time in the state. This training covers product features, fiduciary duty, and consumer protection rules. (LTC sales require 8-hour initial training plus 4 hours every 24 months.) Annuity suitability training is a one-time requirement, not recurring."},
  {topic:"Annuities",question:"In an immediate annuity, payments to the annuitant begin:",options:{A:"After a 5-year waiting period",B:"Within one payment period (typically 30 days to 1 year) of the premium payment",C:"Only after age 59½",D:"Only after the annuitant becomes disabled"},correct:"B",explanation:"An immediate annuity is funded with a single premium and begins paying the annuitant within one payment period — typically within 30 days to 1 year — depending on the payment frequency selected (monthly, quarterly, annual). A deferred annuity, in contrast, has an accumulation phase during which funds grow before annuitization. Immediate annuities are often used to convert a lump sum (like a 401(k) rollover) into lifetime income."},

  // ── Ch. 10: Uses of life insurance ──
  {topic:"Uses of life insurance (key person, buy-sell, estate)",question:"In a key person life insurance policy, the owner and beneficiary is:",options:{A:"The key employee",B:"The business",C:"The insured's family",D:"A trustee on behalf of shareholders"},correct:"B",explanation:"Key person insurance is purchased by a business on the life of an employee whose death would cause significant financial loss. The business owns the policy, pays the premiums, and is the beneficiary. Premiums are NOT tax-deductible, but the death benefit is received income-tax-free by the business — helping cover lost profits, recruit a replacement, and repay debts tied to the key person."},
  {topic:"Uses of life insurance (key person, buy-sell, estate)",question:"In a cross-purchase buy-sell agreement:",options:{A:"The business buys life insurance on each owner",B:"Each owner buys life insurance on each other owner",C:"A trustee holds all policies on behalf of all owners",D:"The surviving owners purchase the deceased's shares using company funds"},correct:"B",explanation:"In a cross-purchase agreement, each business owner buys a life insurance policy on each of the other owners. When one dies, the survivors receive the death benefit and use it to buy the deceased's interest from the estate. This can be administratively complex with many owners — but it gives survivors a stepped-up basis in the shares purchased."},
  {topic:"Uses of life insurance (key person, buy-sell, estate)",question:"In an entity (stock redemption) buy-sell agreement:",options:{A:"Each owner buys insurance on each other owner",B:"The business owns insurance on each owner and uses proceeds to redeem the deceased's interest",C:"The deceased's family must purchase the business",D:"The business is dissolved and assets divided among owners"},correct:"B",explanation:"In an entity (stock redemption) buy-sell, the business owns life insurance on each owner. When an owner dies, the business receives the death benefit and uses it to buy back (redeem) the deceased's ownership interest from the estate. This is simpler than cross-purchase when there are many owners — only one policy per owner is needed — but surviving owners do NOT get a stepped-up basis."},
  {topic:"Uses of life insurance (key person, buy-sell, estate)",question:"Life insurance is used in estate planning primarily to:",options:{A:"Avoid paying any federal estate taxes",B:"Provide immediate liquidity to pay estate taxes and settlement costs",C:"Transfer assets to heirs during the insured's lifetime",D:"Replace income lost due to estate attorney fees"},correct:"B",explanation:"A major use of life insurance in estate planning is providing immediate, liquid cash at death to pay estate taxes, funeral costs, debts, and settlement expenses — without forcing heirs to liquidate illiquid assets (real estate, a family business) quickly at unfavorable prices. When held in an ILIT, the death benefit can also be kept outside the taxable estate entirely."},
  {topic:"Uses of life insurance (key person, buy-sell, estate)",question:"Premiums paid by a business for key person life insurance are:",options:{A:"Tax-deductible as a business expense",B:"Not tax-deductible",C:"Deductible only if the business is a C corporation",D:"Deductible up to 50% of the premium amount"},correct:"B",explanation:"Premiums for key person life insurance are NOT tax-deductible to the business, because the business is the beneficiary of the policy. The trade-off: the death benefit is received income-tax-free. This is consistent with the general rule that premiums for insurance where the payer is also the beneficiary are not deductible."},

  // ── Ch. 11: Retirement plans & IRAs ──
  {topic:"Retirement plans & IRAs",question:"The 2026 IRA contribution limit for an individual UNDER age 50 is:",options:{A:"$6,000",B:"$6,500",C:"$7,000",D:"$7,500"},correct:"D",explanation:"For 2026, the IRA contribution limit is $7,500 for individuals under age 50 and $8,600 for individuals age 50 and older (the catch-up contribution amount). These limits apply to both traditional and Roth IRAs combined. Contributions must come from earned income and cannot exceed the individual's earned income for the year."},
  {topic:"Retirement plans & IRAs",question:"Under SECURE 2.0, Required Minimum Distributions (RMDs) from traditional IRAs must begin at age:",options:{A:"70½",B:"72",C:"73",D:"75"},correct:"C",explanation:"The SECURE 2.0 Act pushed the RMD age to 73. Individuals who turn 73 must begin taking RMDs from traditional IRAs and most employer retirement plans by April 1 of the following year. Roth IRAs do NOT have RMDs during the owner's lifetime — a key tax advantage. Failing to take RMDs triggers a steep excise tax penalty."},
  {topic:"Retirement plans & IRAs",question:"A Roth IRA differs from a traditional IRA in that Roth contributions are:",options:{A:"Tax-deductible and grow tax-deferred",B:"Made with after-tax dollars and qualified distributions are tax-free",C:"Only available to self-employed individuals",D:"Exempt from all contribution limits"},correct:"B",explanation:"Roth IRA contributions are made with after-tax dollars — no upfront tax deduction. However, qualified distributions (after age 59½ and a 5-year holding period) are completely tax-free, including all earnings. Traditional IRA contributions may be tax-deductible but distributions are taxed as ordinary income. Roth IRAs also have no lifetime RMDs."},
  {topic:"Retirement plans & IRAs",question:"A SIMPLE IRA is available to small employers with:",options:{A:"Fewer than 25 employees",B:"100 or fewer employees",C:"Fewer than 500 employees",D:"Any number of employees"},correct:"B",explanation:"A SIMPLE (Savings Incentive Match Plan for Employees) IRA is designed for small employers with 100 or fewer employees who earned at least $5,000 in the prior year. The employer must either match employee contributions up to 3% of compensation or make a 2% non-elective contribution. SIMPLE IRAs have lower administrative costs than a 401(k) but lower contribution limits."},
  {topic:"Retirement plans & IRAs",question:"Which type of retirement plan requires employer contributions based on a formula tied to profits?",options:{A:"Defined benefit pension plan",B:"401(k) plan",C:"Profit-sharing plan",D:"Money purchase pension plan"},correct:"C",explanation:"A profit-sharing plan allows discretionary employer contributions tied to company profits — within IRS limits. Defined benefit plans promise a specific monthly benefit at retirement regardless of profits. 401(k) plans allow employee salary deferrals with optional employer matching. Money purchase plans require fixed annual contributions regardless of profits."},
  {topic:"Retirement plans & IRAs",question:"A qualified retirement plan offers all of the following tax advantages EXCEPT:",options:{A:"Employer contributions are tax-deductible to the business",B:"Earnings grow tax-deferred until distribution",C:"Employees pay no taxes on distributions in retirement",D:"Employees are not taxed on contributions until withdrawn"},correct:"C",explanation:"Qualified plans (like 401(k)s and traditional pensions) offer multiple tax advantages: employer deductions, tax-deferred growth, and pre-tax employee contributions. However, distributions in retirement ARE taxed as ordinary income — so retirees do pay taxes when they withdraw. Roth-style qualified plans (Roth 401(k)) are the exception, allowing tax-free qualified distributions."},

  // ── Ch. 12: Social Security & disability ──
  {topic:"Social Security & disability benefits",question:"The Full Retirement Age (FRA) for Social Security for someone born in 1960 or later is:",options:{A:"62",B:"65",C:"66 and 6 months",D:"67"},correct:"D",explanation:"FRA for anyone born in 1960 or later is 67. Workers can begin claiming reduced Social Security retirement benefits as early as age 62 (permanently reduced by up to 30%), or delay past FRA to earn delayed retirement credits (up to age 70, adding ~8% per year). Claiming at exactly FRA results in 100% of the earned benefit."},
  {topic:"Social Security & disability benefits",question:"The Social Security disability waiting period before benefits begin is:",options:{A:"1 month",B:"3 months",C:"5 months",D:"6 months"},correct:"C",explanation:"There is a 5-month elimination period for Social Security Disability Insurance (SSDI). Benefits begin with the 6th full month of disability. SSDI uses a strict 'any occupation' standard — the applicant must be unable to engage in any substantial gainful activity due to a medically determinable impairment expected to last at least 12 months or result in death."},
  {topic:"Social Security & disability benefits",question:"Medicare Part A primarily covers:",options:{A:"Physician and outpatient services",B:"Prescription drugs",C:"Inpatient hospital, skilled nursing facility, and hospice care",D:"Dental and vision care"},correct:"C",explanation:"Medicare Part A (Hospital Insurance) covers inpatient hospital stays, skilled nursing facility (SNF) care after a qualifying 3-day inpatient hospital stay, hospice care, and some home health care. Most people receive Part A premium-free if they or their spouse paid Medicare taxes for at least 40 quarters (10 years). Part B covers physician services, Part D covers prescription drugs."},
  {topic:"Social Security & disability benefits",question:"To be 'fully insured' for Social Security retirement benefits, a worker generally needs:",options:{A:"10 years (40 quarters) of covered employment",B:"5 years (20 quarters) of covered employment",C:"15 years of any employment",D:"At least one year of self-employment"},correct:"A",explanation:"Fully insured status for Social Security retirement and survivor benefits requires 40 quarters (10 years) of covered employment. 'Currently insured' status — a lower threshold of 6 of the last 13 quarters — qualifies a worker's family for limited survivor benefits but not retirement benefits. Quarters are earned based on annual earnings thresholds, not specific months worked."},
  {topic:"Social Security & disability benefits",question:"Social Security retirement benefits taken at age 62 (vs. waiting until FRA) result in:",options:{A:"A 20% permanent increase in monthly benefits",B:"A permanent reduction of up to about 30% in monthly benefits",C:"Identical monthly benefits — only the start date changes",D:"A 50% reduction for life"},correct:"B",explanation:"Claiming early at age 62 results in a permanent reduction of up to about 30% of the FRA benefit, depending on the worker's birth year. Conversely, delaying past FRA earns delayed retirement credits — roughly 8% per year added until age 70. The 'break-even age' for delaying typically falls in the late 70s to early 80s."},

  // ── Ch. 13: Health & accident insurance basics ──
  {topic:"Health & accident insurance basics",question:"Under the ACA, young adults can remain on a parent's health insurance plan until age:",options:{A:"21",B:"23",C:"25",D:"26"},correct:"D",explanation:"The ACA requires health plans that provide dependent coverage to allow young adults to remain on a parent's plan until age 26 — regardless of marital status, financial dependency, student status, or whether they have access to coverage through their own employer. This applies to individual and group plans. Maryland uses Maryland Health Connection, the state-based ACA exchange."},
  {topic:"Health & accident insurance basics",question:"Which of the following is NOT considered an essential health benefit under the ACA?",options:{A:"Emergency services",B:"Maternity and newborn care",C:"Adult dental and vision care",D:"Mental health and substance use disorder services"},correct:"C",explanation:"The ACA requires 10 categories of essential health benefits (EHBs) in individual and small-group plans: ambulatory services, emergency services, hospitalization, maternity/newborn care, mental health, prescription drugs, rehab, lab services, preventive/wellness, and pediatric services (including dental and vision for children). Adult dental and vision are NOT required EHBs."},
  {topic:"Health & accident insurance basics",question:"COBRA continuation coverage allows employees who lose group coverage due to a qualifying event to continue coverage for up to:",options:{A:"6 months",B:"12 months",C:"18 months (36 for certain dependent events)",D:"24 months"},correct:"C",explanation:"COBRA allows continuation of group health coverage for up to 18 months following qualifying events such as voluntary or involuntary termination, or reduction in hours. Certain dependent qualifying events (divorce, death of the covered employee, dependent aging out) extend coverage to 36 months. The individual pays the full premium plus a 2% administrative fee — which can be expensive."},
  {topic:"Health & accident insurance basics",question:"Under Maryland's mandatory notice of claim provision, an insured must notify the insurer of a claim within how many days of the loss?",options:{A:"10 days",B:"20 days",C:"30 days",D:"90 days"},correct:"B",explanation:"Maryland's mandatory health insurance provisions require the insured to notify the insurer of a claim within 20 days of the loss (or as soon as reasonably possible). After notice, the insurer has 15 days to provide claim forms. The insured then has 90 days to submit proof of loss. These timeframes are standardized to balance insurer due diligence with insured fairness."},
  {topic:"Health & accident insurance basics",question:"The proof-of-loss provision in a health insurance policy requires the insured to submit proof of loss within:",options:{A:"30 days",B:"60 days",C:"90 days",D:"180 days"},correct:"C",explanation:"The mandatory proof-of-loss provision requires the insured to submit written proof of loss within 90 days of the date of loss (or as soon as reasonably possible — generally within 1 year unless legally incapacitated). The insurer must then pay or deny the claim within a reasonable period after receiving proof. These timeframes are part of the Uniform Individual Accident and Sickness Policy Provisions Law adopted in Maryland."},
  {topic:"Health & accident insurance basics",question:"The time limit on certain defenses provision (similar to incontestability in life) prevents an insurer from denying a health claim due to non-fraudulent misrepresentation after:",options:{A:"6 months",B:"1 year",C:"2 years",D:"5 years"},correct:"C",explanation:"After 2 years from a health policy's issue date, the insurer cannot void the policy or deny a claim based on misrepresentations in the application — except for fraudulent misstatements. This 2-year limit also bars the exclusion of pre-existing conditions not disclosed in the application. The provision mirrors life insurance incontestability and protects long-term policyholders."},

  // ── Ch. 14: Health plan types ──
  {topic:"Health plan types (HMO, PPO, EPO, POS, HDHP)",question:"Which managed care plan requires members to select a primary care physician (PCP) who coordinates all care?",options:{A:"PPO",B:"EPO",C:"HMO",D:"Indemnity plan"},correct:"C",explanation:"HMOs require members to choose a PCP who acts as a gatekeeper. Referrals from the PCP are generally required to see specialists. HMOs only cover in-network providers (except emergencies), resulting in lower out-of-pocket costs but less flexibility. Members must live or work in the HMO's service area."},
  {topic:"Health plan types (HMO, PPO, EPO, POS, HDHP)",question:"A PPO differs from an HMO primarily because PPO members:",options:{A:"Must select a PCP and obtain referrals",B:"Can see out-of-network providers at higher cost sharing",C:"Are only covered for preventive care",D:"Cannot use any out-of-network providers"},correct:"B",explanation:"PPOs offer more flexibility than HMOs. Members can see in-network or out-of-network providers without a PCP referral. In-network providers have negotiated lower rates, so out-of-pocket costs are lower in-network. Out-of-network care is covered at higher cost-sharing. PPOs typically charge higher premiums in exchange for this flexibility."},
  {topic:"Health plan types (HMO, PPO, EPO, POS, HDHP)",question:"A High Deductible Health Plan (HDHP) is eligible to be paired with a:",options:{A:"Flexible Spending Account (FSA)",B:"Health Savings Account (HSA)",C:"Health Reimbursement Arrangement funded by the employee",D:"Medicare Supplement plan"},correct:"B",explanation:"HDHPs may be paired with an HSA — pre-tax contributions, tax-free growth, and tax-free withdrawals for qualified medical expenses (triple-tax-advantaged). For 2026, HSA contribution limits are $4,400 (self-only) and $8,750 (family). The HDHP must have a minimum deductible of $1,700 (self-only) or $3,400 (family). HSA funds roll over indefinitely."},
  {topic:"Health plan types (HMO, PPO, EPO, POS, HDHP)",question:"A Point-of-Service (POS) plan combines features of which two plan types?",options:{A:"HMO and traditional indemnity",B:"HMO and PPO",C:"PPO and EPO",D:"EPO and traditional indemnity"},correct:"B",explanation:"A POS plan is a hybrid of HMO and PPO. Like an HMO, members select a PCP who coordinates care and provides referrals within the network. Like a PPO, members can choose to go out-of-network — but they pay significantly more (higher deductibles and coinsurance) when they do. POS plans suit those wanting flexibility but willing to pay more for it."},
  {topic:"Health plan types (HMO, PPO, EPO, POS, HDHP)",question:"An Exclusive Provider Organization (EPO) is similar to a PPO except that an EPO:",options:{A:"Does not cover out-of-network care (except emergencies)",B:"Requires referrals from a PCP",C:"Covers only preventive care",D:"Is only available to government employees"},correct:"A",explanation:"An EPO is like a PPO in that members can self-refer to specialists in-network without a PCP gatekeeper, but it is like an HMO in that out-of-network care is NOT covered (except for emergencies). EPOs typically have lower premiums than PPOs because of the network restriction, while offering more provider flexibility than an HMO within the network."},
  {topic:"Health plan types (HMO, PPO, EPO, POS, HDHP)",question:"The 2026 HSA contribution limit for an individual with self-only HDHP coverage is:",options:{A:"$3,650",B:"$3,850",C:"$4,150",D:"$4,400"},correct:"D",explanation:"For 2026, the HSA contribution limit is $4,400 for self-only HDHP coverage and $8,750 for family HDHP coverage. Individuals age 55 and older can make an additional $1,000 catch-up contribution. To contribute, the individual must be covered by a qualifying HDHP (minimum deductible $1,700 self-only / $3,400 family for 2026) and have no other disqualifying coverage."},

  // ── Ch. 15: Medical expense & cost-sharing ──
  {topic:"Medical expense & cost-sharing",question:"The amount a covered person must pay out-of-pocket before insurance begins paying benefits is the:",options:{A:"Copayment",B:"Coinsurance",C:"Deductible",D:"Out-of-pocket maximum"},correct:"C",explanation:"The deductible is the amount the insured pays out-of-pocket before the insurer begins covering costs. Copays are fixed dollar amounts per service. Coinsurance is the percentage split between insurer and insured after the deductible. The out-of-pocket maximum is the most the insured will pay in a year before the insurer covers 100% of covered services."},
  {topic:"Medical expense & cost-sharing",question:"If a health plan has an 80/20 coinsurance provision after the deductible, this means:",options:{A:"The insurer pays 20% and the insured pays 80%",B:"The insurer pays 80% and the insured pays 20%",C:"The first 20% of premiums are returned if no claims are filed",D:"The insured must use in-network providers 80% of the time"},correct:"B",explanation:"An 80/20 coinsurance split means the insurer pays 80% of covered expenses above the deductible and the insured pays the remaining 20%. This continues until the out-of-pocket maximum is reached, at which point the insurer pays 100%. The insured's 20% is the coinsurance amount, paid after the deductible is satisfied."},
  {topic:"Medical expense & cost-sharing",question:"A coordination of benefits (COB) provision prevents an insured covered under two plans from:",options:{A:"Seeing out-of-network providers",B:"Collecting more than 100% of actual medical expenses",C:"Changing primary insurers more than once per year",D:"Filing claims with the secondary insurer without prior approval"},correct:"B",explanation:"COB ensures that when someone is covered under two health plans, the total benefits paid do not exceed the actual cost of the medical services. The primary plan pays first; the secondary plan pays up to its limits for the remaining balance — but combined payments cannot exceed 100% of expenses. This prevents double-dipping and overpayment."},
  {topic:"Medical expense & cost-sharing",question:"A copayment differs from coinsurance in that a copayment is:",options:{A:"A percentage of the cost paid by the insured",B:"A fixed dollar amount paid by the insured per service",C:"Always paid only by the insurer",D:"Paid only after the out-of-pocket maximum is reached"},correct:"B",explanation:"A copayment (copay) is a fixed dollar amount the insured pays at the time of service — for example, $25 for a primary care visit or $15 for a generic prescription. Coinsurance is a percentage (e.g., 20%) of the cost paid by the insured after the deductible is satisfied. Many plans use both — copays for routine care and coinsurance for major medical expenses."},
  {topic:"Medical expense & cost-sharing",question:"The 'usual, customary, and reasonable' (UCR) charge in indemnity plans refers to:",options:{A:"The maximum the insurer will pay for a given service in a geographic area",B:"The full sticker price billed by a provider",C:"The amount the insured pays as a deductible",D:"The premium for the plan"},correct:"A",explanation:"UCR is the maximum amount an indemnity insurer will consider 'reasonable' for a particular service in a given geographic area. If a provider charges more than the UCR, the insured may be balance-billed for the excess. UCR limits are designed to prevent overbilling and keep insurer costs predictable. PPO/HMO networks largely replace UCR with negotiated contract rates."},

  // ── Ch. 16: Disability income insurance ──
  {topic:"Disability income insurance",question:"Which disability definition is MOST favorable to the insured?",options:{A:"Any occupation",B:"Own occupation",C:"Gainful occupation",D:"Modified own occupation"},correct:"B",explanation:"Own-occupation disability is the most liberal definition. It pays benefits if the insured cannot perform the duties of THEIR specific occupation — even if they could work in another field. For example, a surgeon who loses hand function could collect benefits while working as a teacher. 'Any occupation' is the strictest standard — benefits only pay if the insured cannot work in any occupation suited to their training."},
  {topic:"Disability income insurance",question:"The elimination period in a disability income policy is most similar to a:",options:{A:"Grace period",B:"Deductible",C:"Coinsurance period",D:"Free-look period"},correct:"B",explanation:"The elimination period is a time-based deductible — a waiting period at the start of a disability during which no benefits are paid. Common elimination periods are 30, 60, 90, or 180 days. Longer elimination periods reduce the premium because the insurer covers fewer days of disability. The benefit period is how long benefits are paid (e.g., 2 years, 5 years, or to age 65) once the elimination period is satisfied."},
  {topic:"Disability income insurance",question:"Residual disability benefits pay when the insured:",options:{A:"Is totally disabled and hospitalized",B:"Has a partial loss of income due to disability but can still work",C:"Reaches age 65 regardless of disability",D:"Has a disability expected to be permanent"},correct:"B",explanation:"Residual (partial) disability benefits compensate the insured for partial income loss due to disability — for example, a salesperson able to work only half-days. Benefits are proportional to the income loss (often calculated as the percentage of pre-disability income lost). Without a residual benefit rider, a disability policy would pay only for total disability, leaving partially disabled workers uncovered during recovery."},
  {topic:"Disability income insurance",question:"Business overhead expense (BOE) disability insurance is designed to:",options:{A:"Replace the owner's personal income during disability",B:"Fund a buy-sell agreement triggered by disability",C:"Pay ongoing fixed business expenses while the owner is disabled",D:"Provide a lump sum to business partners if an owner becomes disabled"},correct:"C",explanation:"BOE insurance covers a business owner's fixed overhead expenses (rent, utilities, employee salaries, loan payments) while the owner is disabled and unable to work. It does NOT replace personal income — a separate individual disability policy handles that. BOE benefits are paid to the business and are taxable to the business, since premiums are tax-deductible as a business expense."},
  {topic:"Disability income insurance",question:"The recurrent disability provision in a disability income policy:",options:{A:"Treats a relapse within a specified period as a continuation of the prior claim, with no new elimination period",B:"Doubles benefits for a second disability",C:"Limits coverage to one claim per lifetime",D:"Requires a new application after each disability"},correct:"A",explanation:"The recurrent disability provision states that if an insured returns to work and becomes disabled again from the same or related cause within a specified period (typically 6 months), the second disability is treated as a continuation of the original — no new elimination period applies, and the same benefit period continues. This protects insureds with chronic or recurring conditions from facing a fresh elimination period each time."},
  {topic:"Disability income insurance",question:"Disability income benefits from an individual policy where the insured paid the premiums with after-tax dollars are:",options:{A:"Taxed as ordinary income",B:"Received income-tax-free",C:"Taxed only above a $50,000 annual benefit",D:"Subject to Maryland state income tax only"},correct:"B",explanation:"When the insured pays premiums with after-tax dollars (an individual policy purchased privately), the benefits are received income-tax-free. When premiums are paid by an employer (or pre-tax by the employee through a Section 125 plan), the benefits ARE taxable as ordinary income. This 'who pays the premium' rule is fundamental to disability income taxation."},

  // ── Ch. 17a: Long-term care insurance ──
  {topic:"Long-term care insurance",question:"Long-term care (LTC) insurance benefits are typically triggered when the insured cannot perform how many of the 6 Activities of Daily Living (ADLs)?",options:{A:"1 of 6",B:"2 of 6",C:"3 of 6",D:"4 of 6"},correct:"B",explanation:"Most tax-qualified LTC policies pay benefits when the insured is unable to perform at least 2 of the 6 ADLs (bathing, dressing, eating, toileting, transferring, continence) without substantial assistance, OR has severe cognitive impairment (such as Alzheimer's). The benefit trigger is intended to ensure benefits flow to those genuinely needing custodial care, not just any health condition."},
  {topic:"Long-term care insurance",question:"Before selling a long-term care insurance policy in Maryland, a producer must complete:",options:{A:"A 2-hour LTC course one time only",B:"A 4-hour LTC course every 24 months",C:"An 8-hour initial LTC course plus 4 hours of LTC training every 24 months",D:"A 16-hour LTC course every year"},correct:"C",explanation:"Maryland requires producers to complete an 8-hour initial LTC training course before selling LTC policies, plus 4 additional hours of LTC-specific training every 24 months thereafter. This is in addition to standard CE requirements. The training covers product features, suitability, alternatives, and Maryland-specific LTC partnership rules. (Annuity suitability training, by contrast, is a one-time 4-hour requirement.)"},
  {topic:"Long-term care insurance",question:"Inflation protection is a critical LTC feature because:",options:{A:"Premiums automatically decrease over time",B:"LTC costs typically rise faster than general inflation",C:"It eliminates the need for medical underwriting",D:"It allows the policy to be transferred to family members"},correct:"B",explanation:"LTC costs (nursing home, assisted living, home care) have historically risen faster than general inflation. Without inflation protection, a benefit purchased today may be inadequate decades later when care is actually needed. Common inflation options include simple interest (e.g., 5%), compound interest, or a CPI-linked adjustment. Maryland requires insurers to offer inflation protection on LTC policies."},
  {topic:"Long-term care insurance",question:"The free-look period for LTC insurance policies in Maryland is:",options:{A:"10 days",B:"15 days",C:"20 days",D:"30 days"},correct:"D",explanation:"LTC policies require a 30-day free-look period in Maryland — longer than the 10-day free-look for standard life insurance. This extended period gives buyers (often seniors or those planning for late-life care) more time to review the complex coverage. Medicare Supplement and replacement transactions also use a 30-day free-look."},
  {topic:"Long-term care insurance",question:"A tax-qualified LTC policy offers the policyowner what tax benefit?",options:{A:"Tax-free benefits and potentially deductible premiums (subject to age-based limits)",B:"Premiums are always deductible at 100%",C:"Benefits are tax-free only if used for nursing home care",D:"There are no tax benefits — LTC premiums and benefits are fully taxable"},correct:"A",explanation:"Tax-qualified LTC policies allow the policyowner to deduct premiums as a medical expense (subject to age-based annual limits set by the IRS) and receive benefits income-tax-free (up to a per-diem limit). Non-tax-qualified policies may pay benefits more easily but lose these tax advantages. Most LTC policies sold today are tax-qualified."},

  // ── Ch. 17b: Medicare & Medigap ──
  {topic:"Medicare & Medigap (Parts A, B, C, D)",question:"The 2026 Medicare Part B monthly premium for most beneficiaries is:",options:{A:"$148.50",B:"$170.10",C:"$202.90",D:"$226.00"},correct:"C",explanation:"The 2026 Medicare Part B premium is $202.90 per month for most beneficiaries, with a $283 annual deductible. Part B covers physician services, outpatient hospital care, preventive services, durable medical equipment, and some home health care. Higher-income beneficiaries pay IRMAA (Income-Related Monthly Adjustment Amount) on top of the standard premium."},
  {topic:"Medicare & Medigap (Parts A, B, C, D)",question:"Medicare Part A hospital inpatient coverage begins after the beneficiary satisfies:",options:{A:"A monthly premium",B:"An inpatient deductible per benefit period",C:"A 20% coinsurance for the first 20 days",D:"A 90-day waiting period"},correct:"B",explanation:"Most beneficiaries pay no monthly premium for Part A (those with 40+ quarters of Medicare-covered work), but there is an inpatient deductible per benefit period for hospital stays. The deductible covers the first 60 days of inpatient care. Days 61–90 require daily coinsurance, and lifetime reserve days require even higher coinsurance. A benefit period ends after 60 consecutive days out of inpatient care."},
  {topic:"Medicare & Medigap (Parts A, B, C, D)",question:"Medigap (Medicare Supplement) insurance is designed to:",options:{A:"Replace Medicare Parts A and B entirely",B:"Cover prescription drugs not covered under Part B",C:"Fill gaps such as deductibles and coinsurance left by Original Medicare",D:"Provide dental and vision coverage not included in Medicare"},correct:"C",explanation:"Medigap policies are sold by private insurers to cover the out-of-pocket costs (gaps) left by Original Medicare — deductibles, coinsurance, and copays. They are standardized into lettered plans (A through N). Medigap does NOT cover Part D drugs, dental, vision, or long-term care. The buyer must have both Medicare Part A and Part B to purchase a Medigap policy."},
  {topic:"Medicare & Medigap (Parts A, B, C, D)",question:"Maryland's 'Birthday Rule' for Medicare Supplement allows a beneficiary to:",options:{A:"Switch to an equal or lesser Medigap plan with another insurer on a guaranteed-issue basis for 30 days following their birthday",B:"Receive a 10% premium discount during their birthday month",C:"Drop Medicare Part B without penalty during their birthday month",D:"Add a dental rider only during the birthday month"},correct:"A",explanation:"Maryland's Medigap Birthday Rule gives current Medigap policyholders a 30-day window starting on their birthday each year to switch to a Medigap plan with equal or lesser benefits from any insurer on a guaranteed-issue basis — no medical underwriting required. This is a powerful consumer protection unique to a small number of states, helping seniors shop for better rates without losing coverage due to health changes."},
  {topic:"Medicare & Medigap (Parts A, B, C, D)",question:"The Medicare Supplement free-look period in Maryland is:",options:{A:"10 days",B:"15 days",C:"20 days",D:"30 days"},correct:"D",explanation:"Medicare Supplement policies in Maryland have a 30-day free-look period — longer than the 10 days for standard life. During this time, the policyholder can return the policy for a full premium refund. The 30-day window also applies to LTC and replacement transactions. This extended period reflects the importance of giving senior consumers ample time to review complex coverage."},
  {topic:"Medicare & Medigap (Parts A, B, C, D)",question:"Medicare Part C (Medicare Advantage):",options:{A:"Is the prescription drug component of Medicare",B:"Replaces Original Medicare with a private plan that includes Parts A and B (often with extras)",C:"Is the supplemental policy that fills gaps in Original Medicare",D:"Covers only long-term care services"},correct:"B",explanation:"Medicare Part C (Medicare Advantage) is a private plan that bundles Parts A and B coverage — and often includes Part D drug coverage plus extras like dental, vision, or wellness benefits. Advantage plans replace Original Medicare and typically operate as HMOs or PPOs. Beneficiaries cannot have both Original Medicare with a Medigap policy AND a Medicare Advantage plan at the same time."},

  // ── Ch. 18-19: ACA, HIPAA, health underwriting & renewability ──
  {topic:"Health underwriting, renewability & federal rules",question:"Which renewability provision provides the MOST protection for the insured?",options:{A:"Cancellable",B:"Conditionally renewable",C:"Guaranteed renewable",D:"Non-cancellable"},correct:"D",explanation:"Non-cancellable provides the greatest protection — the insurer cannot cancel, raise premiums, or change terms as long as premiums are paid. Guaranteed renewable allows the insurer to raise rates for an entire class but cannot cancel. Conditionally renewable allows non-renewal for specific reasons. Cancellable gives the insurer the most control. Non-cancellable is most common in individual disability income policies."},
  {topic:"Health underwriting, renewability & federal rules",question:"Pre-existing condition exclusions in ACA-compliant individual and small group plans are:",options:{A:"Permitted in all health insurance policies",B:"Completely prohibited",C:"Only prohibited for children under age 18",D:"Allowed for up to 5 years"},correct:"B",explanation:"The ACA prohibits pre-existing condition exclusions in all ACA-compliant individual and small group health plans. Insurers cannot deny coverage, charge higher premiums, or exclude benefits based on health status or pre-existing conditions. This is one of the ACA's most significant consumer protections. Grandfathered plans and certain plan types (short-term limited duration) may have different rules."},
  {topic:"Health underwriting, renewability & federal rules",question:"HIPAA's portability provisions:",options:{A:"Allow employers to offer health insurance across state lines",B:"Limit pre-existing condition exclusion periods when switching group coverage and provide creditable coverage credit",C:"Require all employers to offer health insurance",D:"Eliminate deductibles for employees who switch jobs"},correct:"B",explanation:"HIPAA's portability provisions protect workers moving between group health plans by limiting pre-existing condition exclusions and crediting time spent under prior creditable coverage. HIPAA also established privacy and security rules for protected health information (PHI). Many HIPAA pre-ex rules have been largely superseded by the ACA's broader prohibition on pre-ex exclusions."},
  {topic:"Health underwriting, renewability & federal rules",question:"Maryland uses which type of ACA health insurance marketplace?",options:{A:"The federal exchange at Healthcare.gov",B:"A state-based marketplace called Maryland Health Connection",C:"A partnership exchange jointly with the federal government",D:"No exchange — coverage is sold directly by insurers"},correct:"B",explanation:"Maryland operates a state-based ACA marketplace called Maryland Health Connection (marylandhealthconnection.gov). Unlike Virginia and many other states that use Healthcare.gov, Maryland runs its own exchange — established under the ACA and administered by the Maryland Health Benefit Exchange. Maryland also has an 'Easy Enrollment' program that lets uninsured residents check a box on their state tax return to enroll in coverage."},
  {topic:"Health underwriting, renewability & federal rules",question:"Guaranteed renewable means the insurer:",options:{A:"Cannot raise premiums under any circumstance",B:"Cannot cancel the policy but may raise premiums for an entire class of insureds",C:"Must allow the insured to lower the deductible at any time",D:"Will renew the policy only if no claims are filed"},correct:"B",explanation:"Guaranteed renewable means the insurer must renew the policy as long as premiums are paid, BUT the insurer can raise rates — only for an entire class of insureds, not individually. This is stronger protection than conditionally renewable (insurer can non-renew in defined cases) but weaker than non-cancellable (rates cannot be raised at all). Guaranteed renewable is common in individual health and Medicare Supplement policies."},

  // ── MD: Maryland Insurance Code & required numbers ──
  {topic:"Maryland Insurance Code & required numbers",question:"In Maryland, the grace period for an ordinary life insurance policy is:",options:{A:"7 days",B:"15 days",C:"30 days",D:"60 days"},correct:"C",explanation:"Maryland requires a 30-day grace period for ordinary life insurance policies (group life is 31 days; industrial life is 4 weeks). During the grace period, the policy remains in force even if the premium is overdue. If the insured dies during the grace period, the insurer pays the death benefit minus the unpaid premium. After the grace period without payment, the policy lapses and nonforfeiture options apply."},
  {topic:"Maryland Insurance Code & required numbers",question:"Maryland's free-look period for a standard life insurance policy is:",options:{A:"5 days",B:"10 days",C:"20 days",D:"30 days"},correct:"B",explanation:"The standard Maryland free-look period for life insurance is 10 days. Medicare Supplement policies, LTC policies, and replacement transactions all require a 30-day free-look. The free-look gives buyers time to review the policy and return it for a full premium refund for any reason — a critical consumer protection."},
  {topic:"Maryland Insurance Code & required numbers",question:"Maryland's suicide clause excludes death benefits for suicide occurring within how many policy years?",options:{A:"1 year",B:"2 years",C:"3 years",D:"5 years"},correct:"B",explanation:"Maryland's standard suicide exclusion period is 2 years from policy issue. If the insured dies by suicide within 2 years, the insurer returns only the premiums paid — no death benefit. After 2 years, suicide is covered like any other cause of death. This matches the 2-year incontestability period, creating a unified critical milestone in year 2 of every Maryland life policy."},
  {topic:"Maryland Insurance Code & required numbers",question:"The Maryland reinstatement provision for ordinary life insurance allows reinstatement within how many years of lapse, with interest on back premiums capped at what rate?",options:{A:"2 years; 4% interest",B:"3 years; 6% interest",C:"5 years; 8% interest",D:"7 years; 6% interest"},correct:"B",explanation:"Maryland allows reinstatement of lapsed ordinary life insurance within 3 years, with back-premium interest capped at 6% maximum. The policyowner must also provide evidence of insurability and repay any policy loans. Industrial life insurance has a 2-year reinstatement window. Reinstating preserves the original issue date for incontestability and suicide-clause purposes — often preferable to buying a new policy."},
  {topic:"Maryland Insurance Code & required numbers",question:"The regulator overseeing insurance in Maryland is the:",options:{A:"Maryland Department of Insurance Affairs (MDIA)",B:"Maryland Insurance Administration (MIA)",C:"Maryland Bureau of Insurance (BOI)",D:"Maryland Insurance Commission (MIC)"},correct:"B",explanation:"The Maryland Insurance Administration (MIA), led by the Maryland Insurance Commissioner, regulates the insurance industry in Maryland. The MIA enforces the Maryland Insurance Article, licenses producers, investigates consumer complaints, and approves insurance products and rates. (Virginia, by contrast, uses the State Corporation Commission's Bureau of Insurance — but in Maryland the regulator is the MIA.)"},
  {topic:"Maryland Insurance Code & required numbers",question:"Maryland requires insurance producers to retain replacement transaction records for at least:",options:{A:"2 years",B:"3 years",C:"5 years",D:"7 years"},correct:"C",explanation:"Maryland requires producers to retain replacement transaction records for at least 5 years. Underwriting records must be retained for 3 years. Policy illustrations must be retained for 3 years after the policy ends. Records must be available to the Maryland Insurance Administration (MIA) upon request. Failure to maintain records can result in disciplinary action including license suspension or revocation."},
  {topic:"Maryland Insurance Code & required numbers",question:"The free-look period for a Medicare Supplement policy in Maryland is:",options:{A:"10 days",B:"20 days",C:"30 days",D:"60 days"},correct:"C",explanation:"Medicare Supplement policies in Maryland require a 30-day free-look period. The same 30-day window applies to LTC policies and replacement transactions. Standard individual life insurance has a 10-day free-look. The extended period for Medicare Supplement reflects the importance of giving senior consumers ample time to review complex coverage."},

  // ── MD: Producer licensing & reporting ──
