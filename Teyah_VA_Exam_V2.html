contracts involve an unequal exchange of value that depends on chance. An insured may pay small premiums for years and the insurer never pays out, or the insured may die after the first premium and the insurer pays the full face amount. This contrasts with a commutative contract where both parties exchange roughly equal values. Gambling is also aleatory, but unlike gambling, insurance reduces risk rather than creating it."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "An insurance contract is unilateral because:", "options": {"A": "Only the applicant is required to make promises", "B": "Only the insurer makes a legally enforceable promise to pay", "C": "Both parties make mutual enforceable promises", "D": "The state insurance department enforces the contract on behalf of both parties"}, "correct": "B", "explanation": "In a unilateral contract, only one party (the insurer) makes a legally binding promise — to pay covered claims. The insured does not promise to pay premiums; they can stop paying at any time without penalty (though coverage lapses). Because the insurer is the only one making a binding promise, courts resolve ambiguities in the contract against the insurer (since the insurer drafted it) and in favor of the insured."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Adverse selection in insurance refers to:", "options": {"A": "The insurer's practice of selecting only low-risk applicants", "B": "Higher-risk individuals seeking insurance more aggressively than lower-risk individuals", "C": "Agents steering clients to higher-commission products", "D": "Insurers reducing coverage limits to avoid catastrophic losses"}, "correct": "B", "explanation": "Adverse selection occurs because people with higher-than-average risk have greater incentive to purchase (and maintain) insurance. If unchecked, this creates an insurance pool with worse-than-average risk, leading to more claims and higher premiums. Insurers combat adverse selection through underwriting (evaluating each applicant's risk), requiring medical exams, and setting premiums based on demonstrated risk factors."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "An insurance contract obtained through illegal activity is best described as:", "options": {"A": "Voidable at the insurer's option", "B": "Voidable at the insured's option", "C": "Void — it has no legal effect from the beginning", "D": "Valid but subject to penalty premiums"}, "correct": "C", "explanation": "A void contract has no legal force from the start — it never was a valid contract. Insurance contracts for illegal activities (e.g., insuring stolen property) are void ab initio (from the beginning). A voidable contract, by contrast, is valid until one party elects to void it. Contracts obtained through fraud are typically voidable (the insurer may choose to void them) rather than void, because the insurance itself may be legal even if the procurement was fraudulent."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Because insurance is a personal contract, a life insurance policy:", "options": {"A": "Can be freely transferred to any third party like a car title", "B": "Can only be assigned to a financial institution as collateral", "C": "Cannot be assigned to another party without the insurer's knowledge", "D": "Automatically transfers to the insured's estate at death"}, "correct": "C", "explanation": "Insurance is personal because the insurer underwrote the specific individual. The policy generally cannot be transferred to another person without notifying the insurer. An absolute assignment transfers all ownership rights and requires notifying the insurer. A collateral assignment (used to secure a loan) also requires notifying the insurer. This protects the insurer's underwriting decisions — you cannot sell your cheap, healthy-person policy to someone with a terminal illness."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Statements made by an applicant on an insurance application are treated as:", "options": {"A": "Warranties — guaranteed to be completely true in every respect", "B": "Representations — believed to be substantially true to the best of the applicant's knowledge", "C": "Legal affidavits — notarized statements with criminal penalties for inaccuracy", "D": "Offers — which the insurer can accept or reject in their entirety"}, "correct": "B", "explanation": "Representations are statements believed to be true to the best of the applicant's knowledge and belief — not guaranteed facts. Because they are representations (not warranties), minor inaccuracies do not automatically void the policy. Only material misrepresentations (those that would have affected the insurer's underwriting decision) can void coverage. Most states, including Virginia, treat application statements as representations unless the policy specifically designates them as warranties."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "Which of the following characteristics is required for a risk to be commercially insurable?", "options": {"A": "The loss must be catastrophic and affect the entire industry", "B": "The insured must be able to prevent the loss with reasonable effort", "C": "The loss must be accidental, definite, measurable, and affect enough similar exposure units", "D": "The insurer must be able to predict with certainty when the loss will occur"}, "correct": "C", "explanation": "An insurable risk must be: (1) accidental/unintentional from the insured's perspective, (2) definite in time and cause, (3) measurable in dollar amount, (4) large enough to cause financial hardship, (5) affecting many similar exposure units (so the law of large numbers applies), and (6) not catastrophic to the entire insured pool. Intentional losses, speculative risks, and events affecting everyone at once (like nuclear war) generally fail these requirements."}, {"topic": "Insurance fundamentals, risk & contract law", "question": "A mutual insurance company differs from a stock company primarily in that:", "options": {"A": "Mutual companies are regulated by the federal government; stock companies by states", "B": "Mutual companies are owned by policyholders who may receive dividends from surplus earnings", "C": "Stock companies cannot sell participating (dividend-paying) policies", "D": "Mutual companies cannot be publicly traded on stock exchanges"}, "correct": "B", "explanation": "A mutual insurer is owned by its policyholders — they are both customers and owners. Surplus earnings may be returned as dividends (a return of excess premium, not taxable income up to basis). A stock insurer is owned by shareholders who receive dividends. Both types are regulated by state insurance departments. Some mutual companies have 'demutualized' (converted to stock companies), distributing ownership shares to existing policyholders in the process."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "Concealment in insurance refers to:", "options": {"A": "The insurer's practice of hiding exclusions in fine print", "B": "An applicant's intentional failure to disclose material facts to the insurer", "C": "An agent's failure to explain policy terms to the client", "D": "The insurer's refusal to discuss claims with third parties"}, "correct": "B", "explanation": "Concealment is the intentional withholding of information that is material to the insurer's underwriting decision. Unlike misrepresentation (stating something false), concealment is staying silent about relevant facts. For concealment to void a policy, it must be both intentional and material. An insured who genuinely forgot a medical detail is not guilty of concealment — the intent element is key."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "A fact is considered 'material' for insurance purposes if:", "options": {"A": "It is specifically listed as required on the application form", "B": "It would have affected the insurer's decision to issue the policy or set the premium", "C": "It occurred within the five years prior to the application", "D": "It was confirmed by a licensed physician in writing"}, "correct": "B", "explanation": "Materiality is determined objectively: would the information have influenced a reasonable insurer's underwriting decision? If so, the fact is material. A prior heart attack is clearly material for life or health insurance. A childhood broken arm likely is not material. The test is not whether the insured knew it was important — it's whether a reasonable insurer would consider it important."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "An innocent (non-fraudulent) misrepresentation on an insurance application:", "options": {"A": "Is always forgiven — only fraudulent misrepresentations matter", "B": "Can void the policy if the misrepresentation was material", "C": "Results only in a premium adjustment, not policy cancellation", "D": "Is correctable by the insured at any time with no consequences"}, "correct": "B", "explanation": "Even honest mistakes can void a policy if the misrepresentation is material. For example, if an applicant genuinely forgot about a serious medical condition, the insurer may still void the policy (within the contestability period) if that condition was material to underwriting. However, a material misrepresentation in the context of fraud has no time limit under the incontestability clause — it can be challenged even after 2 years."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The parol evidence rule in insurance contracts means that:", "options": {"A": "Verbal agreements made before policy issuance can override written policy terms", "B": "Only the written policy and attached documents constitute the entire agreement", "C": "Agents must explain all policy provisions verbally before delivery", "D": "The insurer must provide a written explanation of any claim denial"}, "correct": "B", "explanation": "The parol evidence rule prevents parties from using evidence of prior or concurrent oral negotiations to modify or contradict a written contract. In insurance, the written policy (and any attached riders, endorsements, or application) is the final agreement. Verbal promises made by an agent before the policy was issued generally cannot override the written policy terms. The entire contract clause reinforces this by specifying that the policy and application constitute the full agreement."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "In which situation would the doctrine of estoppel most likely prevent an insurer from denying a claim?", "options": {"A": "The insured deliberately falsified their age on the application", "B": "The insurer had previously waived a policy exclusion and the insured relied on that conduct", "C": "The insured failed to notify the insurer of a change in occupation", "D": "The insurer's claim department is located in a different state"}, "correct": "B", "explanation": "Estoppel prevents a party from asserting a right that contradicts their prior conduct when the other party reasonably relied on that conduct. If an insurer repeatedly paid claims for a condition it previously called an exclusion, it may be estopped from later enforcing that exclusion. Estoppel requires: (1) conduct by one party, (2) reasonable reliance by the other party, and (3) detriment to the relying party if the prior conduct is contradicted."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "Subrogation does NOT apply to which type of insurance?", "options": {"A": "Workers' compensation insurance", "B": "Individual automobile liability insurance", "C": "Individual life insurance policies", "D": "Commercial property insurance"}, "correct": "C", "explanation": "Subrogation is the insurer's right to step into the insured's shoes and pursue a responsible third party after paying a claim. It applies to most property/casualty and workers' comp coverage. However, individual life and individual health insurance do not typically include subrogation — there is no identifiable third party responsible for a natural death, and life insurance is not an indemnity contract. The insurer cannot 'recoup' a death benefit it paid by suing a third party."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The entire contract clause in a life insurance policy provides that:", "options": {"A": "The entire death benefit must be paid in a single lump sum", "B": "The policy and original application together constitute the complete agreement between insurer and insured", "C": "No amendments to the policy can be made after it is issued under any circumstances", "D": "All agents involved in the sale are bound by the policy terms"}, "correct": "B", "explanation": "The entire contract clause ensures that both parties know exactly what they agreed to — the policy document plus the original application forms the complete contract. No oral agreements, promises, or side letters outside these documents are binding. The clause also protects the insured by preventing the insurer from making unilateral changes to the policy after issuance. Any changes must be in writing, agreed to by both parties, and attached to the policy."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "The reasonable expectations doctrine in insurance law holds that:", "options": {"A": "Insureds can expect coverage for any loss not explicitly excluded in the policy", "B": "Ambiguous policy language is interpreted in favor of the coverage the insured would reasonably expect", "C": "Insurers must pay reasonable medical costs regardless of policy limits", "D": "Agents must provide written estimates of expected claims payouts at time of sale"}, "correct": "B", "explanation": "Courts applying the reasonable expectations doctrine resolve ambiguities in policy language in favor of the coverage a typical insured would reasonably expect. Since insurance contracts are adhesion contracts (drafted by the insurer, not negotiated), any unclear language is construed against the drafter. This doctrine protects consumers from unexpected coverage gaps buried in technical policy language they may not fully understand."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "Fraud committed at the time of a life insurance application:", "options": {"A": "Must be discovered within the 2-year contestability period to void the policy", "B": "Allows the insurer to contest the policy at any time, even after the contestability period expires", "C": "Results in a policy rate increase rather than policy cancellation", "D": "Is forgiven after the policy has been in force for 5 years"}, "correct": "B", "explanation": "Fraud is the key exception to the incontestability clause. While ordinary misrepresentation cannot be used to contest a policy after 2 years, fraudulent misrepresentation has no time limit. If the insurer can prove the applicant intentionally and knowingly provided false material information to obtain coverage, it can void the policy and deny claims even decades after issuance. Virginia law (Title 38.2) preserves this right to protect against deliberate fraud."}, {"topic": "Legal concepts (subrogation, waiver, estoppel)", "question": "When an insurer knowingly accepts premiums after a policy violation, this constitutes:", "options": {"A": "Rescission — cancellation of the policy retroactively", "B": "Subrogation — the insurer's right to recover from the insured", "C": "Waiver — the voluntary surrender of a known right", "D": "Estoppel — a court-ordered enforcement of the policy"}, "correct": "C", "explanation": "Accepting premiums while knowing of a policy violation is a classic example of waiver. By continuing to accept payments, the insurer voluntarily relinquishes (waives) its right to void the policy for that specific violation. Once waived, the right cannot be reclaimed for that particular breach. This is why insurers typically act quickly when they discover policy violations — delay in enforcement may constitute waiver and deprive them of the right to contest the policy."}, {"topic": "Types of life insurance policies", "question": "A Variable Universal Life (VUL) policy requires the selling agent to hold:", "options": {"A": "A life insurance license only, since VUL is primarily an insurance product", "B": "A securities license only, since VUL invests in separate account sub-funds", "C": "Both a life insurance license and a FINRA securities registration (Series 6 or 7)", "D": "A Series 63 state securities license plus a health insurance license"}, "correct": "C", "explanation": "VUL combines variable life (separate account investments) with universal life flexibility (adjustable premiums/death benefit). Because policyowners bear investment risk and the product has securities components, selling VUL requires both a state life insurance license AND FINRA registration (Series 6 or 7). The same dual-licensing requirement applies to variable annuities and variable whole life policies."}, {"topic": "Types of life insurance policies", "question": "Which type of permanent life insurance policy credits interest based on a market index performance, with a guaranteed floor of 0%?", "options": {"A": "Variable whole life", "B": "Traditional whole life", "C": "Indexed universal life (IUL)", "D": "Variable universal life (VUL)"}, "correct": "C", "explanation": "Indexed Universal Life (IUL) links cash value interest credits to a market index (typically the S&P 500) with a floor rate (usually 0%, so cash value never decreases from market losses) and a cap or participation rate limiting upside. Unlike variable life, IUL does not invest directly in the market — there is no separate account. The guaranteed floor differentiates IUL from VUL (which has no floor and can lose value). IUL requires only an insurance license, not a securities registration."}, {"topic": "Types of life insurance policies", "question": "A Modified Endowment Contract (MEC) results from:", "options": {"A": "A policy that fails to build adequate cash value within 10 years", "B": "A policy funded beyond the 7-pay test limit set by the IRS", "C": "Any life insurance policy that reaches maturity before age 100", "D": "Converting a term policy to whole life after age 70"}, "correct": "B", "explanation": "The IRS's 7-pay test limits how quickly a life policy can be funded. If total premiums paid within the first 7 years exceed the level premium that would fully pay up the policy in 7 years, the policy becomes a MEC. MECs lose favorable tax treatment: loans and withdrawals are taxed on a LIFO (last-in, first-out) basis and subject to a 10% early withdrawal penalty before age 59½. The death benefit remains income-tax-free. MEC status is permanent — it cannot be undone."}, {"topic": "Types of life insurance policies", "question": "The conversion privilege in a term life insurance policy allows the policyowner to:", "options": {"A": "Convert to a group policy when leaving employment", "B": "Exchange the policy for a variable annuity tax-free", "C": "Convert to permanent insurance without providing evidence of insurability", "D": "Reduce the term period in exchange for lower premiums"}, "correct": "C", "explanation": "The conversion privilege lets a term policyholder exchange their term coverage for a permanent policy (whole life, universal life) without a medical exam or evidence of insurability — regardless of any health changes since the term policy was issued. This preserves the insured's 'insurability' from the original application date. There is typically a conversion deadline (by a certain age or year of the term). The new permanent policy is priced at the insured's current attained age, not their original age."}, {"topic": "Types of life insurance policies", "question": "A graded death benefit policy provides full death benefits after the initial graded period, but during the first 2-3 years typically pays:", "options": {"A": "The full face amount only if death results from an accident", "B": "50% of the face amount for any cause of death", "C": "Return of premiums plus interest for death from natural causes", "D": "Nothing, making it equivalent to deferred coverage"}, "correct": "C", "explanation": "Graded death benefit policies (often guaranteed or simplified issue) restrict benefits during the first 2-3 years: natural cause deaths pay only a return of premiums plus interest (typically 10%); accidental deaths usually pay the full benefit from day one. After the graded period, the full death benefit applies for any cause of death. These policies serve people who cannot qualify for fully underwritten coverage due to health conditions."}, {"topic": "Types of life insurance policies", "question": "Which life insurance policy type provides both flexible premiums AND variable investment sub-accounts?", "options": {"A": "Indexed Universal Life (IUL)", "B": "Traditional whole life", "C": "Variable Universal Life (VUL)", "D": "Return of premium term"}, "correct": "C", "explanation": "VUL (Variable Universal Life) combines: (1) from variable life — the investment component allowing the policyowner to allocate cash value to separate account sub-funds; and (2) from universal life — the flexibility component with adjustable premiums and death benefits. IUL has flexible premiums but links to an index without separate accounts. Whole life has neither flexibility nor variable sub-accounts. VUL requires dual licensing (insurance + FINRA Series 6 or 7)."}, {"topic": "Types of life insurance policies", "question": "A whole life insurance policy is characterized by all of the following EXCEPT:", "options": {"A": "Level premiums that never increase", "B": "Permanent protection to age 100 or maturity", "C": "Guaranteed cash value accumulation", "D": "Cash value that fluctuates based on stock market performance"}, "correct": "D", "explanation": "Traditional whole life has guaranteed, level premiums; permanent coverage to age 100 (when cash value equals face amount); and a guaranteed cash value that grows at a specified rate. The cash value does NOT fluctuate based on the market — that is a feature of variable life or VUL. Whole life's guarantees (level premium, guaranteed cash value, guaranteed death benefit) make it more conservative than variable or universal products but provide absolute certainty."}, {"topic": "Types of life insurance policies", "question": "The return of premium (ROP) term policy differs from standard term insurance because:", "options": {"A": "The death benefit doubles if the insured dies within the first 5 years", "B": "If the insured survives the term, premiums paid are refunded", "C": "Premiums decrease over time as the insured ages", "D": "The insurer returns premiums only if no claims were filed"}, "correct": "B", "explanation": "A return of premium (ROP) term policy refunds 100% of premiums paid if the insured outlives the policy term. This feature makes ROP significantly more expensive than traditional term (often 30-60% higher premiums). The 'returned' money is received income-tax-free as a return of after-tax premiums. ROP term is popular with insureds who dislike the idea of paying premiums for coverage they may never use, though the higher cost may not be financially optimal compared to investing the premium difference."}, {"topic": "Types of life insurance policies", "question": "Universal life insurance's cash value is vulnerable to lapsing if:", "options": {"A": "The policyowner takes a policy loan above the cash value", "B": "The death benefit is increased without increasing premiums", "C": "Premiums paid are insufficient to cover the monthly cost of insurance and expenses", "D": "The insured changes their beneficiary designation"}, "correct": "C", "explanation": "Universal life's flexibility is a double-edged sword. If the policyowner pays minimal premiums and the credited interest rate is low, the monthly cost-of-insurance (COI) deductions can gradually deplete the cash value. When cash value reaches zero, the policy lapses unless additional premiums are paid. Unlike whole life with its guaranteed level premium structure, UL requires the policyowner to monitor cash value to ensure the policy remains in force, particularly at older ages when COI charges increase."}, {"topic": "Types of life insurance policies", "question": "Endowment life insurance matures when:", "options": {"A": "The insured reaches age 65 and elects retirement", "B": "The face amount equals the accumulated cash value at a specified age or end of the endowment period", "C": "Total premiums paid equal the original face amount", "D": "The policy has been in force for a minimum of 20 years"}, "correct": "B", "explanation": "Endowment insurance matures (pays out) when the policy's cash value grows to equal the face amount — at a specified age (e.g., age 65) or end of a set period (e.g., 20-year endowment). At maturity, the policyowner receives the face amount as if the insured had died. Because endowments accumulate cash value very rapidly, they commonly trigger MEC status under the 7-pay test. The IRS's MEC rules were specifically created to prevent endowments from being used as tax shelters."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The reduced paid-up nonforfeiture option provides the policyowner with:", "options": {"A": "Term insurance for the full face amount for a limited additional period", "B": "A cash payment equal to the policy's net cash value", "C": "Permanent insurance for a reduced face amount with no further premiums required", "D": "The right to reduce premium payments by 50% for 10 years"}, "correct": "C", "explanation": "The reduced paid-up (RPU) option converts the policy's cash value into a single-premium purchase of a smaller paid-up permanent policy — no further premiums are required. The new policy still builds cash value and earns dividends. RPU is preferable to extended term when the insured wants lifelong coverage (even at a reduced amount) rather than temporary full coverage. In Virginia, extended term is the default nonforfeiture option if no selection is made."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The automatic premium loan (APL) provision will activate when:", "options": {"A": "The insured applies for a new policy with the same insurer", "B": "A premium is unpaid at the end of the grace period, if the policy has sufficient cash value", "C": "The policyowner requests a loan to pay business expenses", "D": "The policy's face amount is increased with a guaranteed insurability rider"}, "correct": "B", "explanation": "The APL provision automatically borrows against the policy's cash value to pay an unpaid premium at the end of the grace period, keeping the policy in force. This prevents accidental lapses due to an overlooked payment. APL requires sufficient cash value and must be selected as an option (it is not automatically the default). Virginia's default nonforfeiture option is extended term insurance, not APL. Outstanding APL loans accrue interest and reduce the net death benefit."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The guaranteed insurability option (GIO) rider allows the policyowner to:", "options": {"A": "Guarantee the insurer will never raise the policy's premium", "B": "Purchase additional coverage at specified dates without evidence of insurability", "C": "Convert the entire policy to an annuity at retirement without medical underwriting", "D": "Guarantee that the policy will not lapse regardless of premium payment history"}, "correct": "B", "explanation": "The GIO rider reserves the right to purchase additional coverage on specified option dates (such as every 3 years, or at marriage/birth of a child) without providing evidence of insurability. Even if the insured has developed serious health conditions, they can still exercise these options. This rider 'locks in' future insurability and is most valuable when purchased by young, healthy insureds who anticipate growing financial obligations. The additional coverage purchased through GIO options is priced at the insured's current attained age."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The accidental death benefit (ADB) rider does NOT pay additional benefits when death results from:", "options": {"A": "A car accident on a public highway", "B": "A fall from a ladder while doing home repairs", "C": "A chronic illness that developed gradually over several years", "D": "Drowning in a swimming pool"}, "correct": "C", "explanation": "The ADB rider (double indemnity) pays an extra benefit — typically equal to the face amount — when death results directly from an accident as defined in the policy. Chronic illnesses, natural diseases, and deaths that occur gradually (rather than as a direct result of a sudden accident) are excluded. Other common exclusions include suicide, aviation accidents (in some policies), and death while committing a felony. Death must typically occur within a specified period (e.g., 90 days) after the accidental injury."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The misstatement of age provision in a life insurance policy states that if the insured's age was incorrectly stated:", "options": {"A": "The insurer may deny the entire claim if the error is discovered after death", "B": "The death benefit will be adjusted to what the premium would have purchased at the correct age", "C": "The policy is voided and all premiums are refunded", "D": "The insurer must pay the full stated face amount regardless of the error"}, "correct": "B", "explanation": "The misstatement of age (or sex) provision survives the incontestability period because it does not cancel coverage — it adjusts it. The death benefit is recalculated to the amount the actual premium paid would have purchased had the correct age been used at issue. If the insured was older than stated, the benefit decreases; if younger, it may increase. This provision is fair to both parties: the insurer gets what it priced for, and the insured (or estate) gets the proportional benefit."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "Which dividend option in a participating whole life policy increases both the total death benefit AND the cash value?", "options": {"A": "Accumulate dividends at interest", "B": "Apply dividends to reduce future premiums", "C": "Purchase paid-up additions (PUAs)", "D": "Receive dividends as cash payments"}, "correct": "C", "explanation": "Paid-up additions (PUAs) are mini whole life policies purchased with dividends. Each PUA adds to both the total death benefit AND the cash value, and each PUA earns its own dividends in subsequent years. The compounding effect makes PUAs the most powerful long-term dividend option. By contrast, accumulating dividends at interest grows cash in a savings fund (with taxable interest) but does not increase the insurance coverage. Cash payments provide liquidity but do not build within the policy."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "Virginia's reinstatement provision allows a policyowner to reinstate a lapsed policy within:", "options": {"A": "1 year of lapse", "B": "2 years of lapse", "C": "3 years of lapse", "D": "5 years of lapse"}, "correct": "C", "explanation": "Virginia law (Title 38.2) requires a 3-year reinstatement window. To reinstate, the policyowner must: (1) submit an application for reinstatement, (2) pay all overdue premiums with interest (typically 6-8%), and (3) provide evidence of insurability confirming the insured is still insurable. The reinstated policy keeps its original issue date — the incontestability and suicide clause clocks started at original issue, so reinstating may mean those periods have already expired, benefiting the insured."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The living benefits (accelerated death benefit) rider most commonly pays out when the insured:", "options": {"A": "Reaches age 70 and elects early retirement", "B": "Is diagnosed with a terminal illness with a life expectancy of 12-24 months or less", "C": "Has paid premiums for at least 20 consecutive years", "D": "Becomes temporarily disabled for more than 6 months"}, "correct": "B", "explanation": "The accelerated death benefit (ADB) rider — also called living benefits — allows the policyowner to receive a portion of the death benefit (typically 25-100%) while still alive upon diagnosis of a terminal illness. The advance is generally income-tax-free if used for medical expenses (IRC Section 101(g)). The death benefit paid at death is reduced by the amount accelerated, plus any interest charged. Some policies also have ADB triggers for chronic illness or the need for long-term care."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The spendthrift clause in a life insurance policy protects proceeds from:", "options": {"A": "Being paid directly to minor beneficiaries under age 18", "B": "Being seized by the beneficiary's creditors while held by the insurer under a settlement option", "C": "Being paid out in a lump sum that the beneficiary might spend irresponsibly", "D": "Federal income taxes when proceeds are received"}, "correct": "B", "explanation": "The spendthrift clause protects life insurance proceeds from creditors of the beneficiary when the insurer holds the proceeds under a settlement option (such as installment payments). While held by the insurer, creditors cannot attach, garnish, or levy the proceeds. Once actually paid to the beneficiary, the protection ends and creditors may pursue those funds. The clause is designed to ensure that financially vulnerable beneficiaries — or those with significant debts — receive the benefit as intended."}, {"topic": "Provisions, riders & nonforfeiture options", "question": "The waiver of premium rider takes effect after the insured has been totally disabled for:", "options": {"A": "30 days", "B": "60 days", "C": "The elimination period specified in the rider (typically 3-6 months)", "D": "12 consecutive months"}, "correct": "C", "explanation": "The waiver of premium rider includes an elimination period (typically 3-6 months) before premiums are waived. During this waiting period, the insured must continue paying premiums. Once the elimination period is satisfied and total disability is confirmed, the insurer waives premiums retroactively back to the start of the disability. The policy continues as if premiums were being paid — cash value grows, dividends are credited, and the death benefit remains intact. Most riders define 'total disability' as inability to perform any gainful occupation."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "A contingent (secondary) beneficiary receives the death benefit only when:", "options": {"A": "The primary beneficiary requests a partial payment", "B": "The primary beneficiary predeceases the insured or dies simultaneously", "C": "The death benefit exceeds $250,000", "D": "The primary beneficiary is a minor under age 18"}, "correct": "B", "explanation": "The contingent beneficiary is the backup — they have no rights while the primary beneficiary is living. They receive the death benefit only if the primary beneficiary predeceases the insured or (under the Uniform Simultaneous Death Act) dies at the same time. Without a named contingent beneficiary, proceeds go to the insured's estate if the primary predeceases, potentially triggering probate and exposing proceeds to estate creditors."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "An irrevocable beneficiary designation means the policyowner:", "options": {"A": "Can change the beneficiary only once per year", "B": "Must name a trust as beneficiary", "C": "Cannot change the beneficiary, take a loan, or surrender the policy without the beneficiary's written consent", "D": "Must maintain the same beneficiary for a minimum of 5 years"}, "correct": "C", "explanation": "An irrevocable beneficiary has a vested (property) interest in the policy. The policyowner cannot change the beneficiary, take a policy loan, assign or surrender the policy without the irrevocable beneficiary's written consent. This is commonly used in divorce settlements (protecting court-ordered insurance) and business arrangements. Irrevocable beneficiary designations provide strong financial security to the named beneficiary at the cost of the policyowner's flexibility."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Per stirpes beneficiary distribution means that if a beneficiary predeceases the insured:", "options": {"A": "Their share is divided equally among all surviving beneficiaries", "B": "Their share passes to their own children (the insured's grandchildren)", "C": "The entire benefit passes to the insured's estate", "D": "Only named surviving beneficiaries receive a distribution"}, "correct": "B", "explanation": "Per stirpes ('by the branch') means the deceased beneficiary's share passes down to their descendants. For example, if an insured names three children and one child dies before the insured leaving two grandchildren, those grandchildren split their parent's share. This contrasts with per capita distribution where the deceased beneficiary's share is divided equally among the surviving primary beneficiaries at that generation level."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Life insurance death benefits paid to a named beneficiary are generally:", "options": {"A": "Taxable as ordinary income in the year received", "B": "Subject to capital gains tax on the difference between face amount and premiums paid", "C": "Received income-tax-free under IRC Section 101(a)", "D": "Tax-deferred until the beneficiary reaches age 59½"}, "correct": "C", "explanation": "Under IRC Section 101(a), life insurance death benefits received by a named beneficiary are income-tax-free — one of life insurance's greatest tax advantages. This applies regardless of how large the benefit is. Exceptions: if proceeds are left with the insurer and earn interest, the interest IS taxable; if a policy was transferred for value (sold), the amount exceeding the buyer's basis may be taxable. The death benefit may also be included in the insured's estate for estate tax purposes."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Life insurance proceeds are included in the insured's taxable estate for estate tax purposes when:", "options": {"A": "The benefit exceeds $1 million", "B": "The beneficiary is a non-spouse", "C": "The insured owned the policy or had any incidents of ownership at death", "D": "The policy was issued within 3 years of death"}, "correct": "C", "explanation": "Incidents of ownership include: the right to change beneficiaries, take policy loans, surrender the policy, assign it, or name yourself as owner. If the insured held ANY of these rights at death, the full death benefit is included in their taxable estate. To exclude life insurance from the estate, ownership must be transferred (to an ILIT or another person) at least 3 years before death. The 3-year rule prevents deathbed transfers designed solely to avoid estate taxes."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "The common disaster clause in a life insurance policy provides that:", "options": {"A": "The death benefit is doubled if both spouses die in a common disaster", "B": "The primary beneficiary must survive the insured by a specified period to receive proceeds", "C": "The insured's estate automatically receives proceeds if death results from a disaster", "D": "The insurer waives the suicide exclusion in cases of natural disasters"}, "correct": "B", "explanation": "The common disaster (or survivorship) clause requires the beneficiary to survive the insured by a set period — typically 15-60 days. If the beneficiary dies within that period, proceeds pass as if the beneficiary had predeceased the insured. This prevents proceeds from passing through the beneficiary's estate (double probate, potential double estate taxes) if both the insured and beneficiary die in the same event. Most estate planning attorneys recommend survivorship clauses in all beneficiary designations."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "When life insurance proceeds are retained by the insurer and paid in installments, the interest earned on the held proceeds is:", "options": {"A": "Tax-free because it originated from a life insurance policy", "B": "Taxable as ordinary income to the beneficiary as it is credited", "C": "Taxable only when the total installments received exceed the original face amount", "D": "Subject to a flat 15% capital gains rate"}, "correct": "B", "explanation": "The principal (death benefit) portion of each installment is income-tax-free. However, interest earned on proceeds retained by the insurer IS taxable as ordinary income to the beneficiary in the year credited. This is why some beneficiaries prefer lump sum receipt and personal investment — they can potentially earn tax-advantaged returns rather than paying ordinary income tax on insurance company interest credits."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "A viatical settlement allows a terminally ill policyowner to:", "options": {"A": "Receive the full face amount from the insurer immediately upon terminal diagnosis", "B": "Sell the life insurance policy to a third-party investor for a discounted lump sum", "C": "Transfer the policy to a family member tax-free using the annual gift exclusion", "D": "Borrow the entire cash value without repayment obligation"}, "correct": "B", "explanation": "In a viatical settlement, the policyowner sells their life insurance policy to a viatical settlement company for a cash amount less than the face value but more than the cash surrender value. The investor pays future premiums and collects the death benefit. For terminally ill insureds (life expectancy under 24 months), proceeds are generally income-tax-free (IRC Section 101(g)). Chronically ill individuals may also qualify, though different tax rules may apply. Virginia regulates viatical settlements under Title 38.2."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Which settlement option provides the HIGHEST monthly income payment with NO residual benefit to heirs?", "options": {"A": "Life income with 10-year period certain", "B": "Joint and last survivor annuity", "C": "Straight life (life only) annuity option", "D": "Fixed amount installment for 20 years"}, "correct": "C", "explanation": "The straight life (life only) option provides the highest monthly payment because the insurer assumes the entire mortality risk — payments stop at death regardless of how few were made. If the beneficiary dies after receiving only one payment, no further amounts are paid. This option suits beneficiaries with no dependents who want to maximize lifetime income. The period certain option sacrifices some monthly income to guarantee a minimum number of payments to heirs."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "An absolute assignment of a life insurance policy permanently transfers:", "options": {"A": "Only the right to name beneficiaries to the assignee", "B": "All rights, title, and interest in the policy to the assignee", "C": "Only premium payment responsibilities to the assignee", "D": "The death benefit to the assignee while the original owner keeps all other rights"}, "correct": "B", "explanation": "An absolute assignment transfers complete ownership of the policy — including all incidents of ownership (right to change beneficiaries, take loans, surrender, assign). The original owner retains no rights after an absolute assignment. Absolute assignments are used when gifting a policy or transferring it to an ILIT. A collateral assignment, by contrast, transfers only specific rights (typically the right to be repaid a loan from the death benefit) while the policyowner retains all other rights."}, {"topic": "Premiums, proceeds & beneficiaries", "question": "Under the Uniform Simultaneous Death Act, when the insured and beneficiary die in the same accident with no evidence of the order of death:", "options": {"A": "Proceeds are split 50/50 between both estates", "B": "The insured is presumed to have survived the beneficiary, and proceeds pass as if the beneficiary predeceased the insured", "C": "The insurer holds proceeds until a court determines the order of death", "D": "The state takes custody of all life insurance proceeds"}, "correct": "B", "explanation": "The Uniform Simultaneous Death Act creates a legal presumption to resolve simultaneous death cases: the insured is presumed to have survived the beneficiary. This means proceeds pass as if the primary beneficiary predeceased the insured — going to the contingent beneficiary or the insured's estate. Without this rule, if the beneficiary were presumed to survive, proceeds would pass through the beneficiary's estate, potentially incurring double probate and double estate taxes."}, {"topic": "Life insurance underwriting & policy issue", "question": "The purpose of the Medical Information Bureau (MIB) in insurance underwriting is to:", "options": {"A": "Approve or deny all life insurance applications on behalf of member insurers", "B": "Provide a shared database of coded health information to help insurers detect fraud and omissions", "C": "Set maximum premium rates for high-risk applicants", "D": "Conduct medical examinations on behalf of insurance companies"}, "correct": "B", "explanation": "The MIB is a non-profit cooperative database used by member life and health insurers. It stores coded medical information from prior applications to help insurers detect undisclosed health conditions or inconsistencies between applications submitted to different companies. The MIB does NOT make underwriting decisions — it provides information for the insurer to use. Applicants must be informed that MIB information may be consulted, and they have the right to request and correct their MIB file."}, {"topic": "Life insurance underwriting & policy issue", "question": "A flat extra premium in life insurance underwriting is:", "options": {"A": "An additional amount charged per $1,000 of coverage for a specific extra hazard", "B": "A one-time fee charged when the policy is first issued", "C": "The premium increase applied when a policy converts from term to permanent", "D": "An extra charge assessed annually after age 60"}, "correct": "A", "explanation": "The flat extra premium is a fixed dollar amount per $1,000 of face amount, added to the standard premium to cover a specific extra hazard — such as a dangerous occupation (commercial fishing, mining) or a risky hobby (skydiving). For example, a flat extra of $5 per $1,000 on a $500,000 policy adds $2,500 to the annual premium. Flat extras are temporary (may be removed if the hazard is eliminated) or permanent (occupation-based) depending on the nature of the risk."}, {"topic": "Life insurance underwriting & policy issue", "question": "A conditional receipt issued with a life insurance application provides coverage:", "options": {"A": "Unconditionally from the date of application regardless of underwriting results", "B": "Only if the applicant is found to be insurable at the applied-for rate as of the application or exam date", "C": "Automatically for 30 days regardless of the outcome of underwriting", "D": "Only after the policy is approved and delivered to the applicant"}, "correct": "B", "explanation": "A conditional receipt provides interim coverage beginning on the application date or medical exam date (whichever is later), conditional on the applicant being found insurable at the applied-for premium class. If the applicant is denied or offered a different premium class, the coverage was never technically in force under the conditional receipt. A binding receipt, by contrast, provides unconditional coverage from the receipt date regardless of underwriting outcome."}, {"topic": "Life insurance underwriting & policy issue", "question": "When a proposed insured is rated as a substandard risk, the insurer will most commonly:", "options": {"A": "Decline the application entirely", "B": "Issue the policy at a higher premium or with an exclusion rider", "C": "Issue the policy at standard rates but with a reduced benefit", "D": "Delay the decision for 12 months pending re-examination"}, "correct": "B", "explanation": "Substandard (impaired) risks have above-average mortality or morbidity risk. Insurers typically offer substandard applicants: (1) a rated-up premium (table rating), where premiums are set at a percentage above standard; (2) a flat extra premium for specific hazards; or (3) an exclusion rider that excludes coverage for the specific impairment. Outright declination is reserved for the highest-risk individuals. Offering modified coverage allows more people to obtain at least some insurance protection."}, {"topic": "Life insurance underwriting & policy issue", "question": "Virginia requires a minimum free-look period of how many days for a standard adult life insurance policy?", "options": {"A": "5 days", "B": "10 days", "C": "20 days", "D": "30 days"}, "correct": "B", "explanation": "Virginia requires a minimum 10-day free-look period for standard life insurance policies, during which the policyowner may return the policy for any reason and receive a full premium refund. For policies sold to senior citizens (age 65 and older) and long-term care insurance policies, Virginia extends the free-look period to 30 days. The free-look period begins when the policy is delivered to the policyowner, not when the application was submitted."}, {"topic": "Life insurance underwriting & policy issue", "question": "Which of the following is NOT a source of underwriting information used by life insurance companies?", "options": {"A": "Medical Information Bureau (MIB) report", "B": "Attending physician's statement (APS)", "C": "Consumer credit score from a major credit bureau", "D": "Blood and urine laboratory results"}, "correct": "C", "explanation": "Traditional life insurance underwriting uses: the application, medical exam results, attending physician statements, MIB reports, motor vehicle records, prescription drug databases, and inspection reports. Consumer credit scores are used in property/casualty underwriting but are generally not used as a direct underwriting factor in life insurance. Some insurers use financial data to verify insurable interest amounts on large policies, but general credit scoring is not standard life insurance underwriting practice."}, {"topic": "Life insurance underwriting & policy issue", "question": "The purpose of a field underwriting inspection report in life insurance is to:", "options": {"A": "Verify the insured's home address and confirm policy delivery", "B": "Provide information on the applicant's character, reputation, finances, and lifestyle", "C": "Conduct a medical examination at the applicant's home", "D": "Calculate the exact premium based on mortality tables"}, "correct": "B", "explanation": "A field underwriting inspection report (or consumer report) is obtained from an independent investigative reporting company that gathers information about the applicant's character, reputation, mode of living, financial situation, and habits. This helps the insurer assess non-medical risks like financial stability (to verify that the coverage amount is appropriate for the insured's financial situation) and lifestyle factors. These reports are regulated by the Fair Credit Reporting Act (FCRA)."}, {"topic": "Life insurance underwriting & policy issue", "question": "When does a newly issued life insurance policy typically become effective?", "options": {"A": "On the date the insurer approves the application at its home office", "B": "On the date the first premium check clears the bank", "C": "When the first premium is paid AND the policy is delivered while the insured is in good health", "D": "On the policy date printed on the declarations page, regardless of other factors"}, "correct": "C", "explanation": "Life insurance coverage typically becomes effective when two conditions are met simultaneously: (1) the first premium is paid, and (2) the policy is delivered to the policyowner while the insured is in good health (no material change in health since the application). If a conditional receipt was issued with the premium at application, coverage may begin earlier — on the application or exam date — if the applicant qualifies at the applied-for rate."}, {"topic": "Life insurance underwriting & policy issue", "question": "Stranger-originated life insurance (STOLI) is illegal because:", "options": {"A": "It allows minors to be insured without parental consent", "B": "It involves acquiring life insurance policies on strangers without their knowledge", "C": "Policies are purchased by investors who have no insurable interest in the insured's life at inception", "D": "It bypasses the state licensing requirements for insurance agents"}, "correct": "C", "explanation": "STOLI (or IOLI — investor-originated life insurance) schemes involve third-party investors arranging for individuals to take out large life insurance policies with the intent from the start of transferring the policy to investors who have no insurable interest. This violates the insurable interest requirement at inception. Life insurance is meant to protect those with a financial interest in the insured's life — not to be a speculative investment product. Virginia law prohibits STOLI arrangements."}, {"topic": "Life insurance underwriting & policy issue", "question": "The FCRA (Fair Credit Reporting Act) gives insurance applicants the right to:", "options": {"A": "Obtain coverage at standard rates regardless of credit history", "B": "Know if an adverse underwriting decision was based on a consumer report and to dispute inaccurate information", "C": "Have their medical history kept private from all insurers permanently", "D": "Review the insurer's mortality tables before signing the application"}, "correct": "B", "explanation": "The FCRA requires insurers who take adverse action (decline, rate up, or restrict coverage) based on information in a consumer report (such as an MIB report or investigative report) to notify the applicant of the adverse action and inform them they can obtain a copy of the report and dispute inaccurate information. Applicants have the right to request their MIB file, review it for errors, and request corrections. This protects consumers from being penalized by incorrect information."}, {"topic": "Life insurance underwriting & policy issue", "question": "A paramedical examination for life insurance underwriting is typically ordered when:", "options": {"A": "Every applicant requests one as part of the application process", "B": "The applicant is under age 30 and seeking less than $100,000 coverage", "C": "The applied-for face amount exceeds certain threshold amounts or the applicant is older", "D": "The applicant has a prior history of cancer or heart disease"}, "correct": "C", "explanation": "Paramedical exams are ordered based on the amount of coverage applied for and/or the applicant's age. For smaller face amounts on younger applicants, a simplified or non-medical application may be used. As the coverage amount increases or the applicant's age increases, a paramedical exam (blood, urine, height/weight, blood pressure) and potentially a full medical exam (performed by a physician) are required. The insurer — not the applicant — pays for required medical exams."}, {"topic": "Group life insurance", "question": "In a contributory group life insurance plan, the minimum participation requirement is typically:", "options": {"A": "51%", "B": "75%", "C": "90%", "D": "100%"}, "correct": "B", "explanation": "Contributory plans require employees to pay part of the premium, so not everyone will want to participate. To prevent adverse selection (only the sickest employees opting in), insurers require at least 75% of eligible employees to enroll. Non-contributory plans (employer pays 100%) require 100% participation since there's no reason for employees not to enroll when it costs them nothing. These participation requirements protect the insurer from a skewed pool of high-risk insureds."}, {"topic": "Group life insurance", "question": "Under IRC Section 79, employer-provided group term life insurance above $50,000 creates:", "options": {"A": "A tax deduction for the employee equal to the additional coverage amount", "B": "Imputed income that the employee must include in gross income", "C": "A non-taxable supplemental benefit under ERISA Section 125", "D": "An estate tax liability for the employee's beneficiary"}, "correct": "B", "explanation": "For group term life coverage exceeding $50,000 per employee, the IRS requires the employee to include the 'imputed income' (the cost of the excess coverage calculated using IRS Table I rates) in their gross income. The employee pays income tax on this phantom income even though they received insurance coverage, not cash. The first $50,000 of employer-paid group term life remains completely income-tax-free under Section 79."}, {"topic": "Group life insurance", "question": "A group insurance certificate is issued to:", "options": {"A": "The employer or group sponsor as proof of master policy existence", "B": "Each individual member of the group as their evidence of coverage", "C": "The state insurance department as required by law", "D": "The insurance agent who sold the master policy"}, "correct": "B", "explanation": "In group insurance, the master policy is issued to the employer (or group sponsor). Individual employees receive certificates of insurance — documents that summarize their coverage, benefits, and rights under the master policy. The certificate is evidence of coverage but is not itself the insurance policy. The master policy controls. Employees should retain their certificate as it contains important information about claims procedures, conversion rights, and beneficiary designation."}, {"topic": "Group life insurance", "question": "The conversion privilege in a group life insurance plan must be exercised within how many days of termination of group coverage?", "options": {"A": "15 days", "B": "31 days", "C": "60 days", "D": "90 days"}, "correct": "B", "explanation": "Under group life conversion provisions (typically mandated by state law), a terminated employee has 31 days to convert their group coverage to an individual permanent policy without evidence of insurability. The converted policy must be issued without a medical exam, but it will be priced at standard individual rates (significantly more expensive than group rates) based on the individual's current attained age. The 31-day window begins when group coverage terminates."}, {"topic": "Group life insurance", "question": "Under ERISA, employer-sponsored group health and life plans are:", "options": {"A": "Regulated solely by each state's insurance department", "B": "Exempt from state insurance regulation but subject to federal ERISA requirements", "C": "Exempt from all insurance regulation as a federal employee benefit", "D": "Required to purchase reinsurance from the federal government"}, "correct": "B", "explanation": "ERISA (Employee Retirement Income Security Act of 1974) governs most employer-sponsored benefit plans including group health and life insurance. ERISA preempts (overrides) most state insurance laws for self-funded employer plans. However, insured plans (where the employer purchases group policies from an insurer) are subject to both ERISA and state insurance regulation through the insurance savings clause. ERISA establishes fiduciary duties, disclosure requirements, and claims and appeals processes."}, {"topic": "Group life insurance", "question": "An employee on leave of absence from their job typically:", "options": {"A": "Automatically loses all group life insurance coverage immediately", "B": "May continue group coverage for a limited period as specified in the plan documents", "C": "Can convert group coverage to individual coverage without the 31-day time limit", "D": "Qualifies for double the standard group coverage amount under FMLA"}, "correct": "B", "explanation": "Group insurance plan documents typically specify how long employees on approved leave (FMLA, military, medical) can continue group coverage. Under FMLA (Family and Medical Leave Act), employees may continue group health coverage. Group life coverage during leave is subject to plan terms. Some plans allow continuation for a set period (e.g., 3-6 months) with the employee continuing to pay premiums; others may require conversion. Plans must specify these rules clearly in their documentation."}, {"topic": "Group life insurance", "question": "Evidence of insurability is typically NOT required for group life insurance enrollment during:", "options": {"A": "Late enrollment after missing the initial enrollment period", "B": "Open enrollment periods when coverage is offered to all eligible employees", "C": "Applications for coverage amounts above the non-medical (guaranteed issue) limit", "D": "Conversion of group to individual coverage"}, "correct": "B", "explanation": "The major advantage of group insurance is that eligible employees can enroll during open enrollment periods without individual underwriting or evidence of insurability. The group is underwritten as a whole, not as individuals. However, employees who miss the initial enrollment period and enroll late, or who request coverage above guaranteed-issue limits, typically must provide evidence of insurability to prevent adverse selection into the group."}, {"topic": "Group life insurance", "question": "Group life insurance premiums paid by an employer on behalf of employees are:", "options": {"A": "Taxable income to the employee for the full premium amount", "B": "Tax-deductible as a business expense for the employer", "C": "Only deductible if the employer is also the policy beneficiary", "D": "Subject to FICA payroll taxes but not income taxes"}, "correct": "B", "explanation": "Employer-paid group life insurance premiums are fully deductible as an ordinary business expense. This makes group life insurance particularly tax-efficient: the employer gets a deduction, the employee receives up to $50,000 of coverage tax-free, and premiums for coverage above $50,000 are taxable to the employee only on the imputed income amount (not the full premium). This triple benefit — employer deduction, employee tax-free benefit — makes group term life a popular employer benefit."}, {"topic": "Group life insurance", "question": "Group life insurance typically covers which of the following as eligible members?", "options": {"A": "Any person who applies, regardless of employment status", "B": "Only full-time permanent employees who have completed the eligibility waiting period", "C": "All persons related to an employee by blood or marriage", "D": "All retirees and former employees of the company"}, "correct": "B", "explanation": "Group life eligibility is defined in the master policy and typically covers active, full-time employees (and sometimes part-time employees working over a minimum number of hours) who have completed the eligibility waiting period (usually 30 days to 3 months of employment). Retired and former employees may have separate continuation options, and dependents may be covered under supplemental dependent life riders. The group must be a legitimate group formed for purposes other than obtaining insurance."}, {"topic": "Group life insurance", "question": "The purpose of the eligibility waiting period (probationary period) in group insurance is to:", "options": {"A": "Allow the insurer time to underwrite each individual employee", "B": "Prevent adverse selection by employees who join specifically to obtain insurance", "C": "Satisfy ERISA's 90-day vesting requirement for benefit plans", "D": "Give new employees time to study the plan before enrolling"}, "correct": "B", "explanation": "The probationary period (typically 30 days to 3 months of employment) serves an anti-selection function. Without it, people could take jobs specifically to obtain group coverage, then quit — leaving the group with higher-risk individuals. By requiring employees to work a minimum period before becoming eligible, the insurer ensures the employee's primary reason for joining the employer was employment, not insurance access."}, {"topic": "Group life insurance", "question": "What is the maximum amount of group term life insurance typically available as the basic employer-paid benefit without individual underwriting?", "options": {"A": "The greater of 1x salary or $10,000", "B": "A guaranteed issue amount specified in the master policy, often $50,000 or 1-2x annual salary", "C": "Exactly $50,000 for all employees regardless of salary", "D": "Unlimited if the employer pays 100% of the premium"}, "correct": "B", "explanation": "Group term policies specify a guaranteed issue (GI) amount — the maximum coverage available to eligible employees without individual medical underwriting. GI amounts vary by employer and insurer but are commonly set at 1-2 times annual salary, a flat dollar amount, or $50,000 (the Section 79 tax-free threshold). Employees wanting coverage above the GI amount must provide evidence of insurability. The GI amount ensures the group can enroll efficiently without individual underwriting slowing the process."}, {"topic": "Annuities", "question": "The accumulation phase of a deferred annuity is the period during which:", "options": {"A": "The insurer makes periodic income payments to the annuitant", "B": "Premiums are paid and funds grow tax-deferred until distribution begins", "C": "The annuitant must take required minimum distributions", "D": "The surrender charges are assessed if the contract is terminated"}, "correct": "B", "explanation": "The deferred annuity life cycle has two phases: (1) Accumulation phase — premiums are paid (either as a lump sum or periodic payments) and grow tax-deferred inside the annuity; no income taxes are owed until withdrawals begin. (2) Annuitization/distribution phase — the accumulated value is converted to a stream of income payments. Tax deferral during accumulation allows the cash value to compound without annual tax drag, similar to IRA and 401(k) accounts."}, {"topic": "Annuities", "question": "An immediate annuity begins making payments:", "options": {"A": "Immediately after the annuitant submits the application", "B": "Within 30 days of premium payment, usually with the first payment within one month", "C": "After a 12-month deferral period required by most insurers", "D": "Only after the annuitant reaches age 70½"}, "correct": "B", "explanation": "An immediate annuity (Single Premium Immediate Annuity or SPIA) is purchased with a single lump-sum premium and begins making income payments almost immediately — typically within 30 days, with the first payment due in one month (for a monthly payment annuity). There is no accumulation phase. SPIAs are used by retirees who want to convert a lump sum (e.g., from a 401(k) rollover or sale of property) into a guaranteed income stream right away."}, {"topic": "Annuities", "question": "The exclusion ratio in a non-qualified annuity determines:", "options": {"A": "What percentage of annuity payments are excludable from taxable income as return of basis", "B": "The percentage of the premium that the insurer deducts for expenses", "C": "The maximum annual contribution allowed to a qualified annuity", "D": "The portion of annuity payments exempt from state income tax"}, "correct": "A", "explanation": "The exclusion ratio applies to non-qualified (after-tax) annuities. It is calculated as: investment in the contract (cost basis) ÷ expected return. This percentage of each annuity payment is excluded from income tax (return of basis); the rest is taxable. For example, if 40% is excludable, 40 cents of each dollar received is tax-free return of principal and 60 cents is taxable income. Once the entire cost basis has been recovered, 100% of subsequent payments become taxable."}, {"topic": "Annuities", "question": "A fixed period certain annuity settlement option guarantees:", "options": {"A": "Income for the annuitant's lifetime, with no payments to heirs", "B": "Income payments for a specified number of years, regardless of whether the annuitant is living", "C": "A fixed monthly amount that never changes regardless of inflation", "D": "Income for the joint lives of both spouses simultaneously"}, "correct": "B", "explanation": "The fixed period certain (period certain) option pays income for a specified number of years (e.g., 10, 20 years) regardless of whether the annuitant is alive. If the annuitant dies before the period ends, payments continue to the beneficiary for the remaining period. If the annuitant outlives the period, payments stop. This option is useful when the annuitant wants to ensure payments for a specific financial obligation (e.g., a 15-year mortgage payoff) regardless of death."}, {"topic": "Annuities", "question": "The joint and last survivor annuity option provides:", "options": {"A": "Income for the lives of two people, continuing at full or reduced amount until the last survivor dies", "B": "Income for the primary annuitant's life, with a lump sum paid to the survivor at death", "C": "Income for both annuitants simultaneously, stopping when the first one dies", "D": "Income for the greater of the two annuitants' remaining life expectancies"}, "correct": "A", "explanation": "The joint and last survivor option makes income payments for as long as either of the two named annuitants is living. When the first dies, payments either continue at the full original amount (100% joint and survivor) or at a reduced amount (typically 50-75% joint and survivor). The reduced option pays more while both are living but less after the first death. This is popular for married couples wanting guaranteed income for both spouses' lifetimes."}, {"topic": "Annuities", "question": "A 1035 exchange of an annuity for a life insurance policy is:", "options": {"A": "A tax-free exchange allowed under IRC Section 1035", "B": "Taxable — annuities cannot be exchanged for life insurance tax-free", "C": "Tax-free only if the policies are with the same insurance company", "D": "Permitted only if the annuity has been held for at least 10 years"}, "correct": "B", "explanation": "Under IRC Section 1035, certain exchanges are permitted tax-free: life insurance can be exchanged for another life policy, an endowment, or an annuity. An annuity can be exchanged for another annuity. However, an annuity CANNOT be exchanged for a life insurance policy tax-free — this direction is NOT permitted under 1035. The rule is: you can exchange 'down' (life insurance to annuity — broader to narrower protection) but not 'up' (annuity to life — narrower to broader). Remember: life ↔ life, annuity ↔ annuity, life → annuity, but NOT annuity → life."}, {"topic": "Annuities", "question": "Surrender charges in a deferred annuity typically apply during:", "options": {"A": "The entire life of the contract with no reduction over time", "B": "The first several years of the contract, typically declining to zero by year 7-10", "C": "Only if the annuitant dies during the first year", "D": "Only when the annuity is converted from fixed to variable"}, "correct": "B", "explanation": "Surrender charges (also called contingent deferred sales charges or back-end loads) are fees assessed when the owner withdraws more than the free withdrawal amount (typically 10% per year) during the surrender charge period, which usually spans 5-10 years and declines over time (e.g., 7%, 6%, 5%...0% at the end of year 7). These charges compensate the insurer for upfront agent commissions. After the surrender charge period expires, the owner can withdraw all funds without penalty."}, {"topic": "Annuities", "question": "Growth inside a non-qualified deferred annuity is:", "options": {"A": "Tax-free as long as it remains in the annuity", "B": "Tax-deferred — no tax is owed until funds are withdrawn", "C": "Taxed as capital gains at the rate applicable at the time of withdrawal", "D": "Taxed annually as ordinary income even while accumulating"}, "correct": "B", "explanation": "Non-qualified annuity growth is tax-DEFERRED, not tax-free. The accumulated earnings (interest, dividends, capital appreciation) are not taxed while they remain in the annuity, but withdrawals of gains are taxed as ordinary income when distributed (LIFO — last in, first out — meaning gains come out first). This deferral provides a significant advantage for long-term accumulation. When annuitized, the exclusion ratio determines what portion of each payment is a tax-free return of basis."}, {"topic": "Annuities", "question": "An equity-indexed annuity (EIA) differs from a variable annuity in that the EIA:", "options": {"A": "Has no fees or surrender charges of any kind", "B": "Is classified as a security and requires a FINRA registration to sell", "C": "Does not invest directly in the stock market but credits interest linked to an index, with a guaranteed minimum", "D": "Allows unlimited participation in stock market gains without any cap"}, "correct": "C", "explanation": "An equity-indexed annuity (EIA/FIA — fixed indexed annuity) credits interest based on a market index (like the S&P 500) performance, with a floor (guaranteed minimum, often 0%) and a cap or participation rate. Unlike a variable annuity, the owner's money is NOT invested in the market — it stays in the insurer's general account. The insurer uses options to replicate index-linked returns. Because there is no direct market investment, EIAs are NOT securities and do NOT require FINRA registration to sell."}, {"topic": "Annuities", "question": "Withdrawals from a non-qualified deferred annuity before age 59½ are subject to:", "options": {"A": "A 10% IRS early withdrawal penalty on the taxable (gain) portion", "B": "A 20% mandatory federal withholding on the entire amount withdrawn", "C": "State income tax only, with no federal penalty if the contract is more than 5 years old", "D": "No penalty if the annuity was purchased with after-tax dollars"}, "correct": "A", "explanation": "The IRS imposes a 10% early withdrawal penalty on the taxable portion (the gains portion — not the return of basis) of non-qualified annuity withdrawals made before age 59½. Exceptions to the 10% penalty include death, disability, and substantially equal periodic payments (72(t) distributions). This penalty is in addition to ordinary income tax on the gains. The same 10% early withdrawal penalty applies to qualified retirement accounts (IRAs, 401(k)s), though the basis rules differ."}, {"topic": "Annuities", "question": "Which annuity owner role has the right to change beneficiaries, make withdrawals, and elect settlement options?", "options": {"A": "Annuitant — the measuring life on whom payments are based", "B": "Beneficiary — the person who receives the death benefit", "C": "Owner — the person who controls the contract and makes all decisions", "D": "Payor — the person who funds the annuity with premium payments"}, "correct": "C", "explanation": "The owner controls the annuity contract. The owner has the right to: name and change the beneficiary, make withdrawals, surrender the contract, exchange it in a 1035 exchange, and elect settlement options. The annuitant is the measuring life — annuity payments are based on the annuitant's age and life expectancy. The owner and annuitant are often the same person but can be different (e.g., a parent owning an annuity with a child as annuitant). The beneficiary receives the remaining value or death benefit if the owner or annuitant dies."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "In an entity (stock redemption) buy-sell agreement, who purchases the life insurance policies?", "options": {"A": "Each business owner buys a policy on each other owner", "B": "The business entity buys a policy on each owner", "C": "A corporate trustee buys policies on behalf of all owners", "D": "The owners' families purchase policies to fund the buyout"}, "correct": "B", "explanation": "In an entity (stock redemption) buy-sell, the business itself purchases a life insurance policy on each owner and is both owner and beneficiary. At an owner's death, the business collects the death benefit and uses it to buy the deceased owner's interest from their estate. This is administratively simpler than a cross-purchase agreement (no inter-owner policies) but the surviving owners do NOT get a stepped-up cost basis in the additional shares. For businesses with many owners, entity plans are more practical."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "Key person life insurance premiums paid by a business are:", "options": {"A": "Tax-deductible as an ordinary business expense", "B": "NOT tax-deductible, but death benefits are received income-tax-free", "C": "Deductible only if the key person is also a shareholder", "D": "Deductible up to $50,000 per year under Section 79"}, "correct": "B", "explanation": "Key person insurance premiums are NOT tax-deductible by the business because the business is the beneficiary. The IRS does not allow a deduction when the taxpayer (business) is the beneficiary of the policy. However, the death benefit received by the business IS income-tax-free under IRC Section 101(a) — which is the primary tax advantage of key person insurance. The business must also consider AMT (Alternative Minimum Tax) rules related to corporate-owned life insurance."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "A split-dollar life insurance arrangement involves:", "options": {"A": "Splitting the death benefit equally between two named beneficiaries", "B": "A shared arrangement where employer and employee each own a portion of the policy's benefits", "C": "Dividing the premium payment between two different insurance companies", "D": "A legal structure where a life insurance policy is split into two separate policies"}, "correct": "B", "explanation": "A split-dollar arrangement is a method of sharing life insurance premiums and benefits between two parties (typically an employer and employee, or business and owner). The employer typically pays the premium and recovers their contribution (usually as the cash value) at the employee's death or policy termination; the employee's beneficiary receives the remainder of the death benefit. Split-dollar plans are used as executive benefits. The IRS has established two regimes: the economic benefit regime and the loan regime."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "An executive bonus (Section 162) plan allows a corporation to:", "options": {"A": "Deduct bonus payments to executives as compensation while the executive owns the policy", "B": "Provide tax-free life insurance to executives above the $50,000 Section 79 limit", "C": "Fund key person insurance with pre-tax employer dollars for the executive's benefit", "D": "Exclude executive bonuses from payroll taxes using a Section 125 cafeteria plan"}, "correct": "A"
