, "explanation": "Under a Section 162 executive bonus plan, the corporation pays a bonus to the executive equal to the policy premium. The corporation deducts the bonus as compensation expense. The executive includes the bonus in taxable income but owns the life insurance policy personally — the executive has complete control and can change beneficiaries. This differs from key person insurance where the company owns the policy. Executives appreciate the personal ownership and portability if they leave the company."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "Life insurance held in an Irrevocable Life Insurance Trust (ILIT) is used primarily to:", "options": {"A": "Provide the grantor with tax-free income during retirement", "B": "Avoid probate costs by passing life insurance proceeds through the trust", "C": "Keep the death benefit out of the insured's taxable estate while providing liquidity to pay estate taxes", "D": "Guarantee that life insurance proceeds are paid to minor children"}, "correct": "C", "explanation": "An ILIT (Irrevocable Life Insurance Trust) owns the life insurance policy, removing the death benefit from the insured's taxable estate. The insured transfers policy ownership to the ILIT and makes annual gifts (within the annual exclusion) to the trust to cover premiums. At death, the trust receives the income-tax-free death benefit outside the estate, and the trustee can loan money or purchase assets from the estate to provide liquidity for estate tax payments — without the proceeds being subject to estate tax themselves."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "Business continuation planning with life insurance addresses the risk that:", "options": {"A": "A key employee might leave for a competitor and take clients", "B": "The business could fail financially if a key owner or employee dies", "C": "The business may lose its operating license upon the death of its founders", "D": "Employee productivity declines following any change in management"}, "correct": "B", "explanation": "Business continuation planning ensures the business can survive and transition smoothly if a key owner or employee dies. Life insurance provides immediate liquidity to: (1) fund buy-sell agreements (purchase the deceased's ownership interest), (2) replace lost revenue caused by a key person's death, (3) repay business loans that were personally guaranteed by the deceased, and (4) cover search/recruitment costs for a replacement. Without planning, a business may be forced into a distressed sale or dissolution."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "Under a cross-purchase buy-sell agreement, surviving owners' cost basis in the business after buying the deceased's interest is:", "options": {"A": "Zero, since the interest was purchased with insurance proceeds", "B": "The original cost basis of the business interest at formation", "C": "Equal to the purchase price paid (the stepped-up amount from the insurance proceeds)", "D": "The fair market value minus any insurance proceeds received"}, "correct": "C", "explanation": "In a cross-purchase buy-sell, when surviving owners use insurance death benefits to purchase the deceased owner's interest, their new cost basis in the acquired shares equals what they paid — the insurance proceeds. This creates a stepped-up basis equal to the current fair market value. When the surviving owners eventually sell the business, their capital gain is calculated from this higher basis, reducing taxes. This is a key tax advantage of cross-purchase over entity/stock redemption plans, where the entity's basis does not increase."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "A deferred compensation plan funded with life insurance allows an employer to:", "options": {"A": "Deduct premium payments in the year they are made", "B": "Promise future compensation to an executive, informally funding the liability with a life insurance policy", "C": "Exclude the executive from Social Security and Medicare taxes permanently", "D": "Guarantee that all deferred compensation will be paid before age 59½ without penalty"}, "correct": "B", "explanation": "Informal deferred compensation plans (non-qualified deferred compensation or NQDC) are promises by the employer to pay future compensation to a key executive. To informally fund this liability, the employer may own a life insurance policy on the executive's life. Premiums are NOT deductible (the employer is the beneficiary), but the cash value grows tax-deferred. The employer deducts the deferred compensation when actually paid to the executive (which is when the executive recognizes taxable income). These plans are subject to IRC Section 409A."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "The primary advantage of collateral assignment of a life insurance policy is:", "options": {"A": "The policyowner receives a tax deduction for premiums after assignment", "B": "The policy can be used to secure a loan while the policyowner retains all rights except those assigned", "C": "The entire policy transfers to the lender as permanent collateral", "D": "The insurer is required to pay the death benefit directly to the lender upon the insured's death"}, "correct": "B", "explanation": "A collateral assignment temporarily transfers specific rights (typically the right to be repaid the outstanding loan balance from the death benefit) to a lender as loan collateral. The policyowner retains all other rights: the right to change beneficiaries, borrow against remaining cash value, and control the policy generally. If the insured dies, the lender receives only the outstanding loan balance; the remaining death benefit goes to the named beneficiary. The assignment is released when the loan is repaid."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "Which of the following statements is correct regarding group carve-out plans?", "options": {"A": "They replace group term life insurance for all employees with an individual policy for each", "B": "They provide executive-level employees with individual permanent life insurance policies in lieu of group term excess coverage above $50,000", "C": "They carve out specific disease exclusions from group health insurance for executives", "D": "They convert group annuity contracts into individual policies upon retirement"}, "correct": "B", "explanation": "A group carve-out plan removes key executives from the standard group term life plan's coverage above $50,000 (where they would incur imputed income under Section 79) and replaces that coverage with individually-owned permanent life insurance (such as whole life or universal life). The executive avoids imputed income on the excess group term, and gains a permanent policy they own and can take if they leave. The employer typically provides the executive with a bonus to cover the premium (making it a combination of a carve-out and an executive bonus plan)."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "Charitable life insurance planning allows a policyowner to make a large charitable gift by:", "options": {"A": "Donating the policy to a charity, which names itself as owner and beneficiary, receiving a deduction for the gift", "B": "Having the charity pay all premiums so the business receives a tax deduction", "C": "Naming a charity as beneficiary of a term policy, making premiums tax-deductible", "D": "Purchasing a life annuity from the charity in exchange for the insurance policy"}, "correct": "A", "explanation": "When a policyowner donates a life insurance policy to a qualified charity (501(c)(3)) — making the charity both owner and irrevocable beneficiary — the policyowner may receive a charitable deduction for the policy's fair market value (or cost basis if the policy is new). Future premiums paid to the charity for the policy may also be deductible as charitable contributions. At death, the charity receives the income-tax-free death benefit — potentially much larger than the premium contributions, amplifying the charitable gift."}, {"topic": "Uses of life insurance (key person, buy-sell, estate)", "question": "The primary purpose of using a trustee as owner of a life insurance policy in estate planning is to:", "options": {"A": "Allow multiple beneficiaries to share the death benefit equally", "B": "Ensure the policy proceeds are managed and distributed according to the trust document without going through probate", "C": "Qualify the life insurance for a corporate tax deduction under Section 162", "D": "Meet ERISA's fiduciary requirements for employer-sponsored plans"}, "correct": "B", "explanation": "Having a trustee own a life insurance policy (in a trust such as an ILIT) serves several estate planning objectives: (1) proceeds avoid probate and are distributed according to the trust document, not a will; (2) if an ILIT, proceeds stay outside the taxable estate; (3) a trustee can manage funds for minor or special-needs beneficiaries who cannot manage large sums themselves; and (4) the trust can include spendthrift provisions to protect proceeds from beneficiaries' creditors."}, {"topic": "Retirement plans & IRAs", "question": "For 2026, the 401(k) employee salary deferral contribution limit is approximately:", "options": {"A": "$7,000", "B": "$19,500", "C": "$23,500", "D": "$30,000"}, "correct": "C", "explanation": "For 2026, the 401(k) employee elective deferral limit is $23,500 (plus a $7,500 catch-up contribution for those age 50 and older, allowing a total of $31,000). This limit applies to 403(b) plans and most 457 plans as well. These amounts are indexed for inflation by the IRS annually. Total contributions to a 401(k) (employee + employer) cannot exceed the lesser of 100% of compensation or $70,000 (2026 estimated limit) per the IRC Section 415 limits."}, {"topic": "Retirement plans & IRAs", "question": "A SEP-IRA (Simplified Employee Pension) is most appropriate for:", "options": {"A": "Large corporations with over 500 employees", "B": "Self-employed individuals and small business owners wanting high contribution limits with minimal complexity", "C": "Employees of non-profit organizations with less than $250,000 in annual donations", "D": "Government employees who want to supplement Social Security benefits"}, "correct": "B", "explanation": "A SEP-IRA allows self-employed individuals and small business owners to contribute up to 25% of net self-employment income (or 25% of an employee's W-2 compensation), up to a maximum of about $70,000 (2026). SEPs are easy to administer — no annual IRS filing (Form 5500), no complex plan documents — and contributions are discretionary each year. However, if the business has employees, the same percentage contributed for the owner must be contributed for all eligible employees."}, {"topic": "Retirement plans & IRAs", "question": "A SIMPLE IRA is designed for:", "options": {"A": "Any business with fewer than 500 employees", "B": "Businesses with 100 or fewer employees that received at least $5,000 in compensation from each eligible employee", "C": "Sole proprietors only, not partnerships or corporations", "D": "Non-profit organizations and educational institutions"}, "correct": "B", "explanation": "A SIMPLE IRA (Savings Incentive Match Plan for Employees) is available to employers with 100 or fewer employees who earned at least $5,000 in the prior year. Employers must either: (1) match employee contributions dollar-for-dollar up to 3% of compensation, or (2) make a 2% non-elective contribution for all eligible employees regardless of their participation. Employee contribution limits are lower than 401(k) plans but SIMPLE IRAs have minimal administrative burden."}, {"topic": "Retirement plans & IRAs", "question": "The primary difference between a defined benefit (DB) pension plan and a defined contribution (DC) plan is:", "options": {"A": "DB plans require employee contributions; DC plans are employer-funded only", "B": "DB plans guarantee a specific retirement income; DC plans base retirement income on account balance and investment returns", "C": "DC plans provide lifetime annuity income; DB plans pay a lump sum at retirement", "D": "DB plans are tax-qualified; DC plans are non-qualified by definition"}, "correct": "B", "explanation": "A defined benefit (DB) pension plan promises a specific monthly benefit at retirement (typically based on a formula using years of service and salary). The investment risk is entirely on the employer — if assets are insufficient, the employer must make additional contributions. A defined contribution (DC) plan (401(k), 403(b), profit-sharing) specifies the contribution amount, not the benefit. The investment risk is entirely on the employee — the retirement benefit depends on contribution amounts and investment performance."}, {"topic": "Retirement plans & IRAs", "question": "Early withdrawals from a traditional IRA before age 59½ are subject to:", "options": {"A": "A 10% IRS penalty plus ordinary income tax on the distribution", "B": "A 20% mandatory withholding with no additional penalty", "C": "Only ordinary income tax — no penalty applies to IRAs", "D": "A 25% penalty if the IRA is less than 2 years old, 10% thereafter"}, "correct": "A", "explanation": "Traditional IRA withdrawals before age 59½ are subject to both ordinary income tax AND a 10% early withdrawal penalty. The 10% penalty applies to the taxable portion. Exceptions to the 10% penalty include: death, disability, substantially equal periodic payments (72(t)), first-time home purchase (up to $10,000 lifetime), qualified higher education expenses, health insurance premiums during unemployment, and unreimbursed medical expenses exceeding 7.5% of AGI."}, {"topic": "Retirement plans & IRAs", "question": "A 403(b) plan is primarily available to employees of:", "options": {"A": "For-profit corporations with fewer than 100 employees", "B": "Public schools, colleges, universities, and non-profit 501(c)(3) organizations", "C": "Self-employed independent contractors and freelancers", "D": "State and local government agencies only"}, "correct": "B", "explanation": "403(b) plans (also called tax-sheltered annuities) are available to employees of public educational institutions (K-12 schools, colleges, universities) and non-profit 501(c)(3) organizations (hospitals, charities, religious organizations). They function similarly to 401(k) plans with the same contribution limits and tax treatment. Investment options are typically limited to annuity contracts and mutual funds. Unlike 401(k) plans, 403(b) plans have a special catch-up provision for employees with 15+ years of service."}, {"topic": "Retirement plans & IRAs", "question": "Roth IRA contributions are made with:", "options": {"A": "Pre-tax dollars that grow tax-free", "B": "After-tax dollars, and qualified withdrawals are completely tax-free", "C": "Pre-tax dollars, and withdrawals are taxed as ordinary income", "D": "After-tax dollars, and withdrawals are taxed at capital gains rates"}, "correct": "B", "explanation": "Roth IRA contributions use after-tax dollars (no deduction at contribution). The growth inside the Roth accumulates tax-free, and qualified distributions (age 59½+ and after the 5-year holding period) are completely tax-free — including all earnings. The Roth has no RMDs during the owner's lifetime, making it a powerful estate planning tool. Income limits apply: above certain MAGI thresholds, the Roth contribution is phased out or eliminated entirely."}, {"topic": "Retirement plans & IRAs", "question": "Required Minimum Distributions (RMDs) are required beginning at age 73 from all of the following EXCEPT:", "options": {"A": "Traditional IRAs", "B": "401(k) plans (if no longer working)", "C": "Roth IRAs", "D": "SIMPLE IRAs"}, "correct": "C", "explanation": "Roth IRAs are the one type of tax-advantaged retirement account with NO RMDs during the owner's lifetime. The owner can let the Roth grow indefinitely and pass it to heirs (who must then take RMDs based on their own life expectancy). All other traditional retirement accounts — traditional IRAs, SEP-IRAs, SIMPLE IRAs, 401(k)s, 403(b)s — require RMDs beginning at age 73 (per SECURE 2.0 Act). Failing to take RMDs triggers a 25% excise tax on the amount that should have been withdrawn."}, {"topic": "Retirement plans & IRAs", "question": "The 'catch-up contribution' provision in retirement plans allows individuals age 50 and older to:", "options": {"A": "Recoup missed contributions from prior years with retroactive tax deductions", "B": "Contribute additional amounts above the standard annual limit", "C": "Move funds from one type of retirement account to another without tax penalties", "D": "Delay taking RMDs until age 80"}, "correct": "B", "explanation": "Catch-up contributions allow participants age 50 and older to contribute additional amounts beyond the standard annual limit. For 2026: 401(k)/403(b) catch-up is $7,500 (total $31,000); IRA catch-up is $1,000 (total $8,500). SECURE 2.0 introduced a 'super catch-up' for ages 60-63 for workplace plans. These provisions acknowledge that many workers ramp up savings close to retirement after family expenses (children, mortgages) decline."}, {"topic": "Retirement plans & IRAs", "question": "A direct rollover from a 401(k) to a traditional IRA:", "options": {"A": "Is a taxable event because the funds leave the employer plan", "B": "Is tax-free and avoids mandatory 20% withholding", "C": "Requires a 60-day waiting period before the IRA can invest the funds", "D": "Is limited to $100,000 per year under current IRS rules"}, "correct": "B", "explanation": "A direct rollover transfers funds directly from the employer plan to the IRA (trustee-to-trustee), so the employee never receives a check. Direct rollovers are not subject to the mandatory 20% federal withholding that applies to indirect rollovers (where the employee receives the funds). With a direct rollover, there is no income tax and no withholding. In an indirect rollover, the employer withholds 20%, and the employee must deposit 100% of the distribution into the new IRA within 60 days to avoid tax."}, {"topic": "Retirement plans & IRAs", "question": "The 'stretch IRA' strategy (before SECURE Act 2.0) referred to:", "options": {"A": "A method of making additional catch-up contributions to maximize IRA growth", "B": "Non-spouse beneficiaries taking RMDs over their own life expectancy to extend tax-deferred growth", "C": "Converting a traditional IRA to a Roth IRA over multiple tax years to minimize taxes", "D": "Rolling multiple employer plans into a single IRA for simplified management"}, "correct": "B", "explanation": "The 'stretch IRA' strategy allowed non-spouse IRA beneficiaries to take RMDs based on their own (longer) life expectancy, stretching the tax-deferred growth over potentially decades. The SECURE Act (2019) largely eliminated this for most non-spouse beneficiaries, requiring them to distribute the entire inherited IRA within 10 years of the original owner's death. Exceptions include: surviving spouses, minor children (until majority), disabled individuals, chronically ill individuals, and beneficiaries within 10 years of age of the deceased."}, {"topic": "Social Security & disability benefits", "question": "To become fully insured for Social Security retirement benefits, a worker generally needs:", "options": {"A": "10 years of continuous employment with one employer", "B": "40 quarters of coverage (credits) earned over their working lifetime", "C": "25 years of covered employment with at least $50,000 annual earnings", "D": "Coverage under Medicare Part A for a minimum of 5 years"}, "correct": "B", "explanation": "Social Security requires 40 quarters of coverage (10 years of work) to be 'fully insured' for retirement benefits. Workers earn up to 4 credits per year based on earnings. In 2026, earning approximately $1,730 qualifies for one credit. Once the 40-credit threshold is reached, retirement eligibility is established (though the benefit amount depends on the full earnings record). Disability insurance requires fewer credits and has an 'insured recently' requirement."}, {"topic": "Social Security & disability benefits", "question": "Claiming Social Security retirement benefits early at age 62 results in:", "options": {"A": "A temporary reduction that disappears at Full Retirement Age", "B": "A permanent reduction in monthly benefits of up to 30%", "C": "A 5-year delay before benefits begin paying", "D": "Disqualification from Medicare enrollment"}, "correct": "B", "explanation": "Claiming benefits at age 62 (the earliest eligibility age) permanently reduces the monthly benefit by up to 30% compared to claiming at Full Retirement Age (67 for those born in 1960+). The reduction is approximately 5/9 of 1% per month for the first 36 months before FRA and 5/12 of 1% per month thereafter. This reduction is permanent — it never goes away, even after reaching FRA. Early claiming makes sense for those with shorter life expectancies or immediate income needs."}, {"topic": "Social Security & disability benefits", "question": "Delayed retirement credits for Social Security allow a worker to increase their benefit by approximately:", "options": {"A": "3% for each year delayed past Full Retirement Age", "B": "5% for each year delayed past Full Retirement Age", "C": "8% for each year delayed past Full Retirement Age, up to age 70", "D": "12% for each year delayed, with no maximum age"}, "correct": "C", "explanation": "Workers who delay claiming Social Security past their Full Retirement Age earn delayed retirement credits of approximately 8% per year (2/3 of 1% per month) up to age 70. There is no benefit to delaying past age 70. For example, if FRA is 67 and the worker waits until 70, their benefit increases by 24% (3 years × 8%). This delayed credit strategy is beneficial for those with longer life expectancies or a spouse who depends on the survivor benefit."}, {"topic": "Social Security & disability benefits", "question": "Social Security survivor benefits may be paid to all of the following EXCEPT:", "options": {"A": "A surviving spouse age 60 or older", "B": "A dependent child under age 18", "C": "An ex-spouse married for at least 10 years", "D": "An adult sibling of the deceased who was dependent"}, "correct": "D", "explanation": "Social Security survivor benefits are paid to: surviving spouse (age 60+, or any age if caring for a child under 16); surviving divorced spouse (married 10+ years, age 60+, or any age if caring for child); dependent children under age 18 (or 19 if in secondary school); disabled children; and dependent parents (age 62+). Adult siblings who were financially dependent are NOT eligible Social Security survivor beneficiaries, regardless of dependency status."}, {"topic": "Social Security & disability benefits", "question": "Social Security Disability Insurance (SSDI) defines disability as:", "options": {"A": "Inability to perform the duties of one's current occupation", "B": "Any condition that prevents full-time employment for more than 30 days", "C": "Inability to engage in any substantial gainful activity due to a medically determinable impairment expected to last 12+ months or result in death", "D": "A condition that reduces work capacity by at least 50% as determined by a treating physician"}, "correct": "C", "explanation": "SSDI uses an 'any occupation' disability standard — arguably the strictest definition in the insurance world. The claimant must prove they cannot perform any job that exists in significant numbers in the national economy, considering age, education, and work experience. The condition must be medically documented and expected to last at least 12 months or result in death. This is far stricter than most private disability policies, which often use 'own occupation' definitions for the initial claim period."}, {"topic": "Social Security & disability benefits", "question": "Medicare Part B covers all of the following EXCEPT:", "options": {"A": "Physician office visits", "B": "Outpatient surgery", "C": "Inpatient hospital stays", "D": "Preventive services and screenings"}, "correct": "C", "explanation": "Medicare Part B (Medical Insurance) covers: physician visits (in and out of hospital), outpatient hospital services, preventive care, durable medical equipment, mental health services, and home health care. Part B does NOT cover inpatient hospital stays — that is covered by Part A (Hospital Insurance). Part B has a monthly premium ($202.90 for most in 2026) and an annual deductible. Higher-income beneficiaries pay more via Income-Related Monthly Adjustment Amounts (IRMAA)."}, {"topic": "Social Security & disability benefits", "question": "The standard Medicare Part A deductible covers hospitalization for the first:", "options": {"A": "30 days of each inpatient stay", "B": "60 days of each benefit period", "C": "90 days of any hospitalization in a calendar year", "D": "365 days of any hospitalization in a lifetime"}, "correct": "B", "explanation": "Medicare Part A has an inpatient deductible per benefit period (not per year). For 2026, the Part A deductible covers days 1-60 of an inpatient hospital stay. Days 61-90 require a daily coinsurance (about $378/day in 2026). Days 91-150 use lifetime reserve days (each used once, with a higher daily coinsurance). The benefit period begins on the day of admission and ends 60 days after discharge — a new benefit period (and new deductible) can start after the 60-day gap."}, {"topic": "Social Security & disability benefits", "question": "Social Security benefits become partially taxable when the beneficiary's 'combined income' (provisional income) exceeds:", "options": {"A": "$15,000 for single filers and $25,000 for married couples", "B": "$25,000 for single filers and $32,000 for married couples filing jointly", "C": "$45,000 for single filers and $60,000 for married couples", "D": "Benefits are never taxable at the federal level"}, "correct": "B", "explanation": "Up to 85% of Social Security benefits may be taxable. Single filers with combined income (AGI + nontaxable interest + 50% of SS benefits) between $25,000-$34,000 may have up to 50% of benefits taxed; above $34,000, up to 85% is taxable. For married couples filing jointly, the thresholds are $32,000-$44,000 (up to 50% taxable) and above $44,000 (up to 85% taxable). Virginia partially exempts Social Security benefits from state income tax for qualifying taxpayers."}, {"topic": "Social Security & disability benefits", "question": "Medicare Part D provides coverage for:", "options": {"A": "Inpatient prescription drugs administered during a hospital stay", "B": "Outpatient prescription drugs purchased at a pharmacy", "C": "Durable medical equipment such as wheelchairs and walkers", "D": "Mental health services in outpatient settings"}, "correct": "B", "explanation": "Medicare Part D is the voluntary outpatient prescription drug benefit administered through private insurance companies approved by Medicare. Beneficiaries pay a monthly premium, annual deductible, and cost-sharing for covered drugs. Plans vary by formulary (covered drug list) and pharmacy network. Enrolling late in Part D triggers a permanent late enrollment penalty (1% of national base premium per month of delay). Part D does not cover drugs administered in a hospital (covered by Part A) or infusion drugs in a physician's office (covered by Part B)."}, {"topic": "Social Security & disability benefits", "question": "Medicare Advantage (Part C) plans:", "options": {"A": "Are federally administered and identical in benefits to Original Medicare", "B": "Are offered by private insurers approved by Medicare and must cover at least the same benefits as Parts A and B", "C": "Provide only catastrophic coverage as a supplement to Original Medicare", "D": "Can only be purchased by beneficiaries age 75 or older"}, "correct": "B", "explanation": "Medicare Advantage (MA) plans are offered by private insurers contracted with CMS (Centers for Medicare & Medicaid Services) to provide Medicare-covered benefits. All MA plans must cover at least the same services as Original Medicare Parts A and B (including emergency care), and many include additional benefits (dental, vision, hearing, prescription drugs). Members typically use the plan's network of providers rather than the Original Medicare 'any willing provider' approach. MA plans often have lower out-of-pocket maximums than Original Medicare."}, {"topic": "Social Security & disability benefits", "question": "The Windfall Elimination Provision (WEP) reduces Social Security benefits for:", "options": {"A": "Workers who claimed benefits before Full Retirement Age", "B": "Workers who also receive a pension from employment not covered by Social Security", "C": "Workers whose spouse receives a higher Social Security benefit", "D": "Workers who earn more than $100,000 per year after retirement"}, "correct": "B", "explanation": "The Windfall Elimination Provision reduces Social Security retirement benefits for workers who receive a pension from jobs not covered by Social Security (e.g., some state/local government jobs, certain federal jobs). The WEP adjusts the Social Security benefit formula to prevent workers from receiving disproportionately large Social Security benefits relative to their covered earnings. A separate provision, the Government Pension Offset (GPO), may reduce spousal/survivor Social Security benefits for those receiving government pensions."}, {"topic": "Social Security & disability benefits", "question": "Medicaid coverage for long-term care nursing home expenses requires applicants to:", "options": {"A": "Have purchased a long-term care insurance policy for at least 5 years", "B": "Be age 65 or older and enrolled in Medicare", "C": "Meet financial eligibility criteria including income and asset limits", "D": "Be a U.S. citizen with a current passport"}, "correct": "C", "explanation": "Medicaid is a joint federal-state program covering long-term care for individuals who meet financial eligibility requirements — specifically low income AND limited assets (typically $2,000 in countable assets for individuals in most states). Virginia expanded Medicaid eligibility under the ACA, but LTC Medicaid still has strict means testing. Qualifying individuals must 'spend down' most assets before Medicaid covers nursing home costs. The Long-Term Care Partnership Program was created to encourage people to buy private LTC insurance to avoid spending down all assets."}, {"topic": "Health & accident insurance basics", "question": "The ACA's open enrollment period for individual and family health insurance on the marketplace is:", "options": {"A": "January 1 through March 31 each year", "B": "November 1 through January 15 (for coverage starting January 1 or February 1)", "C": "April 1 through June 30 each year", "D": "Year-round enrollment with no specific open enrollment window"}, "correct": "B", "explanation": "The ACA marketplace open enrollment period runs November 1 through January 15 for most states (including Virginia, which uses Healthcare.gov). Coverage selected by December 15 starts January 1; selections made between December 16-January 15 start February 1. Outside of open enrollment, coverage can only be obtained through a Special Enrollment Period triggered by a qualifying life event (loss of job-based coverage, marriage, birth, divorce, moving, income change)."}, {"topic": "Health & accident insurance basics", "question": "ACA marketplace health plans are categorized into metal tiers based on:", "options": {"A": "The quality of the provider network (Gold = best hospitals, Bronze = limited network)", "B": "The actuarial value — the percentage of covered costs the plan pays on average", "C": "The monthly premium amount (Platinum = highest premium, Bronze = lowest)", "D": "The insurer's financial strength rating"}, "correct": "B", "explanation": "ACA metal tiers reflect actuarial value — the average percentage of covered healthcare costs the plan pays. Approximate actuarial values: Platinum (90%), Gold (80%), Silver (70%), Bronze (60%), Catastrophic (designed for young adults/hardship, high deductibles). Higher metal tier = insurer pays more of costs = higher monthly premium but lower out-of-pocket when care is used. Silver plans are special: they are the benchmark for premium tax credits AND are eligible for cost-sharing reductions for lower-income enrollees."}, {"topic": "Health & accident insurance basics", "question": "COBRA continuation coverage lasts up to 18 months for most qualifying events and up to how long for qualifying beneficiaries (e.g., divorce from the covered employee)?", "options": {"A": "24 months", "B": "36 months", "C": "48 months", "D": "60 months"}, "correct": "B", "explanation": "COBRA provides 18 months of continuation coverage for the employee and covered dependents when the employee's coverage ends due to reduced hours or termination (other than gross misconduct). However, qualified beneficiaries (dependents) can continue for up to 36 months for other qualifying events: divorce or legal separation from the covered employee, death of the covered employee, the covered employee becoming entitled to Medicare, or a dependent child losing dependent status under plan rules."}, {"topic": "Health & accident insurance basics", "question": "Short-term health insurance plans differ from ACA-compliant plans in that they:", "options": {"A": "Are required to cover the 10 essential health benefits", "B": "Cannot exclude coverage for pre-existing conditions", "C": "Are not ACA-compliant and may exclude pre-existing conditions, cap benefits, and exclude essential health benefits", "D": "Are sold only through healthcare.gov and state marketplaces"}, "correct": "C", "explanation": "Short-term health plans (STLDI) are not considered minimum essential coverage under the ACA and are exempt from ACA requirements. They can: underwrite applicants and deny coverage based on health status, exclude pre-existing conditions, impose lifetime and annual dollar limits, and omit essential health benefits. They fill temporary coverage gaps (between jobs, waiting for ACA open enrollment) but provide limited protection. Virginia has specific regulations on STLDI plan duration and renewability."}, {"topic": "Health & accident insurance basics", "question": "Premium tax credits (PTC) under the ACA are available to individuals and families whose household income falls between:", "options": {"A": "0% and 100% of the federal poverty level (FPL)", "B": "100% and 400% of the federal poverty level", "C": "200% and 600% of the federal poverty level", "D": "400% and 600% of FPL only (to prevent insurance companies from overcharging)"}, "correct": "B", "explanation": "The ACA provides premium tax credits (PTC/APTC) for marketplace plan enrollees with household income between 100% and 400% of FPL (the ARP and IRA of 2021/2022 temporarily extended eligibility above 400% FPL; this extension was periodically renewed). Below 100% FPL, individuals qualify for Medicaid. At 100-400% FPL, credits cap the premium percentage of household income at a sliding scale (from about 2% to 8.5%). Credits can be taken in advance (paid directly to the insurer) or claimed on the tax return."}, {"topic": "Health & accident insurance basics", "question": "Under the ACA, all of the following are considered 'qualifying life events' that trigger a Special Enrollment Period EXCEPT:", "options": {"A": "Loss of employer-sponsored coverage", "B": "Marriage or divorce", "C": "Failure to pay premiums on a previous health plan", "D": "Birth or adoption of a child"}, "correct": "C", "explanation": "Special Enrollment Period (SEP) triggers include: loss of qualifying health coverage (job loss, end of COBRA, aging off a parent's plan), marriage or domestic partnership, divorce (if losing coverage), birth/adoption/foster placement of a child, moving to a new coverage area, and certain income changes affecting subsidy eligibility. Voluntarily dropping or failing to pay premiums on a prior plan is NOT a qualifying life event — this prevents people from gaming the system by dropping coverage when healthy and re-enrolling when sick."}, {"topic": "Health & accident insurance basics", "question": "The HIPAA Privacy Rule protects 'protected health information' (PHI) by requiring:", "options": {"A": "That all health information be submitted to the federal government for monitoring", "B": "Covered entities to safeguard PHI and limit disclosures without patient authorization", "C": "Patients to sign a waiver before their PHI can be shared with any party", "D": "That all health insurance claims be processed without any personal information"}, "correct": "B", "explanation": "HIPAA's Privacy Rule (45 CFR Part 164) requires covered entities (health plans, healthcare clearinghouses, healthcare providers) to protect the confidentiality of protected health information (PHI). Covered entities must: implement privacy policies, train staff, designate a privacy officer, and obtain patient authorization for most disclosures. PHI can be disclosed without authorization for treatment, payment, and healthcare operations (TPO), and in certain public interest situations (public health, law enforcement). Patients have the right to access, amend, and receive an accounting of disclosures of their PHI."}, {"topic": "Health & accident insurance basics", "question": "A grandfathered health plan under the ACA is one that:", "options": {"A": "Was created specifically for retirees over age 65", "B": "Was in existence on March 23, 2010 (ACA enactment date) and has not made significant changes", "C": "Is owned and operated by a government entity like a school district", "D": "Was issued before 1990 and is exempt from state insurance regulation"}, "correct": "B", "explanation": "Grandfathered health plans are those that were in existence on March 23, 2010 (when the ACA was signed) and have not made significant changes (such as substantially cutting benefits or significantly increasing cost-sharing). Grandfathered plans are exempt from some ACA requirements (like covering preventive care at no cost, external appeals, and some essential health benefit requirements) but must still comply with pre-ACA federal requirements. Relatively few grandfathered plans remain active given the rate of insurance market changes since 2010."}, {"topic": "Health & accident insurance basics", "question": "Health insurance purchased on the ACA marketplace is subject to:", "options": {"A": "No underwriting — insurers must accept all applicants and charge the same premiums", "B": "Community rating — premiums can only vary by age (limited), geography, family size, and tobacco use", "C": "Full medical underwriting — each applicant is priced based on their individual health status", "D": "Experience rating — small groups are priced based on the group's actual claims history"}, "correct": "B", "explanation": "ACA marketplace plans use modified community rating — premiums can vary only by: (1) age (up to 3:1 ratio, so older enrollees pay at most 3x what younger ones pay), (2) geographic rating area, (3) family size/tier, and (4) tobacco use (up to 1.5:1 surcharge). Individual health status, gender (except in some states), occupation, and claims history CANNOT be used to set individual premiums. This is a fundamental ACA reform — before the ACA, individual market insurers could charge dramatically higher premiums or deny coverage based on health."}, {"topic": "Health & accident insurance basics", "question": "ERISA's preemption of state insurance laws primarily affects:", "options": {"A": "Individual health insurance policies sold on the ACA marketplace", "B": "Self-funded (self-insured) employer health plans", "C": "Fully insured employer group health plans where premiums are paid to an insurer", "D": "Medicare Advantage plans offered by private insurers"}, "correct": "B", "explanation": "ERISA preempts most state insurance laws for self-funded employer plans (where the employer bears the risk and pays claims directly). This means a self-funded employer plan in Virginia does not have to comply with Virginia's state insurance mandates (like mental health parity, specific benefit requirements, etc.). Fully insured employer plans (where premiums are paid to an insurance company) are subject to both ERISA and state insurance regulation through ERISA's insurance savings clause. This dual-track system creates a complex regulatory landscape."}, {"topic": "Health & accident insurance basics", "question": "The ACA requires coverage for preventive services at no cost sharing because:", "options": {"A": "Preventing diseases is cheaper long-term than treating them, and the ACA mandates coverage for USPSTF Grade A/B preventive recommendations", "B": "All ACA plans must provide unlimited preventive visits at no charge as a marketplace requirement", "C": "Preventive care generates significant revenue for insurers through subsequent treatment", "D": "Federal law requires insurers to cover all services recommended by any licensed physician"}, "correct": "A", "explanation": "The ACA requires non-grandfathered health plans to cover preventive services rated A or B by the U.S. Preventive Services Task Force (USPSTF) at no cost to the patient (no deductible, no copay, no coinsurance). This includes screenings (cancer, diabetes, hypertension), immunizations, and preventive medications. The policy rationale: investing in early detection and prevention reduces overall healthcare costs by identifying and treating conditions early, before they become more expensive to treat."}, {"topic": "Health & accident insurance basics", "question": "Which federal law extended group health insurance continuation rights to employees who lose coverage?", "options": {"A": "HIPAA (Health Insurance Portability and Accountability Act)", "B": "ERISA (Employee Retirement Income Security Act)", "C": "COBRA (Consolidated Omnibus Budget Reconciliation Act)", "D": "ACA (Affordable Care Act)"}, "correct": "C", "explanation": "COBRA (Consolidated Omnibus Budget Reconciliation Act, 1985) requires employers with 20 or more employees to offer continuation coverage to qualified beneficiaries who would otherwise lose group health insurance coverage due to qualifying events. The individual pays 100% of the premium plus up to a 2% administrative fee. COBRA applies to group health plans. HIPAA builds on COBRA by providing portability protections when moving from COBRA to new employer coverage, limiting pre-existing condition exclusion periods."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "In an HMO, a member who sees a specialist without a PCP referral will typically:", "options": {"A": "Receive full in-network coverage", "B": "Receive reduced out-of-network coverage", "C": "Have the claim denied entirely", "D": "Receive coverage only for emergencies"}, "correct": "C", "explanation": "HMOs require a PCP gatekeeper. Bypassing the referral requirement typically results in a full claim denial, not reduced coverage. This is the key HMO restriction distinguishing it from PPOs."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "A PPO differs from an HMO primarily because a PPO:", "options": {"A": "Has lower premiums and stricter networks", "B": "Allows members to see any provider without referral, at higher cost out-of-network", "C": "Requires all care to be coordinated by a PCP", "D": "Covers only services at hospital-owned facilities"}, "correct": "B", "explanation": "PPOs allow direct access to any provider — in-network or out-of-network — without a referral. In-network providers cost less due to contracted discounts. PPOs trade higher premiums for flexibility; HMOs trade lower premiums for network restrictions."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "An EPO (Exclusive Provider Organization) combines:", "options": {"A": "HMO gatekeeper rules with PPO out-of-network access", "B": "An exclusive in-network requirement (like HMO) with no referral requirement (like PPO)", "C": "No network restrictions with low premiums", "D": "Government oversight with private plan management"}, "correct": "B", "explanation": "EPOs restrict coverage to the exclusive network (no out-of-network coverage except emergencies) but do not require referrals to see specialists. This makes them essentially HMOs without the gatekeeper requirement, often with lower premiums than PPOs."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "A Point-of-Service (POS) plan allows members to:", "options": {"A": "Choose at each visit whether to use HMO in-network rules or pay more to go out-of-network", "B": "Pay a flat copay for any provider nationwide without referrals", "C": "Use only in-network providers at all times", "D": "Purchase HSA-qualified high-deductible coverage"}, "correct": "A", "explanation": "POS plans function as HMOs within the network (PCP required, referrals for specialists, lower cost). At the point of service, members can choose to go out-of-network for a higher deductible and coinsurance, similar to a PPO. This hybrid gives more flexibility than a pure HMO."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "To be eligible to contribute to an HSA, an individual must be enrolled in:", "options": {"A": "Any employer-sponsored group health plan", "B": "An HSA-qualified High-Deductible Health Plan (HDHP)", "C": "A Medicare Advantage plan", "D": "A COBRA continuation plan"}, "correct": "B", "explanation": "Federal law (IRC § 223) requires HSA contributors to be enrolled in an IRS-qualified HDHP with a minimum deductible and maximum out-of-pocket below IRS thresholds. HSAs allow pre-tax contributions, tax-free growth, and tax-free withdrawals for qualified medical expenses."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "Which managed care tool requires advance insurer approval before certain non-emergency services?", "options": {"A": "Coordination of benefits", "B": "Prior authorization", "C": "Subrogation", "D": "Step therapy"}, "correct": "B", "explanation": "Prior authorization (pre-certification) requires the provider to obtain insurer approval before delivering specified services or medications. Without it when required, claims may be denied. It is a core utilization management tool to control costs and ensure medical necessity."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "In an HMO, 'capitation' means providers receive:", "options": {"A": "A percentage of premiums as profit sharing", "B": "A fixed per-member-per-month amount regardless of services rendered", "C": "Reimbursement equal to their full billed charges", "D": "A year-end bonus based on quality metrics"}, "correct": "B", "explanation": "Capitation pays providers a fixed monthly amount per enrolled member whether or not the member uses services. This shifts financial risk to the provider and incentivizes preventive care and efficiency — the opposite of fee-for-service."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "Plans with larger provider networks generally have:", "options": {"A": "Lower premiums due to provider competition", "B": "Higher premiums because broader access costs more to contract and administer", "C": "No premium difference — network size is irrelevant", "D": "Lower out-of-pocket maximums to offset access costs"}, "correct": "B", "explanation": "Broader networks require contracting with more providers, often at less favorable rates than narrow networks where insurers have greater leverage. PPOs with large national networks typically charge more than narrow-network HMOs. Consumers pay more in premium for broader provider choice."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "In a staff-model HMO, physicians are:", "options": {"A": "Independent contractors paid via capitation", "B": "Salaried employees of the HMO working exclusively at HMO facilities", "C": "Partners in a physician-owned medical group", "D": "Fee-for-service providers who also see non-HMO patients"}, "correct": "B", "explanation": "Staff-model HMOs employ physicians directly as salaried employees at HMO-owned facilities. Group-model HMOs contract with independent physician groups. The distinction: staff-model = employer-employee relationship; group-model = contractor relationship."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "The No Surprises Act requires that emergency care at an out-of-network facility be billed to the patient at:", "options": {"A": "Full out-of-network rates since the member chose a non-participating facility", "B": "In-network cost-sharing levels regardless of facility network status", "C": "Zero cost — emergencies are always free", "D": "Whatever the insurer and provider privately negotiate"}, "correct": "B", "explanation": "The No Surprises Act (effective 2022) protects consumers from surprise out-of-network bills for emergency services. The patient's cost sharing must equal what they would have paid at an in-network facility. The balance billing dispute is between the insurer and provider, not the patient."}, {"topic": "Health plan types (HMO, PPO, EPO, POS, HDHP)", "question": "Utilization review AFTER services have been delivered is called:", "options": {"A": "Prospective review", "B": "Concurrent review", "C": "Retrospective review", "D": "Peer review"}, "correct": "C", "explanation": "Three UR types: Prospective (before — prior authorization), Concurrent (during — monitoring hospitalization), Retrospective (after — reviewing whether delivered care was medically necessary). Retrospective denials result in refusal to pay for already-rendered services."}, {"topic": "Medical expense & cost-sharing", "question": "The insured pays a fixed percentage of covered expenses above the deductible. This is called:", "options": {"A": "A copayment", "B": "Coinsurance", "C": "A stop-loss", "D": "A corridor deductible"}, "correct": "B", "explanation": "Coinsurance is a percentage split — e.g., 80/20 means insurer pays 80%, insured pays 20% of eligible expenses above the deductible. A copayment is a flat dollar amount per service. The 20% coinsurance varies with the cost of each service; a copay does not."}, {"topic": "Medical expense & cost-sharing", "question": "Once the out-of-pocket maximum is reached, the insurer pays:", "options": {"A": "80% of remaining covered expenses for the year", "B": "100% of remaining covered expenses for the year", "C": "50% with no further cost to the insured", "D": "Nothing — the insured has exhausted benefits"}, "correct": "B", "explanation": "The out-of-pocket maximum (OOP max) is the annual cap on what the insured pays in deductibles, copays, and coinsurance. Once reached, the insurer pays 100% of covered expenses for the remainder of the plan year. Premiums do NOT count toward the OOP max."}, {"topic": "Medical expense & cost-sharing", "question": "The deductible 'accumulation period' typically resets:", "options": {"A": "Every 5 years", "B": "Annually — at the start of each calendar or plan year", "C": "Every 3 years", "D": "Never — it accumulates for the life of the policy"}, "correct": "B", "explanation": "The deductible accumulation period is typically 12 months (calendar year January–December, or plan year). At the end of each period, the deductible resets to zero and must be satisfied again. This is why scheduling procedures near year-end (after meeting the deductible) can minimize total out-of-pocket costs."}, {"topic": "Medical expense & cost-sharing", "question": "Coordination of Benefits (COB) ensures that an insured with dual coverage cannot:", "options": {"A": "Change primary insurers mid-year", "B": "Collect more than 100% of actual medical expenses", "C": "Use both plans for prescription drugs", "D": "Cancel either policy independently"}, "correct": "B", "explanation": "COB prevents double recovery. When an insured is covered by two health plans, one is primary (pays first) and one is secondary (covers remaining eligible expenses). Total reimbursement is capped at 100% of actual charges — the insured cannot profit from having dual coverage."}, {"topic": "Medical expense & cost-sharing", "question": "Under the Birthday Rule, when both parents have health insurance covering a dependent child, the primary plan belongs to:", "options": {"A": "The parent whose birthday falls earliest in the calendar year (month and day only)", "B": "The older parent", "C": "The mother", "D": "The plan with the higher premium"}, "correct": "A", "explanation": "The Birthday Rule determines primary coverage for dependent children: the plan of the parent with the earlier birthday (month and day — year is irrelevant) is primary. If both parents share the same birthday, the plan in effect longer is primary."}, {"topic": "Medical expense & cost-sharing", "question": "An Explanation of Benefits (EOB) is best described as:", "options": {"A": "The provider's itemized bill to the insurer", "B": "A statement showing how a claim was processed, what was paid, and what the member owes", "C": "A legal contract between insurer and provider", "D": "A federal document listing ACA-required benefits"}, "correct": "B", "explanation": "An EOB is sent by the insurer to the policyholder after claim processing. It details: services billed, network discounts applied, what the plan paid, and the member's remaining responsibility. An EOB is NOT a bill — the provider sends the bill separately."}, {"topic": "Medical expense & cost-sharing", "question": "'Assignment of benefits' authorizes the insurer to:", "options": {"A": "Transfer the policy to a new owner", "B": "Pay benefits directly to the healthcare provider rather than the insured", "C": "Accept the insurer's payment as full payment", "D": "Assign coverage to employees under a group plan"}, "correct": "B", "explanation": "Assignment of benefits directs insurance payment to the provider rather than the insured. Most in-network providers require assignment. Without it, the insurer pays the insured, who then pays the provider. Different from 'accepting assignment' in Medicare (agreeing to Medicare's approved amount as full payment)."}, {"topic": "Medical expense & cost-sharing", "question": "In an embedded family deductible plan, once the family deductible limit is reached:", "options": {"A": "Every family member must still satisfy their individual deductible", "B": "All family members receive full benefits even if individual deductibles are unmet", "C": "The plan year ends and restarts", "D": "Family premiums are reduced for the rest of the year"}, "correct": "B", "explanation": "Embedded deductible plans have both individual and family deductible limits. Once any combination of family members' expenses reaches the family limit, ALL family members receive full benefits — even those who haven't met their individual deductibles. This protects large families from catastrophic deductible stacking."}, {"topic": "Medical expense & cost-sharing", "question": "Subrogation in health insurance gives the insurer the right to:", "options": {"A": "Deny a claim if the insured has other coverage", "B": "Recover payments made from a negligent third party responsible for the insured's injury", "C": "Cancel coverage after a large claim", "D": "Require the insured to repay benefits if they recover from another source"}, "correct": "B", "explanation": "Subrogation allows the health insurer to recover what it paid for a covered loss from the party at fault. If a driver causes an accident injuring the insured and the health insurer pays the medical bills, the insurer can seek reimbursement from the at-fault driver's liability insurer. This prevents double recovery."}, {"topic": "Medical expense & cost-sharing", "question": "The 'stop-loss' provision in major medical insurance limits:", "options": {"A": "The insurer's total annual liability", "B": "The insured's total annual out-of-pocket cost-sharing", "C": "The number of claims that can be filed annually", "D": "The provider's ability to balance-bill the insured"}, "correct": "B", "explanation": "The stop-loss (OOP max) provision protects the insured from catastrophic out-of-pocket costs. Once the insured's cost-sharing reaches the stop-loss threshold, the insurer pays 100% of remaining covered expenses. The ACA mandates annual OOP maximums for all non-grandfathered health plans."}, {"topic": "Medical expense & cost-sharing", "question": "A 'corridor deductible' in a comprehensive major medical plan is the amount:", "options": {"A": "Applied only to out-of-network services", "B": "The insured must pay between what the basic plan pays and when major medical benefits begin", "C": "That accumulates across all family members", "D": "That resets each calendar quarter"}, "correct": "B", "explanation": "A corridor deductible applies when a basic plan (covering first-dollar expenses up to a limit) is combined with a major medical plan. The 'corridor' gap between the basic plan's limit and the major medical threshold must be paid by the insured before major medical benefits activate. This structure was common in traditional indemnity plans."}, {"topic": "Disability income insurance", "question": "The elimination period in a disability policy functions as:", "options": {"A": "The grace period for premium payment", "B": "A time-based deductible — a waiting period before benefits begin", "C": "The free-look period after policy delivery", "D": "The maximum benefit duration"}, "correct": "B", "explanation": "The elimination period is the initial period of disability during which no benefits are paid — typically 30, 60, 90, 180, or 365 days. Longer elimination periods mean lower premiums because the insurer assumes less risk. The insured must fund living expenses during this period, often from emergency savings."}, {"topic": "Disability income insurance", "question": "'Own occupation' disability definition pays benefits if the insured:", "options": {"A": "Cannot work in any occupation for which they are reasonably qualified", "B": "Cannot perform the material duties of their specific pre-disability occupation", "C": "Is unable to earn more than 20% of pre-disability income", "D": "Is confined to home or a hospital"}, "correct": "B", "explanation": "Own-occ is the most favorable (and expensive) definition: benefits are paid if the insured cannot perform their specific occupation's material duties, even if they could work elsewhere. A hand surgeon who loses fine motor control receives full benefits even if they could become a medical professor."}, {"topic": "Disability income insurance", "question": "'Any occupation' disability definition requires the insured to prove they:", "options": {"A": "Cannot perform the duties of their own specific job", "B": "Cannot perform any job for which they are reasonably suited by education, training, or experience", "C": "Are under a physician's care full-time", "D": "Have lost at least 50% of pre-disability income"}, "correct": "B", "explanation": "Any-occ is more restrictive: benefits are paid only when the insured cannot perform any gainful occupation for which they are reasonably qualified. The same surgeon who can no longer operate but could teach medicine would NOT qualify under any-occ. Social Security DI uses a similar standard."}, {"topic": "Disability income insurance", "question": "Residual (partial) disability benefits are designed for insureds who:", "options": {"A": "Have permanent total disabilities only", "B": "Return to work but suffer a proportional income loss due to their disability", "C": "Cannot work more than 10 hours per week", "D": "Have reached the maximum benefit period"}, "correct": "B", "explanation": "Residual benefits pay a proportional benefit when the insured is working but earning less than their pre-disability income due to disability. If income dropped 40%, the policy pays 40% of the full benefit. Without this rider, any earned income could eliminate all DI benefits — penalizing partial recovery."}, {"topic": "Disability income insurance", "question": "The benefit period in a disability income policy is the:", "options": {"A": "Waiting period before benefits begin", "B": "Maximum duration benefits will be paid for a single continuous disability", "C": "Period during which premiums are waived", "D": "Grace period for late premium payment"}, "correct": "B", "explanation": "Common benefit periods: 2 years, 5 years, to age 65, or lifetime. Longer benefit periods = higher premiums. Most long-term disability claims last less than 5 years, but catastrophic or permanent disabilities require longer benefit periods. Selecting the appropriate benefit period is critical to adequate income replacement."}, {"topic": "Disability income insurance", "question": "A COLA rider on a disability policy increases the monthly benefit:", "options": {"A": "Before the elimination period is satisfied", "B": "During a long-term disability to keep pace with inflation", "C": "Every time the insured files a new claim", "D": "At policy anniversary even while the insured is healthy"}, "correct": "B", "explanation": "The Cost of Living Adjustment (COLA) rider increases the monthly disability benefit annually (typically by a fixed % or tied to CPI) while the insured is disabled. Without COLA, a $5,000 benefit paid for 20 years loses significant purchasing power. COLA applies only during active disability, not during the premium-paying period."}, {"topic": "Disability income insurance", "question": "Presumptive total disability provisions cover which types of losses automatically?", "options": {"A": "Any loss reducing income by more than 50%", "B": "Loss of sight, hearing, speech, or two limbs — regardless of actual work ability", "C": "Mental illness requiring hospitalization", "D": "Any loss occurring while traveling internationally"}, "correct": "B", "explanation": "Presumptive disability provisions designate certain catastrophic impairments (total blindness, total deafness, loss of use of both hands, both feet, or one hand and one foot, loss of speech) as automatically constituting total disability. Benefits begin after the elimination period without requiring proof that the insured stopped working."}, {"topic": "Disability income insurance", "question": "A 'non-cancelable' disability policy differs from 'guaranteed renewable' in that non-cancelable:", "options": {"A": "Pays benefits for a shorter maximum period", "B": "Cannot be canceled AND premiums cannot be increased", "C": "Requires annual renewal by the insured", "D": "Covers only own-occupation disability"}, "correct": "B", "explanation": "Non-cancelable: insurer cannot cancel the policy AND cannot raise premiums (rates locked at issue). Guaranteed renewable: insurer cannot cancel but CAN raise premiums on a class-wide basis with state approval. Non-cancelable provides both coverage and premium certainty, making it the most protective and expensive form."}, {"topic": "Disability income insurance", "question": "DI benefits under an individually owned policy where the insured paid all premiums are:", "options": {"A": "Taxable as ordinary income", "B": "Tax-free to the recipient", "C": "Taxable only if exceeding 60% of prior salary", "D": "Taxable to the extent of the employer's premium contribution"}, "correct": "B", "explanation": "When the insured pays disability insurance premiums with after-tax dollars, any benefits received are income tax-free. This is the standard rule for individually purchased DI policies. The tax treatment reverses when employers pay premiums: employer-funded group DI benefits are fully taxable when received."}, {"topic": "Disability income insurance", "question": "The Future Increase Option (FIO) rider allows the insured to purchase additional DI benefits:", "options": {"A": "Without a medical exam — only financial/income evidence is required", "B": "Only if they have had no claims in the past 5 years", "C": "By converting the DI policy to a whole life policy", "D": "Only during the first 2 years of the policy"}, "correct": "A", "explanation": "The FIO lets the insured buy additional monthly benefit amounts at specified intervals without new medical underwriting. Only proof of increased income is required. This protects against becoming uninsurable due to health changes while income grows."}, {"topic": "Disability income insurance", "question": "A long-term disability policy using 'own-occ for 24 months, then any-occ' means:", "options": {"A": "Benefits terminate after 24 months regardless of disability status", "B": "After 24 months of disability, the definition shifts from own-occ to any-occ", "C": "The insured can choose any-occ after 24 months for lower premiums", "D": "Own-occ applies after age 65, any-occ for the first 24 months"}, "correct": "B", "explanation": "This two-tier structure: the insured is considered disabled under the favorable own-occ standard for the first 24 months. After that, they must prove they cannot perform ANY suitable occupation to continue receiving benefits. This reduces insurer long-term exposure while still providing meaningful early-disability protection."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medicare Part A covers:", "options": {"A": "Outpatient physician visits", "B": "Prescription drugs", "C": "Inpatient hospital, skilled nursing facility, hospice, and home health care", "D": "Durable medical equipment only"}, "correct": "C", "explanation": "Part A is hospital insurance. It covers: inpatient hospital stays (after a deductible per benefit period), skilled nursing facility care (after a 3-day qualifying hospital stay), hospice care, and home health care under specific criteria. Most beneficiaries pay no Part A premium because they paid Medicare taxes for 40+ quarters."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Which service is NOT covered by Medicare Part B?", "options": {"A": "Physician services and outpatient visits", "B": "Preventive services like cancer screenings", "C": "Inpatient hospital stays", "D": "Durable medical equipment"}, "correct": "C", "explanation": "Part B is medical insurance covering outpatient services, physician visits, preventive care, DME, and mental health services. Inpatient hospital coverage is under Part A. Part B has a monthly premium (income-adjusted), annual deductible, and 80/20 coinsurance with no annual cap — making Medigap valuable."}, {"topic": "Medicare, Medigap & senior health plans", "question": "The Medicare Part B late enrollment penalty is permanent and equals:", "options": {"A": "1% per month delayed", "B": "10% for each full 12-month period eligible but not enrolled", "C": "25% flat fee", "D": "5% per year capped at 50%"}, "correct": "B", "explanation": "For each full 12-month period you were eligible for Part B but didn't enroll (without qualifying employer coverage), you pay a permanent 10% premium increase. A 2-year delay = 20% higher premium for life. Exception: those with employer coverage through an employer with 20+ employees can delay without penalty."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medicare Advantage (Part C) plans:", "options": {"A": "Are supplemental policies sold by private insurers to cover Medicare gaps", "B": "Are private health plans that replace Original Medicare (Parts A & B), often adding extras like dental and vision", "C": "Are employer-sponsored retirement health benefits", "D": "Are government plans covering only prescription drugs"}, "correct": "B", "explanation": "Medicare Advantage plans are offered by private insurers approved by Medicare. They must cover everything Original Medicare covers plus are required to include emergency and urgent care. Many add dental, vision, hearing, and Part D drug coverage. Enrollees still pay the Part B premium plus any plan premium and are subject to the plan's network and utilization management rules."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medicare Part D drug coverage is available through:", "options": {"A": "The Social Security Administration directly", "B": "Medicare Advantage plans only", "C": "Private insurers approved by Medicare, as stand-alone PDPs or as part of MA-PD plans", "D": "State Medicaid programs only"}, "correct": "C", "explanation": "Part D is delivered exclusively through private insurers. Options: (1) stand-alone PDP added to Original Medicare, or (2) Medicare Advantage Prescription Drug plan (MA-PD). Each plan has its own formulary, premiums, deductibles, and copays. Late enrollment penalty: 1% per month delayed, permanent."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medigap plans are federally standardized, meaning:", "options": {"A": "All insurers charge identical premiums for the same plan letter", "B": "Plan G benefits are identical regardless of which insurer sells it", "C": "All Medigap plans include Part D drug coverage", "D": "Medicare Advantage enrollees can purchase Medigap"}, "correct": "B", "explanation": "Federal law standardizes Medigap benefit packages by letter (A, B, C, D, F, G, K, L, M, N). Every Plan G from any insurer covers the same benefits. Premiums DO vary by insurer and rating method. Medigap does NOT cover prescription drugs and CANNOT be sold to Medicare Advantage enrollees."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medigap Plan G covers all of the following EXCEPT:", "options": {"A": "Part A inpatient coinsurance", "B": "Part A deductible", "C": "The annual Part B deductible", "D": "Part B excess charges"}, "correct": "C", "explanation": "Plan G is the most comprehensive Medigap plan available to new Medicare enrollees (post-2020). It covers Part A coinsurance and deductible, Part B coinsurance, skilled nursing coinsurance, Part B excess charges, and foreign travel emergencies. The ONLY gap: the annual Part B deductible (around $250/year)."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medicare SELECT is a type of Medigap plan that:", "options": {"A": "Costs more because it adds prescription drug coverage", "B": "Requires using a specific provider network to receive full Medigap benefits", "C": "Is only available to Medicare Advantage enrollees", "D": "Covers the Part A deductible but not Part B"}, "correct": "B", "explanation": "Medicare SELECT plans have lower premiums than standard Medigap (same letter) in exchange for a network restriction. To receive full benefits, you must use the plan's specified network hospitals (and in some cases physicians) for non-emergency care. Emergency care is always covered regardless of network."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Medicare Part A SNF coverage requires a prior qualifying hospital stay of at least:", "options": {"A": "1 inpatient day", "B": "3 consecutive inpatient days", "C": "5 inpatient days", "D": "No hospital stay required"}, "correct": "B", "explanation": "To trigger Part A SNF benefits: (1) at least 3 consecutive days as a formal inpatient (not 'observation status'), (2) SNF admission within 30 days of hospital discharge, (3) care must be skilled, and (4) the SNF must be Medicare-certified. Part A pays fully for days 1-20, then daily coinsurance for days 21-100, then nothing after day 100."}, {"topic": "Medicare, Medigap & senior health plans", "question": "Long-term care insurance specifically covers what Medicare does NOT:", "options": {"A": "Inpatient hospital care", "B": "Custodial care (help with Activities of Daily Living) for extended periods", "C": "Part B physician services", "D": "Part D prescription drugs"}, "correct": "B", "explanation": "Medicare only covers SKILLED nursing care (nurses, therapists) and only short-term. It does NOT cover custodial care — help with ADLs like bathing, dressing, and eating. LTC insurance covers extended custodial care at home, in assisted living, or in a nursing home. Medicaid covers LTC for those who have spent down their assets to qualify."}, {"topic": "Medicare, Medigap & senior health plans", "question": "The Inflation Reduction Act (2022) capped Medicare Part D out-of-pocket drug costs at ___ starting in 2025:", "options": {"A": "$3,500", "B": "$5,000", "C": "$2,000", "D": "Unlimited — the cap doesn't apply to specialty drugs"}, "correct": "C", "explanation": "The Inflation Reduction Act established a $2,000 annual OOP cap for Part D beneficiaries starting in 2025, effectively ending the coverage gap (donut hole) as a significant financial burden. This is a major benefit for Medicare enrollees with high prescription drug costs."}, {"topic": "Health insurance policy provisions", "question": "The 'entire contract' provision states that the policy and application constitute:", "options": {"A": "A temporary agreement until the first renewal", "B": "The entire agreement — no oral representations by agents can modify it", "C": "A summary only — the master policy held by the insurer controls", "D": "A renewable annual contract with no guaranteed terms"}, "correct": "B", "explanation": "The entire contract provision protects policyholders by specifying that the written policy and attached application are the complete contract. Insurers cannot later claim other documents modify coverage. Agents cannot make binding promises beyond the written policy terms. Virginia mandates this in all individual health policies."}, {"topic": "Health insurance policy provisions", "question": "The 'time limit on certain defenses' provision prevents the insurer from voiding the policy for misrepresentation after:", "options": {"A": "6 months", "B": "1 year", "C": "2 years (except for fraudulent misrepresentations)", "D": "5 years"}, "correct": "C", "explanation": "After 2 years in force (the contestable period), the insurer cannot use misrepresentations in the application to void the policy or deny claims — except for fraudulent misstatements. This is the health insurance equivalent of the life insurance incontestability clause. Innocent or negligent misstatements become non-actionable after 2 years."}, {"topic": "Health insurance policy provisions", "question": "The minimum grace period for an individual health policy with an annual premium mode is:", "options": {"A": "7 days", "B": "10 days", "C": "31 days", "D": "60 days"}, "correct": "C", "explanation": "Virginia mandates minimum grace periods: 7 days (weekly premiums), 10 days (monthly), 31 days (all other modes including quarterly and annual). During the grace period, coverage remains in force and claims must be honored even if the premium is unpaid."}, {"topic": "Health insurance policy provisions", "question": "Upon reinstatement of a lapsed health policy, coverage for sickness begins:", "options": {"A": "Immediately", "B": "After a 10-day waiting period", "C": "After 30 days", "D": "Only after a new waiting period equal to the original elimination period"}, "correct": "B", "explanation": "Reinstatement rules: accidental injury coverage resumes immediately; sickness coverage has a 10-day waiting period. This prevents adverse selection — i.e., someone who just became ill reinstating a lapsed policy to immediately file a claim."}, {"topic": "Health insurance policy provisions", "question": "The proof of loss provision requires the insured to submit documentation within how many days of a covered loss (standard)?", "options": {"A": "30 days", "B": "60 days", "C": "90 days", "D": "180 days"}, "correct": "C", "explanation": "The standard proof of loss requirement is 90 days after the loss (or after the start of disability for DI claims). Insurers must supply blank claim forms within 15 days of notice. If they don't, the insured satisfies the requirement with a written description of the loss."}, {"topic": "Health insurance policy provisions", "question": "The 'physical examination and autopsy' provision gives the insurer the right to:", "options": {"A": "Require an annual physical as a condition of renewal", "B": "Examine the insured at its expense while a claim is pending", "C": "Obtain the insured's full medical history at any time", "D": "Void the policy if the insured refuses a medical exam"}, "correct": "B", "explanation": "The insurer may examine the insured as often as reasonably necessary while a claim is pending — at the insurer's expense. The insured cannot refuse without risking claim denial. In death cases, the insurer may request an autopsy where not prohibited by law."}, {"topic": "Health insurance policy provisions", "question": "The 'legal actions' provision sets a minimum waiting period before the insured can sue of:", "options": {"A": "30 days after proof of loss", "B": "60 days after proof of loss", "C": "90 days after the loss", "D": "6 months after claim denial"}, "correct": "B", "explanation": "The legal actions provision: minimum 60 days after submitting proof of loss before suit can be filed (gives insurer processing time), and maximum 3 years from when proof of loss was required (statute of limitations). Filing too late forfeits the right to sue regardless of claim merits."}, {"topic": "Health insurance policy provisions", "question": "The 'change of occupation' provision, when the insured moves to a higher-risk occupation, results in:", "options": {"A": "Policy cancellation with premium refund", "B": "Benefits reduced to what the same premium would purchase for the higher-risk class", "C": "Premium increase without coverage change", "D": "A new underwriting review and possible declination"}, "correct": "B", "explanation": "If the insured changes to a more hazardous occupation, the benefit amount is reduced proportionally (not the premium). If changing to less hazardous work, the same benefit is maintained but the premium decreases (or a refund is given). The policy is never simply canceled for an occupation change."}, {"topic": "Health insurance policy provisions", "question": "The 'misstatement of age' provision adjusts the policy by:", "options": {"A": "Voiding the policy and refunding premiums", "B": "Adjusting benefits to what the premium would have purchased at the correct age", "C": "Increasing the premium retroactively with interest", "D": "Reducing the benefit period to the correct age at issue"}, "correct": "B", "explanation": "Misstatement of age is not grounds for voiding a health policy. Instead, benefits are adjusted to what the premium paid would have bought at the correct age. If age was understated (insured is older), benefits decrease; if overstated, benefits increase or excess premium is refunded."}, {"topic": "Health insurance policy provisions", "question": "The 'relation of earnings to insurance' (overinsurance) provision prevents the insured from:", "options": {"A": "Having more than one disability policy", "B": "Collecting total DI benefits exceeding a set percentage of pre-disability earnings", "C": "Purchasing DI within 30 days of a job change", "D": "Receiving benefits for a disability caused by pre-existing conditions"}, "correct": "B", "explanation": "This provision limits total disability income from all policies to typically 85% of the insured's average pre-disability earned income. If total benefits from all sources would exceed this cap, each policy proportionally reduces its benefit. This prevents a financial incentive to remain disabled."}, {"topic": "Health insurance po
