licy provisions", "question": "Subrogation in health insurance allows the insurer to:", "options": {"A": "Cancel coverage after a large claim", "B": "Recover claim payments from the third party responsible for the insured's injury", "C": "Reduce future benefits if the insured's health deteriorates", "D": "Increase deductibles after multiple claims"}, "correct": "B", "explanation": "Subrogation gives the insurer the right to pursue recovery from a liable third party for amounts it paid in claims. If the insured sues the at-fault party and recovers damages, the health insurer is entitled to reimbursement for what it paid. This prevents double recovery and keeps premiums lower."}, {"topic": "Health insurance policy provisions", "question": "A 'non-cancelable' health policy differs from 'guaranteed renewable' primarily because:", "options": {"A": "Non-cancelable policies have no grace period", "B": "Non-cancelable also guarantees the premium cannot be increased", "C": "Guaranteed renewable provides broader benefits", "D": "Non-cancelable requires annual renewal by the insured"}, "correct": "B", "explanation": "Both non-cancelable and guaranteed renewable prevent the insurer from canceling coverage. The critical difference: non-cancelable also locks in the premium at issue. Guaranteed renewable allows the insurer to raise premiums on a class-wide basis with state approval. Non-cancelable provides both coverage and premium certainty."}, {"topic": "Health insurance underwriting & renewability", "question": "A 'substandard risk' health insurance applicant is one who:", "options": {"A": "Has no prior insurance history", "B": "Presents higher-than-average risk due to health conditions, occupation, or lifestyle", "C": "Is a minor who cannot contract for insurance", "D": "Has filed a fraudulent claim with any insurer"}, "correct": "B", "explanation": "Substandard risks present greater-than-average expected claims. Insurers can still issue coverage but may charge higher premiums, reduce benefits, attach exclusion riders for specific conditions, or a combination. The underwriter quantifies the additional risk and prices accordingly."}, {"topic": "Health insurance underwriting & renewability", "question": "The ACA requires guaranteed issue for:", "options": {"A": "All licensed health insurers in all markets", "B": "Non-grandfathered individual and small group ACA-compliant health plans during enrollment periods", "C": "Only Medicare and Medicaid plans", "D": "Large employer self-funded plans only"}, "correct": "B", "explanation": "The ACA mandates guaranteed issue (no medical underwriting, no rejection based on health status) for individual and small group ACA-compliant plans during Open Enrollment Periods and Special Enrollment Periods. Grandfathered plans and certain exempt products (short-term, dental/vision-only) are not required to offer guaranteed issue."}, {"topic": "Health insurance underwriting & renewability", "question": "Health insurance underwriting may NOT consider an applicant's:", "options": {"A": "Age and tobacco use", "B": "Medical history and prescription drug use", "C": "Race or national origin", "D": "Occupation and geographic location"}, "correct": "C", "explanation": "Anti-discrimination laws prohibit using race, color, national origin, religion, and related protected characteristics in health insurance underwriting. Permitted factors include age (in markets where ACA allows), health history, tobacco use, occupation, and geographic area."}, {"topic": "Health insurance underwriting & renewability", "question": "The MIB (Medical Information Bureau) helps insurers detect:", "options": {"A": "Fraudulent claims filed after policy issuance", "B": "Inconsistencies or omissions in health and life insurance applications", "C": "Providers who overbill for services", "D": "Agents who misrepresent products to applicants"}, "correct": "B", "explanation": "MIB is a data exchange where member insurers share coded medical information about applicants. When insurer A underwrites an application, they can query MIB to see if insurer B noted similar conditions when the same person applied elsewhere. This detects incomplete or inconsistent disclosures, not outright fraud."}, {"topic": "Health insurance underwriting & renewability", "question": "Experience rating for group health insurance bases premiums on:", "options": {"A": "The insurer's total claims across all groups", "B": "The specific employer group's own claims history", "C": "Average demographics of the group only", "D": "Federal rate standards from the ACA"}, "correct": "B", "explanation": "Experience rating uses the specific group's actual claims history to set premiums. Favorable claims history → lower premiums. High claims → higher premiums. Most credible for large groups. Contrasts with community rating (same rate for all similar groups regardless of their specific history)."}, {"topic": "Health insurance underwriting & renewability", "question": "A 'conditionally renewable' health policy allows the insurer to refuse renewal:", "options": {"A": "At any time for any reason", "B": "Only under specific conditions defined in the policy (e.g., retirement, moving out of service area)", "C": "Only if the insured misses two consecutive premium payments", "D": "Never — only the insured can decline to renew"}, "correct": "B", "explanation": "Conditionally renewable gives the insurer non-renewal rights but only under pre-defined conditions such as the insured ceasing full-time employment, moving outside the service area, or reaching a specified age. The insurer cannot refuse renewal arbitrarily. This offers less security than guaranteed renewable or non-cancelable."}, {"topic": "Health insurance underwriting & renewability", "question": "Under HIPAA, 'creditable coverage' credit eliminates or reduces the new plan's:", "options": {"A": "Premium for the first 12 months", "B": "Pre-existing condition exclusion waiting period", "C": "Deductible for the first policy year", "D": "Requirement to complete a new application"}, "correct": "B", "explanation": "HIPAA's portability rules: prior creditable coverage (most types of health insurance) is credited toward a new plan's PCE waiting period, provided there's no break of 63+ days. A 12-month PCE waiting period with 6 months of prior continuous coverage = only 6 months remaining. The ACA largely eliminated PCEs for ACA-compliant plans."}, {"topic": "Health insurance underwriting & renewability", "question": "Group health insurance underwriting evaluates the group as a whole because:", "options": {"A": "Individual underwriting is too expensive for large groups", "B": "Federal law prohibits individual underwriting within group plans", "C": "Individual employees cannot be singled out for medical conditions under group insurance rules", "D": "All of the above"}, "correct": "C", "explanation": "Group insurance law requires community rating within the group — individual employees cannot be medically underwritten, charged higher premiums, or denied coverage based on their personal health history. The group is underwritten as a whole based on demographics, industry, and sometimes prior claims experience."}, {"topic": "Health insurance underwriting & renewability", "question": "'Rating up' a health insurance applicant means:", "options": {"A": "Approving them for a higher benefit amount", "B": "Accepting them at a higher-than-standard premium due to elevated risk", "C": "Adding an exclusion rider for a specific condition", "D": "Referring them to a high-risk pool"}, "correct": "B", "explanation": "Rating up accepts the substandard risk applicant but assigns them to a higher risk class with corresponding higher premiums. The three approaches to substandard risks: (1) rate up (higher premium), (2) modify coverage (rider or reduced benefits), or (3) decline the application."}, {"topic": "Health insurance underwriting & renewability", "question": "Pre-existing condition exclusion (PCE) riders may still appear in:", "options": {"A": "ACA marketplace individual plans", "B": "Small group employer plans covered by the ACA", "C": "Non-ACA-compliant products like short-term health plans", "D": "Medicare Supplement (Medigap) plans"}, "correct": "C", "explanation": "The ACA prohibited PCE riders for compliant individual and small group plans. However, non-ACA-compliant products — including short-term health insurance, certain association plans, and exempt products — may still use PCE riders. These products are not subject to ACA market reforms."}, {"topic": "Health insurance underwriting & renewability", "question": "Modified community rating under the ACA for individual and small group markets allows premium variation ONLY based on:", "options": {"A": "Health status, age, gender, and tobacco use", "B": "Age (3:1 ratio), geographic area, family size, and tobacco use (1.5:1)", "C": "Claims history, occupation, and credit score", "D": "Any factor the actuary deems relevant"}, "correct": "B", "explanation": "ACA modified community rating restricts premium variation to: (1) age — older adults may be charged no more than 3x what younger adults pay; (2) geographic rating area; (3) family size/coverage tier; (4) tobacco use — up to 1.5x surcharge. Individual health status, gender, occupation, and prior claims CANNOT affect individual premiums in ACA-compliant markets."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "The Virginia Bureau of Insurance (BOI) operates under which state body?", "options": {"A": "The Virginia Department of Insurance", "B": "The State Corporation Commission (SCC)", "C": "The Virginia Department of Health", "D": "The Office of the Attorney General"}, "correct": "B", "explanation": "Virginia's insurance regulatory authority is the Bureau of Insurance, which is a division of the State Corporation Commission (SCC). The SCC also regulates utilities and securities. The BOI licenses insurers and producers, reviews policy forms and rates, and investigates complaints and market conduct."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "The Virginia Life, Accident and Sickness Insurance Guaranty Association's coverage limit for individual health insurance benefits is:", "options": {"A": "$50,000 per insured", "B": "$100,000 per insured per covered contract", "C": "$300,000 per insured", "D": "$500,000 per insured"}, "correct": "B", "explanation": "Virginia Guaranty Association limits: Life insurance death benefits — $300,000; Net cash surrender value — $100,000; Health insurance benefits — $100,000 per insured per covered contract; Annuity present value — $250,000. Producers must disclose these limits to applicants."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Virginia's minimum grace period for a health insurance policy with monthly premiums is:", "options": {"A": "7 days", "B": "10 days", "C": "31 days", "D": "60 days"}, "correct": "B", "explanation": "Grace period minimums by premium mode: weekly = 7 days, monthly = 10 days, all other modes (quarterly, semi-annual, annual) = 31 days. During the grace period, coverage stays in force and claims incurred during this window must be paid."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Virginia producer licenses are renewed on a cycle of every:", "options": {"A": "1 year", "B": "2 years", "C": "3 years", "D": "5 years"}, "correct": "B", "explanation": "Virginia producer licenses have a 2-year renewal cycle tied to the producer's birth month. Renewal requires 16 CE hours per 2-year period, including at least 3 hours of Virginia law and ethics. Late renewal results in lapse; reinstatement is possible within 1 year of lapse."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Virginia requires that a Buyer's Guide and Policy Summary for life insurance be delivered:", "options": {"A": "Only when the applicant requests them", "B": "At or before application, or at policy delivery if the policy has a free-look period", "C": "Within 90 days of policy issuance", "D": "At the first policy anniversary"}, "correct": "B", "explanation": "These documents must be provided before or at the point the applicant would be bound by the coverage. If the policy has a right-to-return (free-look) provision, delivery may occur at or before policy delivery."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "The standard free-look period for an individual life insurance policy delivered in Virginia is at least:", "options": {"A": "10 days", "B": "20 days", "C": "30 days", "D": "45 days"}, "correct": "A", "explanation": "Virginia requires a minimum 10-day free-look period for individual life insurance policies. Medicare supplement and LTC policies have longer free-look periods (30 days). Replacement policies also have a 30-day free look. The period begins when the policy is physically delivered."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Under Virginia's replacement regulations, the replacing insurer must notify the replaced insurer within:", "options": {"A": "2 business days of application", "B": "5 working days of receiving the replacement application", "C": "10 calendar days of policy issuance", "D": "30 days of first premium payment"}, "correct": "B", "explanation": "The replacing insurer must send a copy of the replacement notice to the replaced insurer within 5 working days of receiving the application. The replaced insurer then has 20 days to contact the policyowner to discuss the existing policy."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Virginia requires insurers to acknowledge receipt of a health insurance claim within:", "options": {"A": "10 working days", "B": "30 calendar days", "C": "45 days", "D": "72 hours"}, "correct": "A", "explanation": "Virginia's claim settlement practices regulations require acknowledgment within 10 working days of receiving a claim communication, unless payment is made within that time. After acknowledgment, the insurer must conduct a reasonable investigation and affirm or deny coverage within 45 days."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Virginia's continuing education requirement for licensed producers is:", "options": {"A": "20 hours per year", "B": "16 hours per 2-year license period with at least 3 hours of Virginia law and ethics", "C": "24 hours per 3-year period", "D": "10 hours annually with no topic requirements"}, "correct": "B", "explanation": "16 CE hours every 2 years, including a minimum of 3 hours of Virginia-specific law and ethics. All courses must be from BOI-approved providers. The cycle aligns with the producer's license renewal period."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "Virginia's Insurance Fraud Act makes it a crime to:", "options": {"A": "Charge premiums higher than competitors", "B": "Knowingly make materially false statements in an insurance application or claim", "C": "Change insurers more than once per year", "D": "Fail to buy required insurance"}, "correct": "B", "explanation": "Virginia Code § 38.2-2002 criminalizes: presenting false material information to obtain coverage, filing false claims, and willfully misrepresenting facts in an application to reduce premiums. Violations can be misdemeanors or felonies depending on the dollar amounts involved."}, {"topic": "Virginia Title 38.2 & required numbers", "question": "A replacement life insurance policy in Virginia must have a free-look period of at least:", "options": {"A": "10 days", "B": "20 days", "C": "30 days", "D": "45 days"}, "correct": "C", "explanation": "Replacement policies have an extended 30-day free-look period (vs. the standard 10 days) to give consumers adequate time to compare the new and replaced policies. If the replacement policy is returned within 30 days, the new policy is rescinded and the replaced policy must be reinstated."}, {"topic": "Producer licensing & reporting rules", "question": "The Virginia entity that issues and regulates insurance producer licenses is:", "options": {"A": "The NAIC", "B": "The Virginia Bureau of Insurance under the State Corporation Commission", "C": "The U.S. Department of Labor", "D": "FINRA"}, "correct": "B", "explanation": "The Virginia BOI (under the SCC) licenses, regulates, and disciplines insurance producers. The NAIC is a model law standards body with no direct licensing authority. Federal bodies (DOL, FINRA) regulate employee benefit plans and securities, not state insurance producers."}, {"topic": "Producer licensing & reporting rules", "question": "A licensed Virginia producer who changes their address must notify the BOI within:", "options": {"A": "90 days", "B": "30 days", "C": "10 business days", "D": "60 days"}, "correct": "B", "explanation": "Address changes must be reported to the BOI within 30 days. Failure to maintain a current address doesn't excuse missed regulatory communications sent to the address of record."}, {"topic": "Producer licensing & reporting rules", "question": "An 'appointment' in insurance licensing means:", "options": {"A": "The producer has passed the state exam", "B": "An insurer has formally authorized the licensed producer to transact insurance on its behalf, filed with the BOI", "C": "The producer has exclusive rights to represent an insurer", "D": "The producer has completed the insurer's product training"}, "correct": "B", "explanation": "A license authorizes the producer to transact insurance in general. An appointment authorizes the producer to transact for a SPECIFIC insurer. Both are required. Without an appointment, a licensed producer cannot sell that insurer's products."}, {"topic": "Producer licensing & reporting rules", "question": "Virginia requires a producer to self-report to the BOI within 30 days of:", "options": {"A": "Changing their premium collection method", "B": "A felony conviction or license action taken in another state", "C": "Switching to a different primary insurer", "D": "Completing CE requirements"}, "correct": "B", "explanation": "Self-reporting requirements: felony convictions, certain misdemeanor convictions (dishonesty, breach of trust), and administrative license actions in other states must be reported within 30 days. Failure to self-report is an independent violation subject to disciplinary action."}, {"topic": "Producer licensing & reporting rules", "question": "When an insurer terminates a producer's appointment for fraud or material misconduct, the insurer must notify the BOI within:", "options": {"A": "30 days", "B": "10 business days", "C": "60 days", "D": "The next renewal period"}, "correct": "A", "explanation": "Conduct-related terminations (fraud, dishonesty, material law violations) must be reported to the BOI within 30 days. The BOI then determines whether independent license action is warranted. Both the insurer and producer have separate reporting obligations."}, {"topic": "Producer licensing & reporting rules", "question": "A non-resident producer license in Virginia is available to out-of-state producers who:", "options": {"A": "Have lived in Virginia for less than 6 months", "B": "Hold a valid license in their home state that grants reciprocal licensing to Virginia producers", "C": "Are only licensed for federal programs", "D": "Have passed the Virginia exam but live elsewhere"}, "correct": "B", "explanation": "Virginia grants non-resident licenses on a reciprocal basis: the home state must grant Virginia producers the same reciprocal treatment, the producer must hold a valid home-state license, and they must not have had a license denied, suspended, or revoked in any state."}, {"topic": "Producer licensing & reporting rules", "question": "The difference between a producer 'license' and a producer 'appointment' is:", "options": {"A": "A license is federal; an appointment is state-issued", "B": "A license is the state credential to transact insurance; an appointment authorizes the producer to act for a specific insurer", "C": "A license covers only life insurance; an appointment covers health", "D": "An appointment is only required for new producers"}, "correct": "B", "explanation": "License = state authorization to transact insurance generally. Appointment = company-specific authorization to represent a particular insurer. Both are required simultaneously. One license + multiple appointments with multiple insurers is the standard structure."}, {"topic": "Producer licensing & reporting rules", "question": "Commission sharing with an unlicensed individual who participated in soliciting the sale is:", "options": {"A": "Permitted if the person is a family member", "B": "An unfair trade practice and potential violation of Virginia licensing law", "C": "Permitted for referral fees under 10%", "D": "Permitted with the insurer's written consent"}, "correct": "B", "explanation": "Only licensed producers may receive compensation for soliciting insurance. Paying unlicensed individuals for referrals or for helping solicit sales effectively compensates them for transacting insurance without a license. This is prohibited and can result in license action against the licensed producer."}, {"topic": "Producer licensing & reporting rules", "question": "A Virginia producer license lapses when the producer fails to:", "options": {"A": "Write any new business for 12 months", "B": "Complete CE requirements and renew by the expiration date", "C": "File annual income taxes", "D": "Maintain a minimum number of active policy appointments"}, "correct": "B", "explanation": "A license lapses when CE is not completed and/or the renewal fee is not paid by the renewal deadline. A lapsed license may be reinstated within 1 year with late fees. After 1 year, the individual must reapply, retake the exam, and meet all initial licensing requirements."}, {"topic": "Producer licensing & reporting rules", "question": "Which of the following does NOT require a Virginia insurance producer license?", "options": {"A": "Soliciting a new life insurance application", "B": "Negotiating the terms and price of a health policy", "C": "Referring a friend to a licensed agent without discussing coverage details", "D": "Collecting initial premiums from a new policyholder"}, "correct": "C", "explanation": "Transacting insurance (soliciting, negotiating, selling, executing policies, collecting premiums) requires a license. A simple referral that doesn't involve discussing specific coverage, premiums, or policy terms is generally not considered transacting insurance and doesn't require licensure."}, {"topic": "Producer licensing & reporting rules", "question": "If a Virginia producer's license is revoked, reapplication is permitted:", "options": {"A": "After 12 months automatically", "B": "After the time period specified in the SCC's revocation order, if any", "C": "After 24 CE ethics hours", "D": "After paying a $500 reinstatement fee"}, "correct": "B", "explanation": "The SCC's revocation order specifies terms — including whether and when reapplication is permitted. Serious violations (fraud, criminal convictions) may result in permanent revocation with no path to reapplication. Minor violations may allow reapplication after a defined period."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Twisting' in insurance is defined as:", "options": {"A": "Selling multiple policies to one client to earn more commission", "B": "Inducing a policyholder to lapse or surrender existing coverage based on misrepresentation to buy a new policy", "C": "Charging premiums above filed rates", "D": "Offering rebates to attract clients"}, "correct": "B", "explanation": "Twisting uses misrepresentation of the existing or proposed policy to induce an unnecessary replacement. The consumer loses accumulated values, pays new sales costs, and may lose guaranteed benefits — all to the producer's benefit. Prohibited under Virginia Code § 38.2-1806."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Churning' is the practice of:", "options": {"A": "Using dividends to buy additional paid-up insurance", "B": "Repeatedly replacing a client's policies primarily to generate new commissions, not client benefit", "C": "Moving clients between insurers based on price", "D": "Filing multiple small claims to collect maximum benefits"}, "correct": "B", "explanation": "Churning = twisting done repeatedly over time on the same client. Each replacement generates new first-year commissions for the producer while the client loses policy values, faces new waiting periods, and incurs surrender charges. It's an unfair trade practice and can lead to license revocation."}, {"topic": "Unfair trade practices & consumer protection", "question": "Offering an applicant a cash rebate from the producer's commission as an inducement to buy a policy is called:", "options": {"A": "Churning", "B": "Rebating — an unfair trade practice prohibited in Virginia", "C": "Acceptable cross-selling", "D": "Lawful incentive marketing"}, "correct": "B", "explanation": "Rebating is the act of giving an applicant anything of value not specified in the policy as an inducement to purchase. Prohibited in Virginia (Va. Code § 38.2-1806). Exceptions: California and Florida permit rebating for most lines. Rebating undermines rate integrity and creates unfair competition."}, {"topic": "Unfair trade practices & consumer protection", "question": "Making false statements about a competitor's financial condition to steal their clients is called:", "options": {"A": "Misrepresentation", "B": "Defamation (an unfair trade practice)", "C": "Twisting", "D": "Sliding"}, "correct": "B", "explanation": "Insurance defamation is making false, malicious, or derogatory statements about a competing insurer's financial condition, policies, or management to injure their business. This is distinct from personal defamation and constitutes an unfair trade practice in Virginia and all states."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Sliding' in an insurance transaction means:", "options": {"A": "Gradually raising premiums without notice", "B": "Adding unrequested products or charges to a transaction without the consumer's knowledge or consent", "C": "Repeatedly replacing policies to earn commissions", "D": "Reducing coverage without telling the insured"}, "correct": "B", "explanation": "Sliding inserts additional coverages, products, or fees into a transaction without the buyer's knowledge. Example: adding a $5/month accidental death rider to an auto policy without mentioning it. Differs from cross-selling, where the additional product is clearly disclosed and agreed to."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Unfair discrimination' in insurance underwriting means distinguishing between risks based on:", "options": {"A": "Actuarially supported differences in expected losses", "B": "Protected characteristics unrelated to actuarial risk (e.g., race, national origin)", "C": "Geographic location and claims frequency", "D": "Occupation and industry type"}, "correct": "B", "explanation": "Fair discrimination (legal): charging different premiums for different actuarial risk classes. Unfair discrimination (illegal): using protected characteristics (race, ethnicity, national origin, religion) that have no legitimate actuarial basis. Virginia Code § 38.2-508 prohibits unfair discrimination."}, {"topic": "Unfair trade practices & consumer protection", "question": "Requiring a customer to buy an unwanted insurance product as a condition of getting the product they want is called:", "options": {"A": "Rebating", "B": "A tying arrangement (prohibited coercion)", "C": "Lawful bundling", "D": "Adverse selection prevention"}, "correct": "B", "explanation": "Tying (coercion) conditions the purchase of one product on the purchase of another. This is both an insurance unfair trade practice and potentially a federal antitrust violation. Offering (but not requiring) additional products is cross-selling, which is lawful."}, {"topic": "Unfair trade practices & consumer protection", "question": "A pattern of systematically denying valid claims without investigation violates:", "options": {"A": "ERISA fiduciary duty requirements", "B": "The Unfair Claims Settlement Practices Act", "C": "Federal MLR (minimum loss ratio) standards", "D": "COBRA continuation requirements"}, "correct": "B", "explanation": "Virginia's Unfair Claims Settlement Practices Act (based on the NAIC model, codified in Title 38.2) requires prompt acknowledgment, reasonable investigation, and timely good-faith payment or denial. A pattern — not just an isolated error — of violating these standards is an unfair trade practice subject to market conduct action."}, {"topic": "Unfair trade practices & consumer protection", "question": "A producer found guilty of twisting faces potential consequences including:", "options": {"A": "A written warning for first offense only", "B": "License suspension or revocation, civil fines, and potential criminal prosecution", "C": "Mandatory completion of 8 CE hours", "D": "A 90-day suspension without appeal rights"}, "correct": "B", "explanation": "Virginia Code gives the BOI broad authority to discipline producers for unfair practices. Consequences: license action (suspension, revocation, conditions), civil monetary penalties up to $5,000 per violation, restitution to harmed consumers, and criminal charges for fraud-related violations."}, {"topic": "Unfair trade practices & consumer protection", "question": "Under Virginia law, all of the following are unfair trade practices EXCEPT:", "options": {"A": "Rebating (giving part of commission back to the client)", "B": "Cross-selling additional products to an existing client with full disclosure", "C": "Twisting (misrepresentation-induced replacement)", "D": "Defamation of a competitor's financial condition"}, "correct": "B", "explanation": "Cross-selling with full disclosure and no coercion is lawful and encouraged in insurance sales. Rebating, twisting, and defamation are all prohibited unfair trade practices under Virginia Code Title 38.2."}, {"topic": "Unfair trade practices & consumer protection", "question": "'Misrepresentation' as an unfair trade practice includes which of the following?", "options": {"A": "Accurately comparing two competing policies", "B": "Making false statements about a policy's benefits, exclusions, or the insurer's financial condition", "C": "Explaining policy limitations a client didn't ask about", "D": "Recommending a product based on client needs"}, "correct": "B", "explanation": "Misrepresentation covers: false statements about policy terms, benefits, conditions, or exclusions; false statements about competitors; misleading illustrations or projections; and misrepresenting dividends or returns. It is one of the most common unfair trade practice violations cited by state regulators."}, {"topic": "Replacement regulations & Guaranty Association", "question": "Virginia's replacement regulations are triggered when a new life insurance or annuity policy is being purchased AND an existing policy will be:", "options": {"A": "Added to with a supplemental rider", "B": "Lapsed, surrendered, converted, or have its cash value borrowed to fund the new purchase", "C": "Kept at full value alongside the new policy", "D": "Moved to a different insurer without change"}, "correct": "B", "explanation": "Replacement triggers: (1) new life/annuity is purchased AND (2) an existing policy is being lapsed, surrendered, converted to reduced paid-up or extended term, reissued with reduced face value, or financed through policy loans. All of these require completion of the replacement disclosure process."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The primary goal of Virginia's replacement regulations is to:", "options": {"A": "Prevent all replacement transactions", "B": "Protect consumers by ensuring they have complete information to make an informed replacement decision", "C": "Prevent producers from earning commissions on replacements", "D": "Require BOI pre-approval of every replacement"}, "correct": "B", "explanation": "Replacement regulations are consumer protection measures — not replacement prohibitions. They ensure: the consumer understands what they're giving up, the replaced insurer has a chance to retain the client, and the producer documents the comparison. Legitimate beneficial replacements are fully permitted."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The Replacement Notice must be signed by:", "options": {"A": "The replacing insurer's home office only", "B": "Both the applicant and the producing agent, with copies maintained for at least 3 years", "C": "The replaced insurer's agent", "D": "The BOI within 5 days of the transaction"}, "correct": "B", "explanation": "Both signatures required: applicant and producer. The producer keeps a copy for 3+ years (until next BOI examination). A copy is submitted with the application to the replacing insurer. The replacing insurer then notifies the replaced insurer within 5 working days."}, {"topic": "Replacement regulations & Guaranty Association", "question": "After receiving replacement notification, the replaced insurer has how many days to contact the policyowner?", "options": {"A": "5 days", "B": "10 days", "C": "20 days", "D": "30 days"}, "correct": "C", "explanation": "The replaced insurer has 20 days after notification to contact the policyowner to provide information about the existing policy. This contact is informational — the replaced insurer cannot block the transaction, but it can make sure the consumer knows the full value of what they're surrendering."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The Virginia Life, Accident and Sickness Insurance Guaranty Association is funded through:", "options": {"A": "Annual state budget appropriations", "B": "Premium taxes from all Virginia insurers", "C": "Post-insolvency assessments on member insurers", "D": "Annual fees from policyholders"}, "correct": "C", "explanation": "The Guaranty Association is NOT pre-funded. When a member insurer becomes insolvent, the Association levies assessments on remaining member insurers proportional to their Virginia premium volume. This post-insolvency structure keeps ongoing costs low but means the Association activates only after failure."}, {"topic": "Replacement regulations & Guaranty Association", "question": "Self-insured employer health plans (ERISA plans) are NOT covered by the Virginia Guaranty Association because:", "options": {"A": "They are too large to need coverage", "B": "They are not insurance — the employer bears the risk directly, and ERISA preempts state insurance law", "C": "Federal ERISA provides its own guaranty protection", "D": "They are regulated by the Department of Labor, not the BOI"}, "correct": "B", "explanation": "ERISA self-funded plans are not insurance products — the employer pays claims directly from company assets. Since there's no insurance policy, there's no Guaranty Association coverage. ERISA also preempts state insurance regulation for self-funded plans. Only plans issued by licensed insurance companies are covered."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The Guaranty Association's coverage limit for life insurance death benefits in Virginia is:", "options": {"A": "$100,000", "B": "$250,000", "C": "$300,000", "D": "$500,000"}, "correct": "C", "explanation": "Virginia limits: Death benefits — $300,000; Cash surrender value — $100,000; Health insurance benefits — $100,000 per insured per contract; Annuity present value — $250,000."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The notice producers must deliver to applicants about the Guaranty Association must communicate that:", "options": {"A": "All policies are 100% guaranteed by the state of Virginia", "B": "Coverage is limited by specified dollar caps and is not a substitute for choosing a financially strong insurer", "C": "The Association guarantees full replacement of all benefits", "D": "Only policies purchased through agents are covered"}, "correct": "B", "explanation": "The mandatory Guaranty Association disclosure notice informs applicants that: (1) coverage is capped, (2) the Association is a backstop — not a full guarantee, and (3) selecting a financially sound insurer is the primary protection. Producers who fail to deliver this notice may face license action."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The key consumer harm when replacing a whole life policy early in the policy period is:", "options": {"A": "Possible income tax on the surrender proceeds", "B": "Loss of accumulated cash values and restart of first-year cost structure with the new policy", "C": "Potential criminal liability for the producer", "D": "Loss of Medicare eligibility"}, "correct": "B", "explanation": "Early in a whole life policy's life, a large portion of premium covers agent commissions and company expenses — little goes to cash value. Surrendering and replacing means: losing what little cash value has accumulated (minus surrender charges), restarting the expense-heavy early years of a new policy, and triggering new agent commissions. This is why early replacement is rarely in the consumer's interest."}, {"topic": "Replacement regulations & Guaranty Association", "question": "Virginia replacement regulations require a 'Comparative Information Form' that presents:", "options": {"A": "Only the proposed policy's projected values", "B": "Side-by-side premium, benefit, and cash value data for both the existing and proposed policy", "C": "The producer's commission on both policies", "D": "The financial ratings of both insurers"}, "correct": "B", "explanation": "The Comparative Information Form (or equivalent) gives consumers an apples-to-apples comparison: premiums, death benefits, cash/surrender values at policy anniversaries, dividends (if applicable). This is the core consumer protection tool that allows informed comparison before surrendering existing coverage."}, {"topic": "Replacement regulations & Guaranty Association", "question": "Replacement regulations apply to a transaction even when the producer believes it genuinely benefits the client because:", "options": {"A": "The BOI must independently approve all replacement transactions", "B": "The regulations are disclosure-based — the consumer, not just the producer, must have the information to decide", "C": "Most replacements are assumed to be churning until proven otherwise", "D": "Only the replaced insurer can determine if a replacement is beneficial"}, "correct": "B", "explanation": "Replacement regulations are mandatory disclosure rules, not outcome-based rules. Whether the replacement is good or bad for the consumer, the Replacement Notice must be completed and signed. The consumer then decides with full information — the producer's judgment about benefit doesn't substitute for the required consumer disclosure."}, {"topic": "Replacement regulations & Guaranty Association", "question": "The replacing insurer must send replacement notification to the replaced insurer within:", "options": {"A": "2 business days", "B": "5 working days of receiving the application", "C": "10 calendar days", "D": "30 days of policy delivery"}, "correct": "B", "explanation": "5 working days from receiving the replacement application. This triggers the 20-day window for the replaced insurer to contact the policyowner. The timeline is: producer submits application + notice → replacing insurer notifies replaced insurer within 5 days → replaced insurer may contact client within 20 days."}, {"topic": "Virginia-specific health & function save(){try{const d={total:state.total,correct:state.correct,streak:state.streak,topicScores:state.topicScores,reviewHistory:state.reviewHistory.slice(-500),seenIds:{}};ALL_TOPICS.forEach(t=>{if(state.seenIds[t])d.seenIds[t]=[...state.seenIds[t]];});localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function load(){try{const s=localStorage.getItem(SK);if(!s)return;const p=JSON.parse(s);state.total=p.total||0;state.correct=p.correct||0;state.streak=p.streak||0;state.topicScores=p.topicScores||{};state.reviewHistory=Array.isArray(p.reviewHistory)?p.reviewHistory:[];state.seenIds={};if(p.seenIds)Object.keys(p.seenIds).forEach(t=>{state.seenIds[t]=new Set(p.seenIds[t]);});}catch(e){}}

const POOLS={},PIDX={},QDB={};
function initPools(){ALL_TOPICS.forEach(t=>{POOLS[t]=shuffle(BANK.filter(q=>q.topic===t));PIDX[t]=0;});}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function qid(q){return q.question.substring(0,48);}
function pickFrom(topic){
  if(!POOLS[topic]||!POOLS[topic].length)return null;
  if(!state.seenIds[topic])state.seenIds[topic]=new Set();
  const seen=state.seenIds[topic],pool=POOLS[topic];
  for(let i=0;i<pool.length;i++){const idx=(PIDX[topic]+i)%pool.length;const id=qid(pool[idx]);if(!seen.has(id)){PIDX[topic]=(idx+1)%pool.length;seen.add(id);if(seen.size>=pool.length)seen.clear();return pool[idx];}}
  seen.clear();const q=pool[PIDX[topic]%pool.length];PIDX[topic]=(PIDX[topic]+1)%pool.length;seen.add(qid(q));return q;
}

function switchTab(tab){
  document.getElementById('tab-practice').style.display=tab==='practice'?'block':'none';
  document.getElementById('tab-review').style.display=tab==='review'?'block':'none';
  document.getElementById('nav-practice').classList.toggle('active',tab==='practice');
  document.getElementById('nav-review').classList.toggle('active',tab==='review');
  if(tab==='review')renderReview();
}
function updateStats(){
  document.getElementById('stat-total').textContent=state.total;
  document.getElementById('stat-correct').textContent=state.correct;
  document.getElementById('stat-pct').textContent=state.total>0?Math.round(state.correct/state.total*100)+'%':'—';
  document.getElementById('stat-streak').textContent=state.streak;
  const pb=document.getElementById('progress-bar');if(pb)pb.style.width=(state.total>0?Math.min(Math.round(state.correct/state.total*100),100):0)+'%';
  const weak=getWeak(),el=document.getElementById('weak-tags');if(el)el.innerHTML=weak.length?weak.map(t=>`<span class="weak-tag">${t}</span>`).join(''):'<em>No weak spots yet!</em>';
  const badge=document.getElementById('rev-badge');if(badge){const n=state.reviewHistory.length;badge.style.display=n>0?'inline':'none';badge.textContent=n>99?'99+':n;}
}
function getWeak(){return ALL_TOPICS.filter(t=>{const s=state.topicScores[t];return s&&s.total>=2&&s.correct/s.total<0.7;});}
function setMode(m){state.mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));document.getElementById('mode-'+m).classList.add('active');document.getElementById('topic-section').style.display=m==='topic'?'block':'none';document.getElementById('weak-info').style.display=m==='weak'?'block':'none';updateStats();}
function buildTopics(){document.getElementById('topic-section').innerHTML='<div class="section-label" style="margin-bottom:10px">Select a chapter</div>'+TOPIC_GROUPS.map(g=>`<div class="topic-group"><div class="topic-group-label">${g.group}</div><div class="topic-grid">${g.topics.map(t=>`<button class="topic-btn${state.selectedTopic===t.label?' active':''}" data-label="${t.label.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="selTopic(this.dataset.label,this)"><span class="ch-badge">${t.ch}</span>${t.label}</button>`).join('')}</div></div>`).join('');}
function selTopic(l,b){state.selectedTopic=l;document.querySelectorAll('.topic-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');}
function getTopics(){if(state.mode==='topic')return[state.selectedTopic||ALL_TOPICS[0]];if(state.mode==='va')return VA_TOPICS;if(state.mode==='weak'){const w=getWeak();return w.length?w:ALL_TOPICS;}return ALL_TOPICS;}

function generateQuestions(){
  const pool=getTopics(),count=parseInt(document.getElementById('q-count').value)||5,qs=[];
  for(let i=0;i<count;i++){const t=pool[Math.floor(Math.random()*pool.length)];const q=pickFrom(t);if(q)qs.push(q);}
  if(!qs.length){document.getElementById('questions-container').insertAdjacentHTML('afterbegin','<div class="no-q">No questions available.</div>');return;}
  renderQs(qs,state.mode==='topic'?state.selectedTopic:null);save();
}
function renderQs(qs,label){
  var con=document.getElementById('questions-container');
  var wrap=document.createElement('div');
  wrap.style.marginBottom='1.5rem';
  if(label){var lbl=document.createElement('div');lbl.className='set-label';lbl.textContent=label;wrap.appendChild(lbl);}
  var uid=Date.now();
  qs.forEach(function(q,i){
    var k=uid+'-'+i;
    QDB[k]=q;
    var card=document.createElement('div');
    card.className='qcard';
    var qnum=document.createElement('div');
    qnum.className='qnum';
    qnum.textContent='Q'+(state.total+i+1)+' · '+q.topic;
    card.appendChild(qnum);
    var qtext=document.createElement('div');
    qtext.className='qtext';
    qtext.textContent=q.question;
    card.appendChild(qtext);
    var optDiv=document.createElement('div');
    optDiv.className='options';
    optDiv.id='o-'+k;
    (function(qRef,kRef){
      ['A','B','C','D'].forEach(function(letter){
        var btn=document.createElement('button');
        btn.type='button';
        btn.className='opt';
        btn.dataset.l=letter;
        var s1=document.createElement('span');
        s1.className='opt-letter';
        s1.textContent=letter;
        var s2=document.createElement('span');
        s2.textContent=qRef.options[letter]||'';
        btn.appendChild(s1);
        btn.appendChild(s2);
        (function(b,lt){
          b.addEventListener('click',function(){ans(b,lt,qRef.correct,kRef);});
        })(btn,letter);
        optDiv.appendChild(btn);
      });
    })(q,k);
    card.appendChild(optDiv);
    var exDiv=document.createElement('div');
    exDiv.className='explanation';
    exDiv.id='ex-'+k;
    exDiv.style.display='none';
    var exLbl=document.createElement('div');
    exLbl.className='expl-label';
    exLbl.textContent='Why this is the answer';
    var exText=document.createElement('div');
    exText.id='ext-'+k;
    exDiv.appendChild(exLbl);
    exDiv.appendChild(exText);
    card.appendChild(exDiv);
    wrap.appendChild(card);
  });
  con.insertBefore(wrap,con.firstChild);
  window.scrollTo({top:0,behavior:'smooth'});
}
function ans(btn,chosen,correct,k){const q=QDB[k];if(!q)return;
  const opts=document.getElementById('o-'+k);if(!opts||opts.dataset.done)return;opts.dataset.done='1';
  const ok=chosen===correct;state.total++;if(ok){state.correct++;state.streak++;}else{state.streak=0;}
  if(!state.topicScores[q.topic])state.topicScores[q.topic]={total:0,correct:0};
  state.topicScores[q.topic].total++;if(ok)state.topicScores[q.topic].correct++;
  state.reviewHistory.push({id:Date.now()+Math.random(),topic:q.topic,question:q.question,options:q.options,correct:q.correct,explanation:q.explanation,userAnswer:chosen,isCorrect:ok,ts:Date.now()});
  opts.querySelectorAll('.opt').forEach(o=>{const l=o.dataset.l;if(l===correct)o.classList.add(ok&&l===chosen?'correct':'reveal-correct');else if(l===chosen&&!ok)o.classList.add('wrong');o.style.cursor='default';o.disabled=true;});
  const ex=document.getElementById('ex-'+k),ext=document.getElementById('ext-'+k);if(ex&&ext){ext.textContent=q.explanation;ex.style.display='block';}
  updateStats();save();
}

function buildRevFilters(){const sel=document.getElementById('rev-topic'),cur=sel.value;sel.innerHTML='<option value="">All topics</option>';[...new Set(state.reviewHistory.map(r=>r.topic))].forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===cur)o.selected=true;sel.appendChild(o);});}
function renderReview(){
  buildRevFilters();
  const tf=document.getElementById('rev-topic').value,rf=document.getElementById('rev-result').value;
  let items=[...state.reviewHistory].reverse();
  if(tf)items=items.filter(r=>r.topic===tf);if(rf==='correct')items=items.filter(r=>r.isCorrect);if(rf==='wrong')items=items.filter(r=>!r.isCorrect);
  const n=items.length,nc=items.filter(r=>r.isCorrect).length;
  document.getElementById('rev-total').textContent=n;document.getElementById('rev-correct').textContent=nc;document.getElementById('rev-pct').textContent=n>0?Math.round(nc/n*100)+'%':'—';
  const con=document.getElementById('review-container');
  if(!items.length){con.innerHTML='<div class="review-empty">No answered questions yet.<br>Complete practice questions to build your review list.</div>';return;}
  con.innerHTML=items.map(r=>`<div class="review-card ${r.isCorrect?'rc-c':'rc-w'}"><div class="review-topic">${r.topic} &middot; ${r.isCorrect?'&#10003; Correct':'&#10007; Incorrect'}</div><div class="review-qtext">${r.question}</div><div class="review-opts">${['A','B','C','D'].map(l=>`<div class="review-opt ${l===r.correct?'ro-c':(l===r.userAnswer&&!r.isCorrect?'ro-w':'')}"><span style="font-weight:700;min-width:16px;flex-shrink:0">${l}</span><span>${r.options[l]}</span></div>`).join('')}</div><div class="review-expl"><strong>Explanation:</strong> ${r.explanation}</div></div>`).join('');
}

function exportPDF(){
  const tf=document.getElementById('rev-topic').value,rf=document.getElementById('rev-result').value;
